<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DM Stock Control</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  /* ===== DESIGN SYSTEM ===== */
  :root {
    --primary: #0ea5e9;
    --primary-dark: #0284c7;
    --primary-light: #e0f2fe;
    --success: #10b981;
    --danger: #ef4444;
    --warning: #f59e0b;
    --dark: #0f172a;
    --mid: #475569;
    --light: #94a3b8;
    --border: #e2e8f0;
    --bg: #f1f5f9;
    --white: #ffffff;
    --sidebar-bg: #0f172a;
    --radius: 10px;
    --radius-sm: 7px;
    --shadow: 0 1px 3px rgba(0,0,0,.08), 0 0 0 1px rgba(15,23,42,.06);
    --shadow-md: 0 4px 16px rgba(0,0,0,.1);
    --shadow-lg: 0 20px 60px rgba(0,0,0,.2);
  }

  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'IBM Plex Sans Thai','Inter',sans-serif;background:var(--bg);color:var(--dark);min-height:100vh;font-size:14px;-webkit-tap-highlight-color:transparent}
  ::-webkit-scrollbar{width:6px;height:6px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px}

  /* ===== CARDS ===== */
  .card{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}

  /* ===== BUTTONS ===== */
  .btn{border:none;cursor:pointer;font-family:inherit;font-size:13px;border-radius:var(--radius-sm);padding:8px 16px;font-weight:600;transition:all .15s;display:inline-flex;align-items:center;gap:6px;line-height:1;white-space:nowrap;letter-spacing:.01em}
  .btn:hover{filter:brightness(.94);transform:translateY(-1px)}
  .btn:active{transform:scale(.97) translateY(0)}
  .btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
  .btn-primary{background:var(--primary);color:white;box-shadow:0 2px 8px rgba(14,165,233,.3)}
  .btn-primary:hover{background:var(--primary-dark)}
  .btn-success{background:var(--success);color:white;box-shadow:0 2px 8px rgba(16,185,129,.3)}
  .btn-danger{background:var(--danger);color:white;box-shadow:0 2px 8px rgba(239,68,68,.3)}
  .btn-ghost{background:transparent;color:var(--mid);border:1px solid transparent}
  .btn-ghost:hover{background:var(--bg);border-color:var(--border)}
  .btn-outline{background:var(--white);color:var(--mid);border:1.5px solid var(--border)}
  .btn-outline:hover{background:var(--bg);border-color:#cbd5e1}

  /* ===== INPUTS ===== */
  input,select,textarea{font-family:inherit;font-size:13px;outline:none}
  .input{width:100%;padding:9px 13px;border:1.5px solid var(--border);border-radius:var(--radius-sm);transition:all .15s;background:var(--white);color:var(--dark);font-weight:500}
  .input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(14,165,233,.12)}
  .input::placeholder{color:#b0bec5;font-weight:400}

  /* ===== BADGES ===== */
  .badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:5px;font-size:11px;font-weight:700;line-height:1.4;letter-spacing:.02em}

  /* ===== MODAL ===== */
  .modal-overlay{position:fixed;inset:0;background:rgba(15,23,42,.6);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(4px);animation:fadeIn .15s ease}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  .modal{background:var(--white);border-radius:14px;width:100%;max-width:520px;max-height:92vh;overflow-y:auto;box-shadow:var(--shadow-lg);animation:slideUp .2s ease}
  @keyframes slideUp{from{transform:translateY(24px);opacity:0}to{transform:translateY(0);opacity:1}}

  /* ===== TOAST ===== */
  .toast{position:fixed;bottom:88px;left:50%;transform:translateX(-50%);padding:12px 20px;border-radius:10px;font-size:13px;font-weight:600;z-index:999;box-shadow:var(--shadow-lg);animation:toastIn .25s ease;color:white;max-width:90vw;display:flex;align-items:center;gap:8px}
  @keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(16px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

  /* ===== SPINNER ===== */
  .spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .7s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* ===== SIDEBAR ===== */
  .sidebar{background:linear-gradient(180deg,#0f172a 0%,#1e293b 100%);color:#94a3b8;width:224px;min-height:100vh;display:flex;flex-direction:column;flex-shrink:0;position:sticky;top:0;height:100vh;border-right:1px solid rgba(255,255,255,.05)}
  .nav-item{padding:9px 14px;cursor:pointer;display:flex;align-items:center;gap:10px;font-size:13px;font-weight:500;border-left:3px solid transparent;transition:all .15s;margin:1px 8px;border-radius:7px;border-left:none}
  .nav-item:hover{background:rgba(255,255,255,.07);color:white}
  .nav-item.active{background:rgba(14,165,233,.15);color:white;box-shadow:inset 0 0 0 1px rgba(14,165,233,.2)}
  .nav-icon{font-size:15px;width:20px;text-align:center;flex-shrink:0}

  /* ===== TABLE ===== */
  table{width:100%;border-collapse:collapse;font-size:13px}
  thead tr{background:#f8fafc;border-bottom:2px solid var(--border)}
  th{padding:9px 12px;text-align:left;font-weight:700;color:var(--light);font-size:10px;text-transform:uppercase;letter-spacing:.06em;white-space:nowrap}
  td{padding:10px 12px;border-bottom:1px solid #f8fafc;vertical-align:middle}
  tbody tr{transition:background .08s}
  tbody tr:hover{background:#f8fafc}
  tbody tr:last-child td{border-bottom:none}

  /* ===== KPI CARDS ===== */
  .kpi-card{padding:18px;border-radius:12px;background:var(--white);box-shadow:var(--shadow);position:relative;overflow:hidden;cursor:pointer;transition:all .2s}
  .kpi-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-md)}
  .kpi-label{font-size:11px;color:var(--light);font-weight:700;text-transform:uppercase;letter-spacing:.06em}
  .kpi-value{font-size:28px;font-weight:800;font-variant-numeric:tabular-nums;line-height:1.1;margin-top:6px}
  .kpi-sub{font-size:11px;color:var(--light);margin-top:4px;font-weight:500}
  .kpi-accent{position:absolute;left:0;top:0;bottom:0;width:4px;border-radius:0 4px 4px 0}
  .kpi-icon{position:absolute;right:14px;top:14px;font-size:24px;opacity:.15}

  /* ===== TOPBAR ===== */
  .topbar{background:var(--white);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:30;box-shadow:0 1px 4px rgba(0,0,0,.04)}

  /* ===== STOCK ===== */
  .stock-bar{display:flex;align-items:center;gap:8px}
  .stock-num{font-weight:700;font-variant-numeric:tabular-nums}

  .product-cell{min-width:0}
  .product-name{font-weight:500;color:var(--dark);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .product-meta{font-size:11px;color:var(--light);margin-top:2px;font-family:'Inter',monospace}
  .mobile-code{display:none}

  /* ===== MISC ===== */
  .filter-bar{display:flex;flex-wrap:wrap;gap:8px;align-items:center;padding:12px 16px;border-bottom:1px solid var(--border);background:#fafbfc}
  .empty-state{padding:60px 20px;text-align:center;color:var(--light)}
  .empty-icon{font-size:44px;margin-bottom:12px;opacity:.4}
  .field-label{font-size:12px;font-weight:600;color:#374151;display:block;margin-bottom:5px}
  .progress-bar{height:4px;background:var(--border);border-radius:2px;overflow:hidden}
  .progress-fill{height:100%;border-radius:2px;transition:width .5s ease}
  .pulse{animation:pulse 1.5s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
  .tab-pill{padding:7px 16px;border:1.5px solid var(--border);background:var(--white);border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;color:var(--mid);transition:all .15s;font-family:inherit}
  .tab-pill:hover{border-color:#94a3b8;color:var(--dark)}
  .tab-pill.active{background:var(--dark);color:white;border-color:var(--dark)}

  /* ===== BOTTOM NAV (mobile only) ===== */
  .bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--white);border-top:1px solid var(--border);z-index:90;padding:6px 0 calc(6px + env(safe-area-inset-bottom));box-shadow:0 -2px 16px rgba(0,0,0,.08)}
  .bottom-nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:4px 2px;border:none;background:none;font-family:inherit;color:var(--light);transition:all .15s;position:relative}
  .bottom-nav-item.active{color:var(--primary)}
  .bottom-nav-item span:first-child{font-size:20px;line-height:1}
  .bottom-nav-item span:last-child{font-size:9px;font-weight:600;letter-spacing:.02em}
  .bottom-nav-badge{position:absolute;top:2px;right:calc(50% - 18px);background:var(--danger);color:white;font-size:9px;font-weight:700;padding:1px 4px;border-radius:8px;min-width:16px;text-align:center;line-height:1.4}

  /* ===== QUICK ACTION BUTTON ===== */
  .fab{position:fixed;right:18px;bottom:76px;z-index:95;display:none}
  .fab-main{width:52px;height:52px;border-radius:50%;background:var(--primary);color:white;border:none;font-size:24px;cursor:pointer;box-shadow:0 4px 16px rgba(14,165,233,.45);transition:all .2s;display:flex;align-items:center;justify-content:center;line-height:1}
  .fab-main:hover{transform:scale(1.1)}
  .fab-main.open{transform:rotate(45deg);background:var(--dark)}
  .fab-menu{position:absolute;bottom:60px;right:0;display:flex;flex-direction:column;gap:8px;align-items:flex-end;opacity:0;pointer-events:none;transition:all .2s;transform:translateY(10px)}
  .fab-menu.open{opacity:1;pointer-events:all;transform:translateY(0)}
  .fab-item{display:flex;align-items:center;gap:8px;cursor:pointer;animation:fadeIn .15s ease}
  .fab-item-label{background:var(--dark);color:white;padding:5px 12px;border-radius:20px;font-size:12px;font-weight:600;white-space:nowrap;box-shadow:var(--shadow-md)}
  .fab-item-btn{width:42px;height:42px;border-radius:50%;border:none;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow-md);transition:all .15s}
  .fab-item-btn:hover{transform:scale(1.1)}

  /* ===== MOBILE ===== */
  .mobile-menu-btn{display:none;background:var(--bg);border:none;padding:8px;border-radius:8px;cursor:pointer;align-items:center;justify-content:center;font-size:18px}
  .mobile-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:99}
  .mobile-overlay.active{display:block}

  @media(max-width:900px){
    .sidebar{position:fixed;left:-224px;z-index:100;transition:left .25s}
    .sidebar.open{left:0;box-shadow:4px 0 40px rgba(0,0,0,.4)}
    .mobile-menu-btn{display:flex!important}
    .desktop-only{display:none!important}
    .bottom-nav{display:flex!important}
    .fab{display:block!important}
    .stat-grid{grid-template-columns:repeat(2,1fr)!important}
    .dashboard-grid{grid-template-columns:1fr!important}
    .modal{max-width:100%!important;border-radius:20px 20px 0 0!important;margin:0;max-height:92vh!important}
    .modal-overlay{align-items:flex-end!important;padding:0!important}
    .filter-bar{gap:5px!important;padding:8px 10px!important}
    .filter-bar select,.filter-bar input{font-size:12px!important}
    table{font-size:12px}
    .mobile-code{display:block!important}
    /* เพิ่ม padding ด้านล่างเพื่อหลีกเลี่ยง bottom nav */
    main, [style*="flex:1"] > div:last-child{padding-bottom:80px!important}
  }

  @media(max-width:480px){
    .stat-grid{grid-template-columns:1fr 1fr!important}
    .stock-code-col{display:none!important}
    .stock-thumb-cell{width:28px!important;padding:4px 2px!important}
    .stock-thumb{width:24px!important;height:24px!important;border-radius:4px!important}
    .product-cell{max-width:calc(100vw - 130px)!important}
    .product-name{white-space:normal!important;line-height:1.3!important;font-size:12px!important}
    .kpi-value{font-size:22px!important}
    .card{border-radius:8px}
    .mobile-code{display:block!important;font-size:10px;color:var(--light);font-family:monospace}
    .toast{bottom:80px}
    .fab{bottom:72px;right:14px}
  }
  .mobile-menu-btn{display:none;background:#f1f5f9;border:none;padding:8px;border-radius:6px;cursor:pointer;align-items:center;justify-content:center}
  .mobile-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:99}
  .mobile-overlay.active{display:block}

  .product-cell{min-width:0;max-width:380px}
  .product-name{font-weight:500;color:#0f172a;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .product-meta{font-size:11px;color:#64748b;margin-top:2px;font-family:'Inter',monospace;font-weight:400}
  .mobile-code{display:none} /* ซ่อนบน desktop */
  @media(max-width:900px){
    .mobile-code{display:block!important}
  }

  .filter-bar{display:flex;flex-wrap:wrap;gap:8px;align-items:center;padding:12px 16px;border-bottom:1px solid #e2e8f0;background:#fafbfc}

  .empty-state{padding:60px 20px;text-align:center;color:#94a3b8}
  .empty-icon{font-size:42px;margin-bottom:10px;opacity:.5}

  .field-label{font-size:12px;font-weight:600;color:#374151;display:block;margin-bottom:5px}

  .progress-bar{height:4px;background:#f1f5f9;border-radius:2px;overflow:hidden}
  .progress-fill{height:100%;border-radius:2px;transition:width .4s ease}

  .pulse{animation:pulse 1.5s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

  .tab-pill{padding:6px 14px;border:1px solid #e2e8f0;background:white;border-radius:7px;cursor:pointer;font-size:13px;font-weight:500;color:#64748b;transition:all .12s;font-family:inherit}
  .tab-pill:hover{border-color:#cbd5e1}
  .tab-pill.active{background:#0f172a;color:white;border-color:#0f172a}
</style>
</head>
<body>
<div id="app"></div>

<script>
// ===== CONFIG =====
const API_URL = "https://script.google.com/macros/s/AKfycbx9Vo3jvqv1Q5p8Xa663B3Jy0WHC2Ya4DrAl7DzhV7WsjJ96_aCb1lLOXnlPayMju1W1Q/exec";
const SESSION_KEY = 'dm_session_v1';
const SESSION_DAYS = 30;

// ===== AUTH =====
let currentUser = null; // { name, email, role }
let userNames = [];     // รายชื่อสำหรับ dropdown
let allUsers = [];      // เฉพาะ admin
let myLastRead = null;  // timestamp ที่ตัวเองอ่านประวัติล่าสุด
let unreadCount = 0;    // จำนวนรายการที่ยังไม่อ่าน

function loadSession() {
  try {
    const s = localStorage.getItem(SESSION_KEY);
    if (!s) return null;
    const { user, expires } = JSON.parse(s);
    if (new Date() > new Date(expires)) {
      localStorage.removeItem(SESSION_KEY);
      return null;
    }
    return user;
  } catch(e) { return null; }
}

function saveSession(user) {
  const expires = new Date();
  expires.setDate(expires.getDate() + SESSION_DAYS);
  localStorage.setItem(SESSION_KEY, JSON.stringify({ user, expires }));
}

function clearSession() {
  localStorage.removeItem(SESSION_KEY);
}

function canEdit() { return currentUser && (currentUser.role === 'admin' || currentUser.role === 'poweruser'); }
function isAdmin() { return currentUser && currentUser.role === 'admin'; }

async function fetchLastRead() {
  if (!currentUser) return;
  try {
    const url = API_URL + "?" + new URLSearchParams({ action: 'getLastRead', name: currentUser.name });
    const res = await fetch(url);
    const data = await res.json();
    if (data.success) {
      myLastRead = data.lastRead;
      updateUnreadCount();
      render(); // re-render เพื่ออัปเดต badge
    }
  } catch(e) {}
}

async function markAsRead() {
  if (!currentUser) return;
  myLastRead = Date.now();
  unreadCount = 0;
  // อัปเดต badge ใน sidebar
  const badgeEl = document.getElementById('history-badge');
  if (badgeEl) { badgeEl.textContent = ''; badgeEl.style.display='none'; }
  // อัปเดต highlight ใน tbody
  const tbody = document.getElementById('history-tbody');
  if (tbody) renderHistoryTbody(tbody);
  else render();
  // บันทึกลง Sheet
  try {
    const url = API_URL + "?" + new URLSearchParams({ action: 'updateLastRead', name: currentUser.name });
    await fetch(url);
  } catch(e) {}
}

function updateUnreadCount() {
  if (!currentUser || !myLastRead) {
    // ถ้าไม่เคยอ่านเลย → นับทุกรายการที่คนอื่นบันทึก
    unreadCount = transactions.filter(tx =>
      !tx.cancelled &&
      tx.addedBy &&
      tx.addedBy !== currentUser?.name
    ).length;
  } else {
    // นับรายการที่ timestamp > lastRead และคนอื่นบันทึก
    unreadCount = transactions.filter(tx =>
      !tx.cancelled &&
      tx.timestamp &&
      tx.timestamp > myLastRead &&
      tx.addedBy &&
      tx.addedBy !== currentUser?.name
    ).length;
  }
}

async function fetchUserNames() {
  try {
    const res = await fetch(API_URL + "?action=getUserNames");
    const data = await res.json();
    if (data.success) userNames = data.names;
  } catch(e) {}
}

async function fetchAllUsers() {
  try {
    const res = await fetch(API_URL + "?action=getUsers");
    const data = await res.json();
    if (data.success) {
      allUsers = data.users;
      // ถ้าอยู่หน้า admin → render ใหม่เพื่อแสดงข้อมูล
      if (ui.view === 'admin') render();
    }
  } catch(e) {}
}

async function apiLogin(name, password) {
  const url = API_URL + "?" + new URLSearchParams({ action: 'login', name, password });
  const res = await fetch(url);
  return await res.json();
}

async function apiAddUser(name, email, password, role) {
  const url = API_URL + "?" + new URLSearchParams({ action: 'addUser', newName: name, newEmail: email, newPassword: password, newRole: role });
  const res = await fetch(url);
  return await res.json();
}

async function apiUpdateUser(targetName, newPassword, newRole) {
  const url = API_URL + "?" + new URLSearchParams({ action: 'updateUser', targetName, newPassword: newPassword||'', newRole: newRole||'' });
  const res = await fetch(url);
  return await res.json();
}

async function apiDeleteUser(targetName) {
  const url = API_URL + "?" + new URLSearchParams({ action: 'deleteUser', targetName });
  const res = await fetch(url);
  return await res.json();
}

// ===== STATE =====
let products = [];
let transactions = [];
let lots = [];
let projects = [];
let reservations = []; // การจอง
let deliveryOrders = []; // ใบส่งของ
let lastSync = null;
let isLoading = false;
let isLoadingTx = false;
let loadError = null;
let isSaving = false;
let mobileMenuOpen = false;

let ui = {
  view: 'dashboard',
  search: '',
  filterType: 'ทั้งหมด',
  filterStatus: 'ทั้งหมด',
  sortBy: 'name',
  modal: null,
  selectedId: null,
  txForm: { date: td(), qty: '', unit: 'sqm', note: '', location: '', lot: '', project: '' },
  toast: null,
  toastTimer: null,
  historyFilter: 'all',
  historyType: 'all',
  custView: 'customer', // customer / lot / product
  custSelected: null,
};

// ===== API =====
async function fetchProducts() {
  isLoading = true; loadError = null; render();
  try {
    const res = await fetch(API_URL + "?action=getProducts");
    const data = await res.json();
    if (data.success && data.products) {
      products = data.products.filter(p => p.id && p.name).map(p => ({
        ...p,
        imageUrl: p.imageUrl || p.image || ''
      }));
      lastSync = new Date();
    } else throw new Error(data.error || 'ดึงข้อมูลไม่สำเร็จ');
  } catch(e) { loadError = e.message; }
  isLoading = false; render();
}

async function fetchTransactions() {
  isLoadingTx = true;
  // อัปเดต count label ถ้าอยู่หน้าประวัติ
  const countEl = document.getElementById('history-count');
  if (countEl) countEl.textContent = '⏳ กำลังโหลด...';
  try {
    const res = await fetch(API_URL + "?action=getTransactions");
    const data = await res.json();
    if (data.success && data.transactions) {
      transactions = data.transactions;
      transactions.sort((a, b) => {
        const tA = a.timestamp || 0;
        const tB = b.timestamp || 0;
        if (tA && tB && tA !== tB) return tB - tA;
        const dA = new Date(a.date).getTime();
        const dB = new Date(b.date).getTime();
        if (dB !== dA) return dB - dA;
        if (a.type !== b.type) return a.type === 'in' ? -1 : 1;
        return (b.rowIndex||0) - (a.rowIndex||0);
      });
      updateUnreadCount(); // อัปเดต badge หลังโหลดเสร็จ
    }
  } catch(e) { console.error('Load tx failed:', e); }
  isLoadingTx = false;

  // ถ้าหน้าประวัติเปิดอยู่ → อัปเดต tbody โดยตรง
  const tbody = document.getElementById('history-tbody');
  const countEl2 = document.getElementById('history-count');
  if (tbody) {
    renderHistoryTbody(tbody);
    if (countEl2) countEl2.textContent = getFilteredTx().length.toLocaleString() + ' รายการ';
    // อัปเดต badge ใน sidebar โดยไม่ render ทั้งหน้า

}

function getAvailableQty(productId, lot='') {
  const lotStock = lots
    .filter(l => String(l.productId).trim()===String(productId).trim() && l.stock>0 && (lot===''||l.lot===lot))
    .reduce((s,l) => s+l.stock, 0);
  return Math.max(0, lotStock - getReservedQty(productId, lot));
}

function getLotsForProduct(productId) {

}

// ===== HELPERS =====
function td() { return new Date().toISOString().split('T')[0]; }
// แปลง Google Drive URL เป็น thumbnail URL
function driveThumb(url, size=300) {
  if (!url) return null;
  url = String(url).trim();
  if (!url.startsWith('http')) return null;
  // แบบ /file/d/ID/view
  let m = url.match(/\/file\/d\/([^\/\?]+)/);
  if (m) return 'https://drive.google.com/thumbnail?id='+m[1]+'&sz=w'+size;
  // แบบ id=ID
  m = url.match(/[?&]id=([^&]+)/);
  if (m) return 'https://drive.google.com/thumbnail?id='+m[1]+'&sz=w'+size;
  // ถ้าเป็น thumbnail อยู่แล้ว
  if (url.includes('thumbnail')) return url;
  return null;
}

function fmtDate(d) {
  if (!d) return '-';
  const dt = new Date(d);
  if (isNaN(dt)) return d;
  return dt.toLocaleDateString('th-TH', { day:'2-digit', month:'short', year:'2-digit' });
}
function fmtNum(n, decimals=2) {
  if (n === null || n === undefined || isNaN(n)) return '0';
  return Number(n).toLocaleString('th-TH', { minimumFractionDigits: decimals, maximumFractionDigits: decimals });
}
function getStatus(p) {
  const s = parseFloat(p.stock)||0, m = parseFloat(p.minQty)||5;
  return s <= 0 ? 'out' : s < m ? 'low' : 'ok';
}
function statusInfo(s) {
  if (s==='ok') return { bg:'#dcfce7', txt:'#166534', dot:'#22c55e', label:'OK' };
  if (s==='low') return { bg:'#fef3c7', txt:'#92400e', dot:'#f59e0b', label:'ใกล้หมด' };
  return { bg:'#fee2e2', txt:'#991b1b', dot:'#ef4444', label:'หมด' };
}
function calcSqm(qty, unit, p) {
  const n = parseFloat(qty); if (!n || n<=0) return 0;
  if (unit==='sqm') return n;
  if (unit==='box') return n*(parseFloat(p.pcsPerBox)||1)*(parseFloat(p.sqmPerPc)||0);
  return n*(parseFloat(p.sqmPerPc)||0);
}
function showToast(msg, type='ok') {
  if (ui.toastTimer) clearTimeout(ui.toastTimer);
  ui.toast = {msg, type};
  render();
  ui.toastTimer = setTimeout(()=>{ ui.toast=null; render(); }, 3500);
}
function isDiscontinued(p) {
  return String(p.status||'').trim() === 'ยกเลิก';
}

function getFiltered() {
  // ซ่อนสินค้าที่เลิกขายแล้ว
  let list = products.filter(p=>!isDiscontinued(p)).map(p=>({...p, stock:parseFloat(p.stock)||0, status:getStatus(p)}));
  if (ui.search) {
    const q = ui.search.toLowerCase();
    list = list.filter(p=>{
      const fields=[p.name,p.code,p.id,p.type];
      return fields.some(f=>String(f||'').toLowerCase().includes(q));
    });
  }
  if (ui.filterType!=='ทั้งหมด') list=list.filter(p=>p.type===ui.filterType);
  if (ui.filterStatus!=='ทั้งหมด') {
    const map={'ok':'ok','low':'low','out':'out'};
    list=list.filter(p=>p.status===map[ui.filterStatus]);
  }
  return list.sort((a,b)=>{
    if(ui.sortBy==='stock_asc') return a.stock-b.stock;
    if(ui.sortBy==='stock_desc') return b.stock-a.stock;
    if(ui.sortBy==='status'){const o={'out':0,'low':1,'ok':2};return o[a.status]-o[b.status];}
    if(ui.sortBy==='code') return (a.code||'').localeCompare(b.code||'');
    if(ui.sortBy==='recent'){
      const dA = a.lastTxDate ? new Date(a.lastTxDate).getTime() : 0;
      const dB = b.lastTxDate ? new Date(b.lastTxDate).getTime() : 0;
      return dB - dA;
    }
    return (a.name||'').localeCompare(b.name||'','th');
  });
}

function getDiscontinued() {
  return products.filter(p=>isDiscontinued(p));
}
function getStats() {
  const all=products.map(p=>({...p,status:getStatus(p)}));
  return {
    total: all.length,
    ok: all.filter(p=>p.status==='ok').length,
    low: all.filter(p=>p.status==='low').length,
    out: all.filter(p=>p.status==='out').length,
    sqm: all.reduce((s,p)=>s+(parseFloat(p.stock)||0),0)
  };
}
function getTypes() {
  return ['ทั้งหมด', ...Array.from(new Set(products.map(p=>p.type).filter(Boolean))).sort()];
}
function getTypeStats() {
  const map={};
  products.forEach(p=>{
    const st=getStatus(p);
    if(!map[p.type]) map[p.type]={count:0,sqm:0,low:0,out:0};
    map[p.type].count++;
    map[p.type].sqm+=parseFloat(p.stock)||0;
    if(st==='low') map[p.type].low++;
    if(st==='out') map[p.type].out++;
  });
  return Object.entries(map).sort((a,b)=>b[1].sqm-a[1].sqm);
}
function getSelected() { return ui.selectedId ? products.find(p=>p.id===ui.selectedId) : null; }
function getProductTx(productId) {
  return transactions.filter(t=>t.productId===productId || t.productCode===productId);
}
function getFilteredTx() {
  let list = transactions;
  if (ui.historyType !== 'all') list = list.filter(t=>t.type===ui.historyType);
  if (ui.historyFilter === 'today') {
    const today = td();
    list = list.filter(t=>String(t.date).startsWith(today));
  } else if (ui.historyFilter === 'week') {
    const wk = new Date(); wk.setDate(wk.getDate()-7);
    list = list.filter(t=>new Date(t.date)>=wk);
  } else if (ui.historyFilter === 'month') {
    const mn = new Date(); mn.setMonth(mn.getMonth()-1);
    list = list.filter(t=>new Date(t.date)>=mn);
  }
  if (ui.search) {
    const q = ui.search.toLowerCase();
    list = list.filter(t=>{
      const fields = [t.productId, t.productCode, t.note, t.location, t.lot, t.project];
      return fields.some(f => String(f||'').toLowerCase().includes(q));
    });
  }
  return list;
}

// ===== TRANSACTION =====
async function doTx(type) {
  const p = getSelected(); if (!p) return;
  const stock = parseFloat(p.stock)||0;
  const sqm = calcSqm(ui.txForm.qty, ui.txForm.unit, p);
  if (sqm<=0) { showToast('กรุณากรอกจำนวนที่ถูกต้อง','err'); return; }
  if (type==='out' && stock<sqm) { showToast('สต็อกไม่เพียงพอ! คงเหลือ '+fmtNum(stock,2)+' ตร.ม','err'); return; }
  isSaving=true;
  try {
    await apiSaveTx(type, p, sqm);
    const savedDate = ui.txForm.date;
    isSaving=false;
    ui.modal=null;
    ui.txForm={date:savedDate,qty:'',unit:'sqm',note:'',location:'',lot:'',project:''};
    showToast(type==='in'?'✓ รับสินค้าเข้าสำเร็จ':'✓ จ่ายสินค้าออกสำเร็จ');
    render();
    Promise.all([fetchProducts(), fetchTransactions(), fetchLots(), fetchProjects()]);
  } catch(e) {
    isSaving=false; showToast('❌ '+e.message,'err'); render();
  }
}

// ===== DOM =====
function h(tag, attrs, ...ch) {
  const el=document.createElement(tag);
  if(attrs) Object.entries(attrs).forEach(([k,v])=>{
    if(k==='className') el.className=v;
    else if(k.startsWith('on')) el.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==='style'&&typeof v==='object') Object.assign(el.style,v);
    else if(k==='disabled'){if(v)el.disabled=true;}
    else if(v!=null) el.setAttribute(k,v);
  });
  ch.flat(Infinity).forEach(c=>{ if(c==null||c===false)return; el.appendChild(typeof c==='string'||typeof c==='number'?document.createTextNode(String(c)):c); });
  return el;
}
function sel(options, value, onChange, isPairs=false) {
  const el=h('select',{className:'input',style:{width:'auto',cursor:'pointer'},onChange:e=>onChange(e.target.value)});
  options.forEach(o=>{
    const v=isPairs?o[0]:o, l=isPairs?o[1]:o;
    const opt=document.createElement('option');
    opt.value=v; opt.textContent=l; if(v===value)opt.selected=true;
    el.appendChild(opt);
  });
  return el;
}

function exportCSV(type) {
  let rows = [], filename = '';

  if (type === 'stock') {
    filename = 'DM-Stock-' + td() + '.csv';
    rows.push(['รหัส','รหัสอ้างอิง','ชื่อสินค้า','ประเภท','สต็อก (ตร.ม)','กล่อง','แผ่น/กล่อง','ตร.ม/แผ่น','Sheet size','Chip size','สถานะ']);
    getFiltered().forEach(p => {
      const boxes = Math.floor(p.stock/((parseFloat(p.pcsPerBox)||1)*(parseFloat(p.sqmPerPc)||1)));
      rows.push([p.id,p.code||'',p.name,p.type||'',fmtNum(p.stock,4),boxes,p.pcsPerBox||'',p.sqmPerPc||'',p.size||'',p.chipSize||'',p.status]);
    });
  } else if (type === 'history') {
    filename = 'DM-History-' + td() + '.csv';
    rows.push(['วันที่','ประเภท','รหัส','ชื่อสินค้า','จำนวน (ตร.ม)','Lot','โปรเจค','ที่เก็บ','บันทึกโดย','หมายเหตุ','ยกเลิก']);
    getFilteredTx().forEach(tx => {
      const p = products.find(x=>x.id===tx.productId||x.code===tx.productCode);
      rows.push([
        tx.date, tx.type==='in'?'รับเข้า':'จ่ายออก',
        tx.productCode||tx.productId, p?p.name:'',
        (tx.type==='in'?'+':'-')+fmtNum(tx.sqm,4),
        tx.lot||'', tx.project||'', tx.location||'',
        tx.addedBy||'', tx.note||'',
        tx.cancelled?'ยกเลิก':''
      ]);
    });
  } else if (type === 'lots') {
    filename = 'DM-Lots-' + td() + '.csv';
    rows.push(['รหัสสินค้า','รหัสอ้างอิง','Lot','คงเหลือ (ตร.ม)','วันที่เข้า','วันที่ล่าสุด']);
    lots.filter(l=>l.stock>0).forEach(l => {
      rows.push([l.productId,l.productCode||'',l.lot,fmtNum(l.stock,4),l.firstDate,l.lastDate]);
    });
  }

  const bom = '\uFEFF'; // UTF-8 BOM สำหรับ Excel ภาษาไทย
  const csv = bom + rows.map(r => r.map(v => '"'+String(v||'').replace(/"/g,'""')+'"').join(',')).join('\n');
  const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
  showToast('✓ ดาวน์โหลด '+filename);
}

function openLightbox(imageUrl) {
  const lightbox = document.createElement('div');
  lightbox.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:999;display:flex;align-items:center;justify-content:center;cursor:zoom-out';
  const bigImg = document.createElement('img');
  bigImg.src = driveThumb(imageUrl, 1200) || imageUrl;
  bigImg.style.cssText='max-width:90vw;max-height:90vh;border-radius:8px;box-shadow:0 20px 60px rgba(0,0,0,.5)';
  lightbox.appendChild(bigImg);
  lightbox.addEventListener('click',()=>lightbox.remove());
  document.body.appendChild(lightbox);
}

function renderStockTbody(tbody) {
  const filtered = getFiltered();
  tbody.innerHTML = '';
  if (filtered.length === 0) {
    tbody.appendChild(h('tr',{},h('td',{colspan:7,style:{padding:'40px',textAlign:'center',color:'#94a3b8'}},'ไม่พบสินค้า')));
    return;
  }
  filtered.forEach(p => {
    const boxes = Math.floor(p.stock/((parseFloat(p.pcsPerBox)||1)*(parseFloat(p.sqmPerPc)||1)));
    const thumbUrl = driveThumb(p.imageUrl, 48);

    // thumbnail cell
    const thumbCell = h('td',{className:'stock-thumb-cell',style:{width:'64px',padding:'4px 8px'}});
    const thumbWrap = h('div',{className:'stock-thumb',style:{width:'56px',height:'56px',borderRadius:'8px',overflow:'hidden',border:'1px solid #e2e8f0',background:'#f8fafc',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}});
    if (thumbUrl) {
      const img = document.createElement('img');
      img.src = thumbUrl;
      img.style.cssText='width:100%;height:100%;object-fit:cover;cursor:zoom-in';
      img.onerror = () => { thumbWrap.innerHTML='<span style="font-size:16px;color:#cbd5e1">🖼</span>'; };
      img.addEventListener('click', e => { e.stopPropagation(); openLightbox(p.imageUrl); });
      thumbWrap.appendChild(img);
    } else {
      thumbWrap.appendChild(h('span',{style:{fontSize:'16px',color:'#e2e8f0'}},'🖼'));
    }
    thumbCell.appendChild(thumbWrap);

    tbody.appendChild(h('tr',{style:{cursor:'pointer'},
      onClick:()=>{ui.selectedId=p.id;ui.modal='detail';render();}},
      h('td',{className:'stock-code-col',style:{fontFamily:'monospace',color:'#0f172a',fontSize:'12px',fontWeight:600,whiteSpace:'nowrap'}},p.code||p.id),
      thumbCell,
      h('td',{className:'product-cell'},
        h('div',{className:'product-name',style:{fontSize:'13px'}},
          // แสดงรหัสก่อนชื่อบนมือถือ
          h('span',{className:'mobile-code',style:{fontFamily:'monospace',fontSize:'10px',color:'#94a3b8',display:'block'}},p.code||p.id),
          p.name
        ),
        h('div',{className:'product-meta'},p.size||'')
      ),
      h('td',{className:'desktop-only',style:{fontSize:'12px',color:'#475569'}},p.type||'-'),
      h('td',{style:{textAlign:'right'}},
        h('div',{className:'stock-num',style:{color:p.status==='out'?'#dc2626':p.status==='low'?'#d97706':'#0f172a',fontSize:'14px'}},fmtNum(p.stock,2)),
        h('div',{style:{fontSize:'10px',color:'#94a3b8',marginTop:'1px'}},'min '+(p.minQty||5))
      ),
      h('td',{className:'desktop-only',style:{textAlign:'right',color:'#64748b',fontSize:'12px'}},boxes.toLocaleString()),
      h('td',{},badge(p.status)),
      canEdit()?h('td',{className:'desktop-only',style:{whiteSpace:'nowrap'},
        onClick:e=>e.stopPropagation()},
        h('div',{style:{display:'flex',gap:'4px'}},
          h('button',{className:'btn btn-success',style:{fontSize:'11px',padding:'4px 10px'},
            onClick:e=>{
              e.stopPropagation();
              ui.selectedId=p.id;
              ui.txForm={date:td(),qty:'',unit:'sqm',note:'',location:'',lot:'',project:''};
              ui.modal='in';
              render();
            }},'⬇ รับเข้า'),
          h('button',{className:'btn btn-danger',style:{fontSize:'11px',padding:'4px 10px',opacity:p.stock<=0?.4:1},
            disabled:p.stock<=0,
            onClick:e=>{
              e.stopPropagation();
              if(p.stock<=0) return;
              ui.selectedId=p.id;
              ui.txForm={date:td(),qty:'',unit:'sqm',note:'',location:'',lot:'',project:''};
              ui.modal='out';
              render();
            }},'⬆ จ่ายออก')
        )
      ):null
    ));
  });
}

function renderPickTbody(tbody, type) {
  const q = (ui.search||'').toLowerCase();
  let filtered = getFiltered().filter(p => type==='out' ? p.stock>0 : true);

  // ค้นหาจาก Lot ด้วย
  if (q) {
    const lotMatch = lots.filter(l =>
      String(l.lot||'').toLowerCase().includes(q) && l.stock > 0
    ).map(l => String(l.productId).trim());

    filtered = filtered.filter(p =>
      String(p.name||'').toLowerCase().includes(q) ||
      String(p.code||'').toLowerCase().includes(q) ||
      String(p.id||'').toLowerCase().includes(q) ||
      String(p.type||'').toLowerCase().includes(q) ||
      lotMatch.includes(String(p.id).trim())
    );
  }

  const hoverBg = type==='in' ? '#f0fdf4' : '#fef2f2';
  tbody.innerHTML = '';
  if (filtered.length === 0) {
    tbody.appendChild(h('tr',{},h('td',{colspan:6,style:{padding:'40px',textAlign:'center',color:'#94a3b8'}},'ไม่พบสินค้า')));
    return;
  }
  const currentDate = ui.txForm.date || td();
  filtered.slice(0,150).forEach(p => {
    const productLots = getLotsForProduct(p.id);
    const lotText = productLots.length > 0
      ? productLots.slice(0,3).map(l=>l.lot).join(', ') + (productLots.length>3?'...':'')
      : '-';

    // thumbnail
    const thumbUrl = driveThumb(p.imageUrl, 60);
    const thumbWrap = h('div',{style:{width:'36px',height:'36px',borderRadius:'6px',overflow:'hidden',border:'1px solid #e2e8f0',background:'#f8fafc',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}});
    if (thumbUrl) {
      const img = document.createElement('img');
      img.src = thumbUrl;
      img.style.cssText = 'width:100%;height:100%;object-fit:cover';
      img.onerror = () => { thumbWrap.innerHTML = '<span style="font-size:16px;color:#e2e8f0">🖼</span>'; };
      img.addEventListener('click', e => { e.stopPropagation(); openLightbox(p.imageUrl); });
      thumbWrap.appendChild(img);
    } else {
      thumbWrap.appendChild(h('span',{style:{fontSize:'16px',color:'#e2e8f0'}},'🖼'));
    }

    const row = h('tr',{style:{cursor:'pointer'},
      onClick:()=>{
        ui.selectedId=p.id;
        const keepDate = ui.txForm.date || td();
        ui.txForm={date:keepDate,qty:'',unit:'sqm',note:'',location:'',lot:'',project:''};
        ui.modal=type;
        render();
      }},
      h('td',{className:'desktop-only',style:{color:'#64748b',fontSize:'12px',whiteSpace:'nowrap'}},p.lastTxDate?fmtDate(p.lastTxDate):''),
      h('td',{className:'desktop-only',style:{fontFamily:'monospace',color:'#0f172a',fontSize:'13px',fontWeight:600,whiteSpace:'nowrap'}},p.code||p.id),
      h('td',{style:{width:'40px',padding:'4px 4px'}},thumbWrap),
      h('td',{className:'product-cell'},
        h('div',{className:'product-name'},p.name),
        h('div',{className:'mobile-code',style:{fontSize:'10px',color:'#94a3b8',fontFamily:'monospace'}},p.code||p.id),
        h('div',{className:'product-meta'},(p.type||'')+' · '+(p.size||''))
      ),
      h('td',{style:{fontSize:'11px',color:'#64748b',maxWidth:'80px',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},
        productLots.length>0 ? h('span',{style:{fontFamily:'monospace',color:'#0f172a',fontWeight:500,fontSize:'11px'}},lotText) : h('span',{style:{color:'#cbd5e1'}},'-')
      ),
      h('td',{style:{textAlign:'right',whiteSpace:'nowrap'}},
        h('span',{className:'stock-num',style:{fontSize:'13px',color:p.status==='out'?'#dc2626':p.status==='low'?'#d97706':'#0f172a'}},fmtNum(p.stock,2))
      ),
      h('td',{style:{whiteSpace:'nowrap'}},badge(p.status))
    );
    row.addEventListener('mouseenter',()=>row.style.background=hoverBg);
    row.addEventListener('mouseleave',()=>row.style.background='');
    tbody.appendChild(row);
  });
}

  return h('div',{className:'card',style:{overflow:'hidden'}},

        inp.addEventListener('input', e => {

        )
      ),
      sel([['all','ทุกช่วง'],['today','วันนี้'],['week','7 วัน'],['month','30 วัน']],ui.historyFilter,v=>{ui.historyFilter=v;render();},true),
      h('div',{id:'history-count',style:{marginLeft:'auto',color:'#64748b',fontSize:'12px',fontWeight:500}},
        isLoadingTx?'⏳ กำลังโหลด...':getFilteredTx().length.toLocaleString()+' รายการ'
      ),
      unreadCount>0?h('button',{className:'btn btn-primary',style:{fontSize:'11px',padding:'4px 10px'},
        onClick:()=>markAsRead()},'✓ อ่านทั้งหมด ('+unreadCount+')'):null
    ),
    isLoadingTx?h('div',{style:{padding:'50px',textAlign:'center',color:'#64748b'}},
      h('div',{className:'spinner',style:{margin:'0 auto 12px'}}),
      h('div',{style:{fontSize:'13px'}},'กำลังโหลดประวัติจาก Sheet...')
    ):transactions.length===0?h('div',{className:'empty-state'},
      h('div',{className:'empty-icon'},'🕐'),
      h('div',{style:{fontWeight:600,marginBottom:'8px'}},'ยังไม่มีประวัติการเคลื่อนไหว'),
      h('button',{className:'btn btn-primary',onClick:()=>{isLoadingTx=false;fetchTransactions();}},'🔄 โหลดใหม่')
    ):h('div',{style:{overflowX:'auto',maxHeight:'calc(100vh - 200px)',overflowY:'auto'}},
      h('table',{},
        h('thead',{style:{position:'sticky',top:0,zIndex:5}},
          h('tr',{},
            h('th',{style:{width:'80px'}},'วันที่'),
            h('th',{style:{width:'30px'}},''),
            h('th',{className:'desktop-only',style:{width:'100px'}},'รหัส'),
            h('th',{},'สินค้า'),
            h('th',{style:{textAlign:'right',width:'70px'}},'ตร.ม'),
            h('th',{className:'desktop-only',style:{width:'70px'}},'Lot'),
            h('th',{className:'desktop-only',style:{width:'100px'}},'โปรเจค'),
            h('th',{className:'desktop-only',style:{width:'70px'}},'บันทึกโดย'),
            h('th',{className:'desktop-only',style:{width:'100px'}},'หมายเหตุ'),
            h('th',{style:{width:'60px'}},'')
          )
        ),
        (() => {
          const tbody = h('tbody', { id: 'history-tbody' });
          renderHistoryTbody(tbody);
          return tbody;
        })()
      )
    )
  );
}

function renderHistoryTbody(tbody) {
  const filtered = getFilteredTx();
  tbody.innerHTML = '';
  if (filtered.length === 0) {
    tbody.appendChild(h('tr',{},h('td',{colspan:10,style:{padding:'40px',textAlign:'center',color:'#94a3b8'}},'ไม่พบข้อมูล')));
    return;
  }
  filtered.slice(0,500).forEach(tx => {
    const isCancelled = tx.cancelled === true;
    const txDate = new Date(tx.date);
    const diffDays = (new Date() - txDate) / (1000*60*60*24);
    const canCancel = !isCancelled && diffDays <= 3 && !!tx.timestamp && (canEdit() || isAdmin());
    const p = products.find(x=>x.id===tx.productId||x.code===tx.productCode);

    // เช็คว่าเป็นรายการที่ยังไม่อ่าน
    const isUnread = !isCancelled &&
      tx.timestamp &&
      tx.addedBy &&
      tx.addedBy !== currentUser?.name &&
      (!myLastRead || tx.timestamp > myLastRead);

    const row = h('tr',{style:{
      opacity: isCancelled?'0.5':'1',
      background: isCancelled?'#fafafa': isUnread?'#fff5f5':'',
      borderLeft: isUnread?'3px solid #ef4444':'3px solid transparent'
    }},
      // วันที่ + จุดแจ้งเตือน
      h('td',{style:{color:'#64748b',fontSize:'11px',whiteSpace:'nowrap'}},
        isUnread ? h('span',{},
          h('span',{style:{display:'inline-block',width:'6px',height:'6px',borderRadius:'50%',background:'#ef4444',marginRight:'4px',verticalAlign:'middle'}}),
          fmtDate(tx.date)
        ) : fmtDate(tx.date)
      ),
      // ประเภท
      h('td',{},
        isCancelled
          ? h('span',{style:{fontSize:'10px',color:'#94a3b8',textDecoration:'line-through'}},'✗')
          : h('span',{className:'badge',style:{
              background:tx.type==='in'?'#dcfce7':'#fee2e2',
              color:tx.type==='in'?'#166534':'#991b1b',
              fontSize:'10px',padding:'2px 5px'
            }},tx.type==='in'?'⬇':'⬆')
      ),
      // รหัส (desktop only)
      h('td',{className:'desktop-only',style:{fontFamily:'monospace',fontSize:'11px',fontWeight:600,whiteSpace:'nowrap',textDecoration:isCancelled?'line-through':'',color:'#0f172a'}},
        tx.productCode||tx.productId
      ),
      // ชื่อสินค้า
      h('td',{className:'product-cell'},
        h('div',{className:'product-name',style:{textDecoration:isCancelled?'line-through':'',fontSize:'12px'}},
          p?p.name:(tx.productId||tx.productCode)
        ),
        // แสดงลูกค้าถ้ามีและเป็นรายการจ่ายออก
        tx.project&&tx.type==='out'&&!isCancelled?h('div',{style:{fontSize:'10px',color:'#0ea5e9',fontWeight:500,marginTop:'1px',cursor:'pointer'},
          onClick:e=>{e.stopPropagation();editTransactionProject(tx);}},'→ '+tx.project+' ✏'):null,
        // แสดงรหัสใต้ชื่อบนมือถือ
        h('div',{className:'mobile-code',style:{fontSize:'10px',color:'#94a3b8',fontFamily:'monospace'}},
          (tx.productCode||tx.productId)+(tx.lot?' · '+tx.lot:'')
        )
      ),
      // จำนวน
      h('td',{style:{textAlign:'right',fontWeight:700,fontSize:'12px',
        color:isCancelled?'#94a3b8':tx.type==='in'?'#059669':'#ef4444',
        textDecoration:isCancelled?'line-through':'',fontVariantNumeric:'tabular-nums',whiteSpace:'nowrap'
      }},(tx.type==='in'?'+':'-')+fmtNum(tx.sqm,2)),
      // Lot (desktop only)
      h('td',{className:'desktop-only',style:{fontFamily:'monospace',fontSize:'11px',color:tx.lot?'#0f172a':'#cbd5e1',fontWeight:tx.lot?600:400}},tx.lot||'-'),
      // โปรเจค (desktop only)
      h('td',{className:'desktop-only',style:{color:'#475569',fontSize:'11px',maxWidth:'100px',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},tx.project||'-'),
      // บันทึกโดย (desktop only)
      h('td',{className:'desktop-only',style:{color:'#64748b',fontSize:'11px',fontWeight:500}},tx.addedBy||'-'),
      // หมายเหตุ (desktop only)
      h('td',{className:'desktop-only',style:{color:'#64748b',fontSize:'11px',maxWidth:'120px',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},
        isCancelled
          ? h('span',{style:{color:'#ef4444',fontSize:'10px'}},(tx.cancelBy||'')+': '+(tx.cancelReason||'-'))
          : (tx.note||'-')
      ),
      // ปุ่มแก้ไข + ยกเลิก
      h('td',{style:{textAlign:'center',whiteSpace:'nowrap'}},
        h('div',{style:{display:'flex',gap:'4px',justifyContent:'center'}},
          !isCancelled && (canEdit()||isAdmin())
            ? h('button',{className:'btn btn-outline',style:{fontSize:'10px',padding:'2px 6px'},
                onClick:e=>{e.stopPropagation();ui.selectedId=tx.rowIndex+'|'+tx.type;ui.modal='editTx';render();}},'✏️ แก้')
            : null,
          canCancel
            ? h('button',{className:'btn btn-danger',style:{fontSize:'10px',padding:'2px 6px'},
                onClick:e=>{e.stopPropagation();ui.selectedId=tx.rowIndex+'|'+tx.type;ui.modal='cancelTx';render();}},'ยกเลิก')
            : isCancelled ? h('span',{style:{fontSize:'10px',color:'#94a3b8'}},'✗')
            : diffDays>3 ? h('span',{style:{fontSize:'10px',color:'#e2e8f0'}},'—')
            : null
        )
      )
    );
    tbody.appendChild(row);
  });
}

// ===== ALERTS =====
function Alerts() {
  if (loadError||products.length===0) return EmptyOrError();
  const alerts=products.map(p=>({...p,stock:parseFloat(p.stock)||0,status:getStatus(p)})).filter(p=>p.status!=='ok').sort((a,b)=>{
    if(a.status!==b.status) return a.status==='out'?-1:1;
    return a.stock-b.stock;
  });

  return h('div',{className:'card',style:{overflow:'hidden'}},
    h('div',{style:{padding:'14px 16px',borderBottom:'1px solid #e2e8f0',display:'flex',justifyContent:'space-between',alignItems:'center'}},
      h('div',{style:{fontWeight:700,fontSize:'14px'}},
        '⚠ แจ้งเตือนสินค้า ',
        h('span',{style:{color:'#dc2626'}},'('+alerts.length+' รายการ)')
      )
    ),
    alerts.length===0?h('div',{className:'empty-state'},
      h('div',{className:'empty-icon'},'✓'),
      h('div',{style:{fontWeight:600,color:'#10b981'}},'ไม่มีสินค้าที่ต้องเติม')
    ):h('div',{style:{overflowX:'auto',maxHeight:'calc(100vh - 200px)',overflowY:'auto'}},
      h('table',{},
        h('thead',{style:{position:'sticky',top:0,zIndex:5}},
          h('tr',{},
            h('th',{style:{width:'140px'}},'รหัส'),
            h('th',{},'สินค้า'),
            h('th',{className:'desktop-only'},'ประเภท'),
            h('th',{style:{textAlign:'right'}},'คงเหลือ'),
            h('th',{style:{textAlign:'right'}},'ขั้นต่ำ'),
            h('th',{},'สถานะ'),
            h('th',{style:{width:'110px'}},'')
          )
        ),
        h('tbody',{},...alerts.map(p=>{
          const row = h('tr',{style:{cursor:'pointer'},
            onClick:e=>{
              if(e.target.tagName==='BUTTON') return;
              ui.selectedId=p.id;ui.modal='detail';render();
            }},
            h('td',{style:{fontFamily:'monospace',color:'#0f172a',fontSize:'13px',fontWeight:600,whiteSpace:'nowrap'}},p.code||p.id),
            h('td',{className:'product-cell'},
              h('div',{className:'product-name'},p.name),
              h('div',{className:'product-meta'},p.size||'')
            ),
            h('td',{className:'desktop-only',style:{fontSize:'12px',color:'#475569'}},p.type||'-'),
            h('td',{style:{textAlign:'right'}},h('span',{className:'stock-num',style:{color:p.status==='out'?'#dc2626':'#d97706',fontSize:'14px'}},fmtNum(p.stock,2))),
            h('td',{style:{textAlign:'right',color:'#64748b',fontSize:'12px'}},(p.minQty||5)+' ตร.ม'),
            h('td',{},badge(p.status)),
            h('td',{},
              h('button',{className:'btn btn-success',style:{padding:'4px 10px',fontSize:'12px'},
                onClick:e=>{
                  e.stopPropagation();
                  ui.selectedId=p.id;
                  const keepDate=ui.txForm.date||td();
                  ui.txForm={date:keepDate,qty:'',unit:'sqm',note:'',location:'',lot:'',project:''};
                  ui.modal='in';render();
                }},'+ รับเข้า')
            )
          );
          return row;
        }))
      )
    )
  );
}

// ===== TX MODAL (no re-render on input) =====
function TxModal(type) {
  const p=getSelected(); if(!p) return null;
  const stock=parseFloat(p.stock)||0;
  const color=type==='in'?'#059669':'#dc2626';

  const overlay=h('div',{className:'modal-overlay'});
  const modal=h('div',{className:'modal',style:{padding:'24px'}});

  // Header
  modal.appendChild(h('div',{style:{marginBottom:'20px'}},
    h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}},
      h('div',{style:{flex:1,minWidth:0}},
        h('div',{style:{display:'flex',alignItems:'center',gap:'8px',marginBottom:'8px'}},
          h('span',{style:{fontSize:'20px'}},type==='in'?'⬇':'⬆'),
          h('div',{style:{fontWeight:700,fontSize:'16px',color}},type==='in'?'รับสินค้าเข้า':'จ่ายสินค้าออก')
        ),
        h('div',{style:{fontSize:'13px',color:'#0f172a',fontWeight:500,marginBottom:'4px'}},p.name),
        h('div',{style:{fontSize:'12px',color:'#64748b',fontFamily:'monospace'}},
          (p.code||'')+' · สต็อก: ',
          h('span',{style:{fontWeight:700,color:'#0f172a'}},fmtNum(stock,3)),
          ' ตร.ม'
        )
      ),
      h('button',{className:'btn btn-ghost',style:{padding:'5px 9px'},onClick:()=>{ui.modal=null;render();}},'✕')
    )
  ));

  const form=h('div',{style:{display:'flex',flexDirection:'column',gap:'14px'}});

  // วันที่
  const inpDate=h('input',{type:'date',className:'input',value:ui.txForm.date});
  form.appendChild(h('div',{},h('label',{className:'field-label'},'วันที่'),inpDate));

  // หน่วย
  const unitDiv=h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:'6px'}});
  const units=[{k:'sqm',l:'ตร.ม',sub:'1 = 1 ตร.ม'},{k:'box',l:'กล่อง',sub:(p.pcsPerBox||1)+' แผ่น'},{k:'pc',l:'แผ่น',sub:fmtNum(p.sqmPerPc||0,4)+' ตร.ม'}];
  function refreshUnitBtns() {
    unitDiv.innerHTML='';
    units.forEach(u=>{
      const active=ui.txForm.unit===u.k;
      const btn=document.createElement('button');
      btn.style.cssText='padding:9px 8px;border:1.5px solid '+(active?color:'#e2e8f0')+';border-radius:8px;background:'+(active?(type==='in'?'#f0fdf4':'#fef2f2'):'white')+';cursor:pointer;font-family:inherit;text-align:center;transition:all .12s';
      btn.innerHTML='<div style="font-weight:'+(active?700:500)+';font-size:13px;color:'+(active?color:'#0f172a')+'">'+u.l+'</div>'+'<div style="font-size:10px;color:#64748b;margin-top:2px">'+u.sub+'</div>';
      btn.addEventListener('click',()=>{ui.txForm.unit=u.k;refreshUnitBtns();updatePreview();});
      unitDiv.appendChild(btn);
    });
  }
  refreshUnitBtns();
  form.appendChild(h('div',{},h('label',{className:'field-label'},'หน่วย'),unitDiv));

  // จำนวน
  const inpQty=h('input',{type:'number',className:'input',placeholder:'0',min:'0',step:'0.01',style:{fontSize:'16px',fontWeight:600}});
  inpQty.value=ui.txForm.qty||'';
  const preview=h('div',{style:{marginTop:'6px',fontSize:'12px',padding:'8px 12px',borderRadius:'6px',display:'none',background:'#f8fafc',border:'1px solid #e2e8f0'}});
  function updatePreview() {
    const sqm=calcSqm(inpQty.value,ui.txForm.unit,p);
    const remaining=type==='out'?stock-sqm:stock+sqm;
    if(sqm>0){
      preview.style.display='block';
      const ok = type==='out' ? remaining>=0 : true;
      preview.innerHTML='<div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="color:#64748b">รวมเป็น:</span><span style="font-weight:700;color:#0f172a">'+fmtNum(sqm,3)+' ตร.ม</span></div>'+
        '<div style="display:flex;justify-content:space-between"><span style="color:#64748b">'+(type==='out'?'คงเหลือหลังจ่าย:':'รวมหลังรับ:')+'</span><span style="font-weight:700;color:'+(ok?'#059669':'#dc2626')+'">'+fmtNum(Math.max(0,remaining),3)+' ตร.ม</span></div>';
    } else { preview.style.display='none'; }
  }
  inpQty.addEventListener('input',updatePreview);
  form.appendChild(h('div',{},h('label',{className:'field-label'},'จำนวน'),inpQty,preview));

  // 2-column row: ที่เก็บ + หมายเหตุ
  const row=h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'10px'}});

  const inpLoc=h('input',{className:'input',placeholder:'เช่น P14, หน้าบ้าน'});
  inpLoc.value=ui.txForm.location||'';
  row.appendChild(h('div',{},h('label',{className:'field-label'},'ที่เก็บ'),inpLoc));

  const inpNote=h('input',{className:'input',placeholder:'โน๊ตเพิ่มเติม...'});
  inpNote.value=ui.txForm.note||'';
  row.appendChild(h('div',{},h('label',{className:'field-label'},'หมายเหตุ'),inpNote));
  form.appendChild(row);

  // === LOT === ===========================================
  const lotRow = h('div',{style:{display:'grid',gridTemplateColumns: type==='out'?'1fr 1fr':'1fr',gap:'10px'}});
  const productLots = getLotsForProduct(p.id);
  const lotWarn = h('div',{style:{fontSize:'11px',marginTop:'4px',display:'none',color:'#d97706',fontWeight:500}});

  let inpLot;
  if (type === 'in') {
    // รับเข้า: input + custom suggestion (รองรับ iOS)
    const lotWrap = h('div',{style:{position:'relative'}});
    inpLot = h('input',{className:'input',placeholder:'เช่น Lot A, 2025-01'});
    inpLot.value = ui.txForm.lot || '';

    // custom dropdown สำหรับ suggestion
    const suggBox = h('div',{style:{
      position:'absolute',top:'100%',left:0,right:0,zIndex:50,
      background:'white',border:'1px solid #e2e8f0',borderRadius:'7px',
      boxShadow:'0 4px 12px rgba(0,0,0,.1)',display:'none',maxHeight:'180px',overflowY:'auto',marginTop:'2px'
    }});

    function showSuggestions(q) {
      const filtered = q
        ? productLots.filter(l => String(l.lot).toLowerCase().includes(q.toLowerCase()))
        : productLots;
      suggBox.innerHTML = '';
      if (filtered.length === 0) { suggBox.style.display='none'; return; }
      filtered.forEach(l => {
        const item = h('div',{style:{padding:'8px 12px',cursor:'pointer',fontSize:'13px',borderBottom:'1px solid #f1f5f9'}},
          h('span',{style:{fontWeight:600,fontFamily:'monospace'}},l.lot),
          h('span',{style:{color:'#64748b',marginLeft:'8px',fontSize:'11px'}},'เหลือ '+fmtNum(l.stock,3)+' ตร.ม')
        );
        item.addEventListener('mousedown', e => { e.preventDefault(); inpLot.value = l.lot; suggBox.style.display='none'; checkNewLot(); });
        item.addEventListener('touchstart', e => { e.preventDefault(); inpLot.value = l.lot; suggBox.style.display='none'; checkNewLot(); });
        suggBox.appendChild(item);
      });
      suggBox.style.display = 'block';
    }

    inpLot.addEventListener('focus', () => showSuggestions(inpLot.value));
    inpLot.addEventListener('input', () => { showSuggestions(inpLot.value); checkNewLot(); });
    inpLot.addEventListener('blur', () => setTimeout(()=>{ suggBox.style.display='none'; }, 200));

    lotWrap.appendChild(inpLot);
    lotWrap.appendChild(suggBox);

    function checkNewLot() {
      const v = inpLot.value.trim();
      if (!v) { lotWarn.style.display='none'; return; }
      const exists = productLots.some(l => String(l.lot).trim() === v);
      if (!exists) {
        lotWarn.innerHTML='⚠ เป็น Lot ใหม่ ระบบจะสร้างให้อัตโนมัติ';
        lotWarn.style.color='#d97706';
        lotWarn.style.display='block';
      } else {
        const lot = productLots.find(l => String(l.lot).trim() === v);
        lotWarn.innerHTML='✓ Lot นี้มีอยู่แล้ว ('+fmtNum(lot.stock,3)+' ตร.ม) จะบวกเพิ่ม';
        lotWarn.style.color='#059669';
        lotWarn.style.display='block';
      }
    }
    inpLot.addEventListener('input',checkNewLot);
    setTimeout(checkNewLot,50);
    lotRow.appendChild(h('div',{},h('label',{className:'field-label'},'Lot ★'),lotWrap,lotWarn));
  } else {
    // จ่ายออก: dropdown เลือก lot ที่มีของ
    inpLot = h('select',{className:'input',style:{cursor:'pointer'}});
    if (productLots.length === 0) {
      const opt = document.createElement('option');
      opt.value = ''; opt.textContent = '— ไม่มี Lot ในระบบ —';
      inpLot.appendChild(opt);
    } else {
      const optDef = document.createElement('option');
      optDef.value = ''; optDef.textContent = '— เลือก Lot —';
      inpLot.appendChild(optDef);
      productLots.sort((a,b) => (a.lot||'').localeCompare(b.lot||'')).forEach(l => {
        const opt = document.createElement('option');
        opt.value = l.lot;
        opt.textContent = l.lot + ' (' + fmtNum(l.stock,3) + ' ตร.ม)';
        if (ui.txForm.lot === l.lot) opt.selected = true;
        inpLot.appendChild(opt);
      });
    }
    inpLot.addEventListener('change',e=>{
      ui.txForm.lot = e.target.value;
      const lot = productLots.find(l=>l.lot===e.target.value);
      if (lot) {
        lotWarn.innerHTML='คงเหลือ Lot นี้: <b>'+fmtNum(lot.stock,3)+' ตร.ม</b>';
        lotWarn.style.color='#0ea5e9';
        lotWarn.style.display='block';
      } else lotWarn.style.display='none';
    });
    lotRow.appendChild(h('div',{},h('label',{className:'field-label'},'Lot ★'),inpLot,lotWarn));
  }

  // === PROJECT (จ่ายออกเท่านั้น) ===
  let inpProject;
  if (type === 'out') {
    const projWrap = h('div',{style:{position:'relative'}});
    inpProject = h('input',{className:'input',placeholder:'พิมพ์ชื่อโปรเจค/ลูกค้า',list:'project-suggestions'});
    inpProject.value = ui.txForm.project || '';
    const pdl = h('datalist',{id:'project-suggestions'});
    projects.forEach(pr => pdl.appendChild(h('option',{value:pr})));
    projWrap.appendChild(inpProject);
    projWrap.appendChild(pdl);
    const projHint = h('div',{style:{fontSize:'11px',marginTop:'4px',color:'#64748b'}},'พิมพ์ใหม่ระบบจะจำให้ครั้งต่อไป');
    lotRow.appendChild(h('div',{},h('label',{className:'field-label'},'โปรเจค/ลูกค้า'),projWrap,projHint));
  }

  form.appendChild(lotRow);

  // ปุ่ม
  const cancelBtn=h('button',{className:'btn btn-outline',style:{flex:1,justifyContent:'center',padding:'10px'}},'ยกเลิก');
  cancelBtn.addEventListener('click',()=>{ui.modal=null;render();});

  const saveBtn=h('button',{className:'btn '+(type==='in'?'btn-success':'btn-danger'),style:{flex:2,justifyContent:'center',padding:'10px',fontSize:'14px'}},
    type==='in'?'✓ บันทึกรับเข้า':'✓ บันทึกจ่ายออก'
  );
  saveBtn.addEventListener('click',async()=>{
    ui.txForm.date=inpDate.value;
    ui.txForm.qty=inpQty.value;
    ui.txForm.location=inpLoc.value;
    ui.txForm.note=inpNote.value;
    // อ่านค่า lot จาก dropdown โดยตรง
    const currentLot = inpLot ? inpLot.value.trim() : ui.txForm.lot;
    ui.txForm.lot = currentLot;
    ui.txForm.project=inpProject ? inpProject.value.trim() : '';

    // validation
    if (!ui.txForm.lot) {
      showToast('กรุณาระบุ Lot','err');
      return;
    }
    if (type==='out') {
      const sqm=calcSqm(inpQty.value,ui.txForm.unit,p);
      const lotInfo = productLots.find(l=>String(l.lot).trim()===String(ui.txForm.lot).trim());
      if (!lotInfo) { showToast('ไม่พบ Lot นี้ในระบบ','err'); return; }
      if (lotInfo.stock < sqm) { showToast('สต็อก Lot '+ui.txForm.lot+' ไม่พอ! เหลือ '+fmtNum(lotInfo.stock,3)+' ตร.ม','err'); return; }
    }

    saveBtn.disabled=true; cancelBtn.disabled=true;
    saveBtn.innerHTML='⏳ กำลังบันทึก...';
    await doTx(type);
  });

  form.appendChild(h('div',{style:{display:'flex',gap:'8px',marginTop:'6px'}},cancelBtn,saveBtn));
  modal.appendChild(form);
  overlay.appendChild(modal);
  overlay.addEventListener('click',e=>{if(e.target===overlay&&!isSaving){ui.modal=null;render();}});

  setTimeout(()=>inpQty.focus(),100);
  return overlay;
}

  const selName = h('select',{className:'input',style:{cursor:'pointer'}});

  userNames.forEach(n => {
    const opt = document.createElement('option');
    opt.value = n; opt.textContent = n;
    selName.appendChild(opt);
  });
  nameWrap.appendChild(selName);
  card.appendChild(nameWrap);

  // Password
  const pwWrap = h('div',{style:{marginBottom:'20px'}});
  pwWrap.appendChild(h('label',{style:{fontSize:'12px',fontWeight:600,color:'#374151',display:'block',marginBottom:'5px'}},'รหัสผ่าน'));
  const pwRow = h('div',{style:{position:'relative'}});
  const inpPw = h('input',{type:'password',className:'input',placeholder:'••••••••',style:{paddingRight:'44px'}});
  const toggleBtn = h('button',{type:'button',style:{position:'absolute',right:'10px',top:'50%',transform:'translateY(-50%)',background:'none',border:'none',cursor:'pointer',fontSize:'16px',color:'#94a3b8',padding:'0',lineHeight:'1'}},'👁');
  let pwVisible = false;
  toggleBtn.addEventListener('click',()=>{
    pwVisible = !pwVisible;
    inpPw.type = pwVisible ? 'text' : 'password';
    toggleBtn.textContent = pwVisible ? '🙈' : '👁';
  });
  pwRow.appendChild(inpPw);
  pwRow.appendChild(toggleBtn);
  pwWrap.appendChild(pwRow);
  card.appendChild(pwWrap);

  const loginBtn = h('button',{className:'btn btn-primary',style:{width:'100%',justifyContent:'center',padding:'11px',fontSize:'14px'}},'เข้าสู่ระบบ');

  async function doLogin() {
    const name = selName.value.trim();
    const pw = inpPw.value.trim();
    if (!name) { errMsg.textContent='กรุณาเลือกชื่อผู้ใช้'; errMsg.style.display='block'; return; }
    if (!pw) { errMsg.textContent='กรุณากรอกรหัสผ่าน'; errMsg.style.display='block'; return; }
    loginBtn.disabled = true; loginBtn.textContent = '⏳ กำลังตรวจสอบ...';
    const result = await apiLogin(name, pw);
    if (result.success) {
      currentUser = result.user;
      ui.view = 'dashboard'; // เริ่มที่ dashboard เสมอ
      saveSession(currentUser);
      showToast('ยินดีต้อนรับ '+currentUser.name+' 👋');
      await fetchProducts();
      fetchTransactions(); fetchLots(); fetchProjects(); fetchReservations(); fetchDeliveryOrders();
      fetchLastRead(); // โหลด lastRead หลัง login
      render();
    } else {
      errMsg.textContent = result.error || 'ล็อกอินไม่สำเร็จ';
      errMsg.style.display = 'block';
      loginBtn.disabled = false; loginBtn.textContent = 'เข้าสู่ระบบ';
      inpPw.value = '';
    }
  }

  loginBtn.addEventListener('click', doLogin);
  inpPw.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
  card.appendChild(loginBtn);

  card.appendChild(h('div',{style:{textAlign:'center',marginTop:'16px',fontSize:'12px',color:'#94a3b8'}},'หากลืมรหัสผ่าน กรุณาติดต่อ Admin'));
  wrap.appendChild(card);
  return wrap;
}

  let selectedFile = null;

  fileInput.addEventListener('change', e => {
    const file = e.target.files[0];
    if (!file) return;
    if (file.size > 5 * 1024 * 1024) { errDiv.textContent='ไฟล์ใหญ่เกิน 5MB'; errDiv.style.display='block'; return; }
    selectedFile = file;
    errDiv.style.display='none';

    // preview รูปที่เลือก
    const reader = new FileReader();
    reader.onload = ev => {
      previewImg.innerHTML = '';
      const img = document.createElement('img');
      img.src = ev.target.result; img.style.cssText='width:100%;height:100%;object-fit:cover';
      previewImg.appendChild(img);
      previewWrap.lastElementChild.textContent = file.name + ' (' + (file.size/1024).toFixed(0) + ' KB)';
    };
    reader.readAsDataURL(file);

    uploadArea.style.borderColor = '#0ea5e9';
    uploadArea.style.background = '#f0f9ff';
  });

  uploadArea.addEventListener('click', () => fileInput.click());
  uploadArea.addEventListener('dragover', e => { e.preventDefault(); uploadArea.style.borderColor='#0ea5e9'; });
  uploadArea.addEventListener('dragleave', () => { uploadArea.style.borderColor='#e2e8f0'; });
  uploadArea.addEventListener('drop', e => {
    e.preventDefault();
    const file = e.dataTransfer.files[0];
    if (file) { fileInput.files = e.dataTransfer.files; fileInput.dispatchEvent(new Event('change')); }
  });
  modal.appendChild(uploadArea);
  modal.appendChild(fileInput);

  const saveBtn = h('button',{className:'btn btn-primary',style:{flex:2,justifyContent:'center',padding:'10px'}},'✓ อัปโหลดรูป → Drive');
  saveBtn.addEventListener('click', async() => {
    if (!selectedFile) { errDiv.textContent='กรุณาเลือกรูปก่อน'; errDiv.style.display='block'; return; }
    saveBtn.disabled=true; isSaving=true;
    saveBtn.textContent='⏳ กำลังอัปโหลด...';
    errDiv.style.display='none';

    try {
      // แปลงไฟล์เป็น base64
      const base64 = await new Promise((res,rej) => {
        const reader = new FileReader();
        reader.onload = e => res(e.target.result.split(',')[1]);
        reader.onerror = rej;
        reader.readAsDataURL(selectedFile);
      });

      const result = await apiUploadImage(p.id, selectedFile.name, selectedFile.type, base64);

      if (result.success) {
        // อัปเดต imageUrl ใน local products array
        const idx = products.findIndex(x=>x.id===p.id);
        if (idx>=0) products[idx].imageUrl = result.viewUrl;

        isSaving=false; ui.modal='detail';
        showToast('✓ อัปโหลดรูปสำเร็จ · บันทึกลง Drive แล้ว 🎉');
        render();
      } else {
        throw new Error(result.error || 'อัปโหลดไม่สำเร็จ');
      }
    } catch(e) {
      errDiv.textContent='❌ '+e.message;
      errDiv.style.display='block';
      saveBtn.disabled=false; isSaving=false;
      saveBtn.textContent='✓ อัปโหลดรูป → Drive';
    }
  });

  modal.appendChild(h('div',{style:{display:'flex',gap:'8px',flexWrap:'wrap'}},
    h('button',{className:'btn btn-outline',style:{flex:1,justifyContent:'center',padding:'10px'},onClick:()=>{ui.modal='detail';render();}},'← กลับ'),
    p.imageUrl ? h('button',{className:'btn btn-danger',style:{justifyContent:'center',padding:'10px'},
      onClick:async()=>{
        if(!confirm('ลบรูปออกจาก Drive ด้วยไหมครับ?')) return;
        const url = API_URL + '?' + new URLSearchParams({action:'deleteImage', productId:p.id});
        const res = await fetch(url);
        const data = await res.json();
        if(data.success){
          const idx = products.findIndex(x=>x.id===p.id);
          if(idx>=0) products[idx].imageUrl = '';
          showToast('✓ ลบรูปเรียบร้อย');
          ui.modal='detail';
          render();
        } else {
          showToast('❌ '+data.error,'err');
        }
      }},'🗑 ลบรูป') : null,
    saveBtn
  ));

  overlay.appendChild(modal);
  return overlay;
}

// ===== EDIT PRODUCT MODAL =====
function EditProductModal() {
  const p = getSelected(); if (!p) return null;
  const isAdminUser = isAdmin();

  const overlay = h('div',{className:'modal-overlay',onClick:e=>{if(e.target===overlay&&!isSaving){ui.modal='detail';render();}}});
  const modal = h('div',{className:'modal',style:{padding:'24px',maxWidth:'560px'}});

  modal.appendChild(h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'18px'}},
    h('div',{},
      h('div',{style:{fontWeight:700,fontSize:'16px'}},'✏️ แก้ไขสินค้า'),
      h('div',{style:{color:'#64748b',fontSize:'12px',marginTop:'2px'}},p.name)
    ),
    h('button',{className:'btn btn-ghost',style:{padding:'5px 9px'},onClick:()=>{ui.modal='detail';render();}},'✕')
  ));

  const errDiv = h('div',{style:{background:'#fee2e2',color:'#991b1b',borderRadius:'8px',padding:'9px 12px',fontSize:'13px',marginBottom:'12px',display:'none'}});
  modal.appendChild(errDiv);

  // ฟิลด์ต่างๆ
  const inpCode = h('input',{className:'input',placeholder:'รหัสสินค้า',value:p.id||''});
  const inpName = h('input',{className:'input',placeholder:'ชื่อ/รายละเอียด',value:p.name||''});
  const inpType = h('input',{className:'input',placeholder:'ประเภท',value:p.type||'',list:'edit-type-list'});
  const typeList = h('datalist',{id:'edit-type-list'});
  Array.from(new Set(products.map(x=>x.type).filter(Boolean))).sort().forEach(t=>{
    const opt=document.createElement('option'); opt.value=t; typeList.appendChild(opt);
  });
  modal.appendChild(typeList);

  const inpPcsPerBox = h('input',{type:'number',className:'input',min:'0',step:'1',value:p.pcsPerBox||''});
  const inpSqmPerPc = h('input',{type:'number',className:'input',min:'0',step:'0.0001',value:p.sqmPerPc||''});
  const inpSize = h('input',{className:'input',placeholder:'เช่น 296*297',value:p.size||''});
  const inpChipSize = h('input',{className:'input',placeholder:'เช่น 15*297',value:p.chipSize||''});
  const inpMinQty = h('input',{type:'number',className:'input',min:'0',step:'0.1',value:p.minQty||''});

  // warning รหัสซ้ำ
  const codeWarn = h('div',{style:{fontSize:'11px',marginTop:'4px',display:'none',fontWeight:500}});
  inpCode.addEventListener('input',()=>{
    const v = inpCode.value.trim();
    if (!v || v === p.id) { codeWarn.style.display='none'; return; }
    const exists = products.find(x=>x.id===v||x.code===v);
    if (exists && exists.id !== p.id) {
      codeWarn.innerHTML='⚠ รหัสนี้มีอยู่แล้ว: <b>'+exists.name+'</b>';
      codeWarn.style.color='#dc2626'; codeWarn.style.display='block';
    } else {
      codeWarn.innerHTML='✓ รหัสนี้ใช้ได้';
      codeWarn.style.color='#059669'; codeWarn.style.display='block';
    }
  });

  // preview
  const preview = h('div',{style:{fontSize:'12px',color:'#64748b',background:'#f8fafc',padding:'8px 12px',borderRadius:'6px',marginTop:'6px',display:'none'}});
  function updatePreview() {
    const pcs = parseFloat(inpPcsPerBox.value)||0;
    const sqm = parseFloat(inpSqmPerPc.value)||0;
    if (pcs>0 && sqm>0) {
      preview.style.display='block';
      preview.textContent = '1 กล่อง = '+pcs+' แผ่น × '+sqm+' ตร.ม = '+(pcs*sqm).toFixed(4)+' ตร.ม/กล่อง';
    } else preview.style.display='none';
  }
  inpPcsPerBox.addEventListener('input',updatePreview);
  inpSqmPerPc.addEventListener('input',updatePreview);
  updatePreview();

  const form = h('div',{style:{display:'flex',flexDirection:'column',gap:'12px'}});

  // รหัส (Admin เท่านั้น)
  form.appendChild(h('div',{},
    h('label',{className:'field-label'},isAdminUser?'รหัสสินค้า (Admin เท่านั้น)':'รหัสสินค้า (ดูได้อย่างเดียว)'),
    isAdminUser ? h('div',{},inpCode,codeWarn) :
    h('div',{style:{background:'#f8fafc',border:'1px solid #e2e8f0',borderRadius:'7px',padding:'9px 12px',fontSize:'13px',fontFamily:'monospace',color:'#64748b'}},p.id)
  ));

  form.appendChild(h('div',{},h('label',{className:'field-label'},'ชื่อ/รายละเอียด ★'),inpName));
  form.appendChild(h('div',{},h('label',{className:'field-label'},'ประเภท ★'),inpType));
  form.appendChild(h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'10px'}},
    h('div',{},h('label',{className:'field-label'},'แผ่น/กล่อง'),inpPcsPerBox),
    h('div',{},h('label',{className:'field-label'},'ตร.ม/แผ่น'),inpSqmPerPc)
  ));
  form.appendChild(preview);
  form.appendChild(h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'10px'}},
    h('div',{},h('label',{className:'field-label'},'Sheet size'),inpSize),
    h('div',{},h('label',{className:'field-label'},'Chip size'),inpChipSize)
  ));
  form.appendChild(h('div',{},h('label',{className:'field-label'},'สต็อกขั้นต่ำ (ตร.ม)'),inpMinQty));

  const saveBtn = h('button',{className:'btn btn-primary',style:{flex:2,justifyContent:'center',padding:'10px'}},'✓ บันทึกการแก้ไข → Sheet');
  saveBtn.addEventListener('click', async()=>{
    const name = inpName.value.trim();
    const type = inpType.value.trim();
    if (!name) { errDiv.textContent='กรุณากรอกชื่อสินค้า'; errDiv.style.display='block'; return; }
    if (!type) { errDiv.textContent='กรุณากรอกประเภท'; errDiv.style.display='block'; return; }

    const newCode = inpCode.value.trim();
    if (isAdminUser && newCode && newCode !== p.id) {
      const dup = products.find(x=>(x.id===newCode||x.code===newCode) && x.id!==p.id);
      if (dup) { errDiv.textContent='รหัส "'+newCode+'" มีอยู่แล้ว'; errDiv.style.display='block'; return; }
    }

    saveBtn.disabled=true; isSaving=true;
    saveBtn.textContent='⏳ กำลังบันทึก...';
    errDiv.style.display='none';

    try {
      const url = API_URL + "?" + new URLSearchParams({
        action: 'updateProduct',
        targetId: p.id,
        newCode: isAdminUser ? newCode : '',
        name, type,
        pcsPerBox: inpPcsPerBox.value.trim(),
        sqmPerPc: inpSqmPerPc.value.trim(),
        size: inpSize.value.trim(),
        chipSize: inpChipSize.value.trim(),
        minQty: inpMinQty.value.trim(),
      });
      const res = await fetch(url);
      const data = await res.json();

      if (data.success) {
        isSaving=false; ui.modal=null;
        showToast('✓ แก้ไขสินค้าสำเร็จ');
        await fetchProducts();
        render();
      } else {
        errDiv.textContent = data.error || 'เกิดข้อผิดพลาด';
        errDiv.style.display='block';
        saveBtn.disabled=false; isSaving=false;
        saveBtn.textContent='✓ บันทึกการแก้ไข → Sheet';
      }
    } catch(e) {
      errDiv.textContent='❌ '+e.message;
      errDiv.style.display='block';
      saveBtn.disabled=false; isSaving=false;
      saveBtn.textContent='✓ บันทึกการแก้ไข → Sheet';
    }
  });

  const discontinued = isDiscontinued(p);

  form.appendChild(h('div',{style:{display:'flex',gap:'8px',marginTop:'4px'}},
    h('button',{className:'btn btn-outline',style:{flex:1,justifyContent:'center',padding:'10px'},
      onClick:()=>{ui.modal='detail';render();}},'← กลับ'),
    saveBtn
  ));

  // ปุ่มเลิกขาย / คืนสถานะ
  form.appendChild(h('div',{style:{marginTop:'8px',paddingTop:'12px',borderTop:'1px solid #f1f5f9'}},
    h('button',{
      className:'btn '+(discontinued?'btn-success':'btn-danger'),
      style:{width:'100%',justifyContent:'center',padding:'9px',fontSize:'13px'},
      onClick:async()=>{
        const msg = discontinued
          ? 'คืนสถานะ "'+p.name+'" กลับมาขายได้?'
          : 'เลิกขาย "'+p.name+'" จะซ่อนสินค้านี้จากแอป ยืนยัน?';
        if (!confirm(msg)) return;
        const newStatus = discontinued ? 'OK' : 'ยกเลิก';
        const url = API_URL + "?" + new URLSearchParams({ action:'toggleProductStatus', targetId:p.id, newStatus });
        const res = await fetch(url);
        const data = await res.json();
        if (data.success) {
          showToast(discontinued?'✓ คืนสถานะสำเร็จ':'✓ เลิกขายสินค้าแล้ว');
          ui.modal=null;
          await fetchProducts();
          render();
        } else {
          showToast('❌ '+data.error,'err');
        }
      }
    }, discontinued?'✓ คืนสถานะ → กลับมาขาย':'🚫 เลิกขายสินค้านี้')
  ));

  modal.appendChild(form);
  overlay.appendChild(modal);
  return overlay;
}

  const inpProject = h('input',{className:'input',value:tx.project||'',placeholder:'ชื่อลูกค้า / โปรเจค'});

    saveBtn.textContent='⏳ กำลังบันทึก...';
    errDiv.style.display='none';

    try {
      const url = API_URL + '?' + new URLSearchParams({
        action: 'editTransaction',
        rowIndex: tx.rowIndex,
        txType: tx.type,
        sqm: newSqm,
        lot: inpLot.value.trim(),
        project: inpProject.value.trim(),
        location: inpLocation.value.trim(),
        editBy: currentUser?currentUser.name:''

        isSaving=false; ui.modal=null;
        showToast('✓ แก้ไขรายการสำเร็จ');

        await fetchProducts();
        await fetchLots();
        render();

        isSaving=false;
        saveBtn.disabled=false;
        saveBtn.textContent='💾 บันทึกการแก้ไข';
        errDiv.textContent='❌ '+(data.error||'บันทึกไม่สำเร็จ');
        errDiv.style.display='block';

      isSaving=false;
      saveBtn.disabled=false;
      saveBtn.textContent='💾 บันทึกการแก้ไข';
      errDiv.textContent='❌ '+e.message;
      errDiv.style.display='block';

  modal.appendChild(h('div',{style:{display:'flex',gap:'8px'}},
    h('button',{className:'btn btn-ghost',style:{flex:1,justifyContent:'center',padding:'10px'},
      onClick:()=>{ui.modal=null;render();}},'ยกเลิก'),
    saveBtn
  ));

  overlay.appendChild(modal);
  return overlay;
}

    confirmBtn.disabled=true; isSaving=true;
    confirmBtn.textContent='⏳ กำลังยกเลิก...';
    errDiv.style.display='none';

    try {
      const url = API_URL + "?" + new URLSearchParams({
        action: 'cancelTransaction',
        rowIndex: tx.rowIndex,
        txType: tx.type,
        reason,
        cancelBy: currentUser ? currentUser.name : ''
      });
      const res = await fetch(url);
      const data = await res.json();

      if (data.success) {
        isSaving=false; ui.modal=null;
        showToast('✓ ยกเลิกรายการสำเร็จ · สต็อกถูกคืนแล้ว');

        // ถ้ารายการจ่ายออกมาจากการจอง → ยกเลิกการจองด้วย
        if (tx.type==='out' && tx.note && tx.note.includes('จากการจอง')) {
          const resId = tx.note.replace('จากการจอง','').trim();
          if (resId) {
            await fetch(API_URL+'?'+new URLSearchParams({action:'cancelReservation',resId}));
            await fetchReservations();
          }
        }

        await Promise.all([fetchProducts(), fetchTransactions(), fetchLots()]);
        render();
      } else {
        errDiv.textContent = data.error || 'เกิดข้อผิดพลาด';
        errDiv.style.display='block';
        confirmBtn.disabled=false; isSaving=false;
        confirmBtn.textContent='↩ ยืนยันยกเลิกรายการ';
      }
    } catch(e) {
      errDiv.textContent='❌ '+e.message;
      errDiv.style.display='block';
      confirmBtn.disabled=false; isSaving=false;
      confirmBtn.textContent='↩ ยืนยันยกเลิกรายการ';
    }
  });

  modal.appendChild(h('div',{style:{display:'flex',gap:'8px'}},
    h('button',{className:'btn btn-outline',style:{flex:1,justifyContent:'center',padding:'10px'},onClick:()=>{ui.modal=null;render();}},'ยกเลิก'),
    confirmBtn
  ));

  overlay.appendChild(modal);
  setTimeout(()=>inpReason.focus(),100);
  return overlay;
}

  const inpR = h('input',{className:'input',placeholder:'ผิว เช่น G, M, N',style:{textTransform:'uppercase'}});
