<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CostCalc Pro</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --primary: #6366f1;
  --primary-dark: #4f46e5;
  --success: #10b981;
  --danger: #ef4444;
  --warning: #f59e0b;
  --dark: #0f172a;
  --mid: #475569;
  --light: #94a3b8;
  --border: #e2e8f0;
  --bg: #f1f5f9;
  --white: #ffffff;
  --sidebar-bg: #0f172a;
  --radius: 10px;
  --radius-sm: 7px;
  --shadow: 0 1px 3px rgba(0,0,0,.08),0 0 0 1px rgba(15,23,42,.06);
  --shadow-md: 0 4px 16px rgba(0,0,0,.1);
  --shadow-lg: 0 20px 60px rgba(0,0,0,.2);
  --orange: #f97316;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'IBM Plex Sans Thai','Inter',sans-serif;background:var(--bg);color:var(--dark);min-height:100vh;font-size:14px;-webkit-tap-highlight-color:transparent}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px}
.card{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
.btn{border:none;cursor:pointer;font-family:inherit;font-size:13px;border-radius:var(--radius-sm);padding:8px 16px;font-weight:600;transition:all .15s;display:inline-flex;align-items:center;gap:6px;line-height:1;white-space:nowrap}
.btn:hover{filter:brightness(.94);transform:translateY(-1px)}
.btn:active{transform:scale(.97) translateY(0)}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.btn-primary{background:var(--primary);color:white;box-shadow:0 2px 8px rgba(99,102,241,.3)}
.btn-success{background:var(--success);color:white}
.btn-danger{background:var(--danger);color:white}
.btn-ghost{background:transparent;color:var(--mid);border:1px solid transparent}
.btn-ghost:hover{background:var(--bg);border-color:var(--border)}
.btn-outline{background:var(--white);color:var(--mid);border:1.5px solid var(--border)}
input,select,textarea{font-family:inherit;font-size:13px;outline:none}
.input{width:100%;padding:9px 13px;border:1.5px solid var(--border);border-radius:var(--radius-sm);transition:all .15s;background:var(--white);color:var(--dark);font-weight:500}
.input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(99,102,241,.12)}
.input::placeholder{color:#b0bec5;font-weight:400}
.input-highlight{border-color:#a5b4fc;background:#eef2ff}
.input-warn{border-color:#fca5a5;background:#fff1f2}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:5px;font-size:11px;font-weight:700;line-height:1.4}
.modal-overlay{position:fixed;inset:0;background:rgba(15,23,42,.6);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(4px);animation:fadeIn .15s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:var(--white);border-radius:14px;width:100%;max-width:600px;max-height:92vh;overflow-y:auto;box-shadow:var(--shadow-lg);animation:slideUp .2s ease}
@keyframes slideUp{from{transform:translateY(24px);opacity:0}to{transform:translateY(0);opacity:1}}
.toast{position:fixed;bottom:88px;left:50%;transform:translateX(-50%);padding:12px 20px;border-radius:10px;font-size:13px;font-weight:600;z-index:999;box-shadow:var(--shadow-lg);animation:toastIn .25s ease;color:white;max-width:90vw}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(16px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.sidebar{background:linear-gradient(180deg,#0f172a 0%,#1e293b 100%);color:#94a3b8;width:220px;min-height:100vh;display:flex;flex-direction:column;flex-shrink:0;position:sticky;top:0;height:100vh;border-right:1px solid rgba(255,255,255,.05)}
.nav-item{padding:9px 14px;cursor:pointer;display:flex;align-items:center;gap:10px;font-size:13px;font-weight:500;transition:all .15s;margin:1px 8px;border-radius:7px}
.nav-item:hover{background:rgba(255,255,255,.07);color:white}
.nav-item.active{background:rgba(99,102,241,.2);color:white;box-shadow:inset 0 0 0 1px rgba(99,102,241,.3)}
.nav-icon{font-size:15px;width:20px;text-align:center;flex-shrink:0}
table{width:100%;border-collapse:collapse;font-size:13px}
thead tr{background:#f8fafc;border-bottom:2px solid var(--border)}
th{padding:9px 12px;text-align:left;font-weight:700;color:var(--light);font-size:10px;text-transform:uppercase;letter-spacing:.06em;white-space:nowrap}
td{padding:10px 12px;border-bottom:1px solid #f8fafc;vertical-align:middle}
tbody tr{transition:background .08s}
tbody tr:hover{background:#f8fafc}
tbody tr:last-child td{border-bottom:none}
.kpi-card{padding:18px;border-radius:12px;background:var(--white);box-shadow:var(--shadow);position:relative;overflow:hidden;cursor:pointer;transition:all .2s}
.kpi-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-md)}
.kpi-label{font-size:11px;color:var(--light);font-weight:700;text-transform:uppercase;letter-spacing:.06em}
.kpi-value{font-size:26px;font-weight:800;font-variant-numeric:tabular-nums;line-height:1.1;margin-top:6px}
.kpi-sub{font-size:11px;color:var(--light);margin-top:4px;font-weight:500}
.kpi-accent{position:absolute;left:0;top:0;bottom:0;width:4px;border-radius:0 4px 4px 0}
.kpi-icon{position:absolute;right:14px;top:14px;font-size:24px;opacity:.15}
.topbar{background:var(--white);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:30;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.filter-bar{display:flex;flex-wrap:wrap;gap:8px;align-items:center;padding:12px 16px;border-bottom:1px solid var(--border);background:#fafbfc}
.empty-state{padding:60px 20px;text-align:center;color:var(--light)}
.empty-icon{font-size:44px;margin-bottom:12px;opacity:.4}
.field-label{font-size:12px;font-weight:600;color:#374151;display:block;margin-bottom:5px}
.cost-box{background:linear-gradient(135deg,#fff7ed,#ffedd5);border:2px solid #fed7aa;border-radius:12px;padding:16px 20px;text-align:center}
.cost-box-label{font-size:11px;color:#9a3412;font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.cost-box-value{font-size:32px;font-weight:800;color:#ea580c;font-variant-numeric:tabular-nums}
.cost-box-sub{font-size:12px;color:#c2410c;margin-top:4px}
.section-bar{background:#f8fafc;border-bottom:2px solid var(--border);padding:10px 16px;font-size:13px;font-weight:700;color:var(--dark);display:flex;align-items:center;gap:8px}
.row-field{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:12px}
.row-field>.field-wrap{flex:1;min-width:140px}
.field-wrap{display:flex;flex-direction:column;gap:5px}
.calc-row{display:flex;justify-content:space-between;align-items:center;padding:6px 12px;border-radius:6px;background:#f8fafc;margin-bottom:4px;font-size:13px}
.calc-row .calc-label{color:var(--light);font-size:12px}
.calc-row .calc-val{font-weight:600;color:var(--dark)}
.calc-row.big .calc-val{font-size:16px;color:var(--success);font-weight:800}
.total-box{background:#f8fafc;border-radius:10px;padding:16px;border:1px solid var(--border)}
.total-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;font-size:14px;border-bottom:1px solid var(--border)}
.total-row:last-child{border-bottom:none;padding-top:12px;margin-top:4px}
.price-table{border-radius:10px;overflow:hidden;border:1px solid var(--border)}
.price-row{display:grid;grid-template-columns:2fr 1.2fr 1.2fr 80px 1.2fr;gap:8px;padding:11px 14px;border-bottom:1px solid #f1f5f9;align-items:center;font-size:13px}
.price-row.header{background:#f8fafc;font-size:10px;font-weight:700;color:var(--light);text-transform:uppercase;letter-spacing:.05em}
.price-row.highlight{background:#eef2ff}
.tab-bar{display:flex;gap:4px;padding:12px 16px;border-bottom:1px solid var(--border);background:var(--white);overflow-x:auto;flex-shrink:0}
.tab-btn{padding:7px 14px;border:1.5px solid var(--border);background:var(--white);border-radius:8px;cursor:pointer;font-size:12px;font-weight:600;color:var(--mid);transition:all .15s;font-family:inherit;white-space:nowrap;flex-shrink:0}
.tab-btn:hover{border-color:#94a3b8}
.tab-btn.active{background:var(--dark);color:white;border-color:var(--dark)}
.mobile-menu-btn{display:none;background:var(--bg);border:none;padding:8px;border-radius:8px;cursor:pointer;align-items:center;justify-content:center;font-size:18px}
.mobile-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:99}
.mobile-overlay.active{display:block}
.bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--white);border-top:1px solid var(--border);z-index:90;padding:6px 0 calc(6px + env(safe-area-inset-bottom));box-shadow:0 -2px 16px rgba(0,0,0,.08)}
.bottom-nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:4px 2px;border:none;background:none;font-family:inherit;color:var(--light);transition:color .15s}
.bottom-nav-item.active{color:var(--primary)}
.bottom-nav-item span:first-child{font-size:20px;line-height:1}
.bottom-nav-item span:last-child{font-size:9px;font-weight:600}
.fab{position:fixed;right:18px;bottom:76px;z-index:95;display:none}
.fab-btn{width:52px;height:52px;border-radius:50%;background:var(--primary);color:white;border:none;font-size:24px;cursor:pointer;box-shadow:0 4px 16px rgba(99,102,241,.45);display:flex;align-items:center;justify-content:center}
@media(max-width:900px){
  .sidebar{position:fixed;left:-224px;z-index:100;transition:left .25s}
  .sidebar.open{left:0;box-shadow:4px 0 40px rgba(0,0,0,.4)}
  .mobile-menu-btn{display:flex!important}
  .desktop-only{display:none!important}
  .bottom-nav{display:flex!important}
  .fab{display:block!important}
  .modal{max-width:100%!important;border-radius:20px 20px 0 0!important;margin:0;max-height:92vh!important}
  .modal-overlay{align-items:flex-end!important;padding:0!important}
  .price-row{grid-template-columns:1.5fr 1fr 1fr!important}
  .price-row span:nth-child(4),.price-row span:nth-child(5){display:none}
  main,[style*="flex:1"]>div:last-child{padding-bottom:80px!important}
}
@media(max-width:480px){
  .kpi-value{font-size:20px!important}
  .cost-box-value{font-size:24px!important}
  .row-field{flex-direction:column}
  .row-field>.field-wrap{min-width:100%}
}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ===== CONFIG =====
// วาง Apps Script URL ของคุณที่นี่
const API_URL = "https://script.google.com/macros/s/AKfycbzOzqKT20LzeSddeFoplYl74VMZlPuATWx8xS6vTHOiTOk79dkJyubSfUPpbCAVb3mU/exec";
const SESSION_KEY = 'cc_session_v1';
const SESSION_DAYS = 30;

// ===== AUTH STATE =====
let currentUser = null;
let userNames = [];

function loadSession() {
  try {
    const s = localStorage.getItem(SESSION_KEY);
    if (!s) return null;
    const { user, expires } = JSON.parse(s);
    if (new Date() > new Date(expires)) { localStorage.removeItem(SESSION_KEY); return null; }
    return user;
  } catch(e) { return null; }
}
function saveSession(user) {
  const expires = new Date();
  expires.setDate(expires.getDate() + SESSION_DAYS);
  localStorage.setItem(SESSION_KEY, JSON.stringify({ user, expires }));
}
function clearSession() { localStorage.removeItem(SESSION_KEY); }

// ── Autocomplete Database ────────────────────────────────────────────
// เก็บรายชื่อที่เคยใช้ใน localStorage
const DB_KEYS = { customer:'cc_db_customers', project:'cc_db_projects', product:'cc_db_products', supplier:'cc_db_suppliers' };

function dbLoad(key) {
  try { return JSON.parse(localStorage.getItem(DB_KEYS[key]) || '[]'); } catch { return []; }
}
function dbSave(key, arr) {
  try { localStorage.setItem(DB_KEYS[key], JSON.stringify([...new Set(arr)].slice(0,100))); } catch {}
}
function dbAdd(key, value) {
  if (!value || !value.trim()) return;
  const arr = dbLoad(key);
  if (!arr.includes(value.trim())) { arr.unshift(value.trim()); dbSave(key, arr); }
}
function dbAddFromJob(job) {
  if (job.customer) dbAdd('customer', job.customer);
  if (job.project)  dbAdd('project',  job.project);
  if (job.productName) dbAdd('product', job.productName);
  if (job.productCode) dbAdd('product', job.productCode);
  if (job.supplier) dbAdd('supplier', job.supplier);
}

// Input with autocomplete dropdown
function acInput(f, label, dbKey, job, setField, ro, hl=false) {
  const wrap = document.createElement('div');
  wrap.style.cssText = 'flex:1;min-width:140px;margin-bottom:14px;position:relative';

  const lbl = document.createElement('label');
  lbl.className = 'field-label';
  lbl.textContent = label;
  wrap.appendChild(lbl);

  const el = document.createElement('input');
  el.type = 'text';
  el.className = 'input' + (hl ? ' input-highlight' : '');
  el.value = job[f] || '';
  el.placeholder = label;
  el.disabled = ro;
  el.setAttribute('autocomplete','off');

  const dd = document.createElement('div');
  dd.style.cssText = 'display:none;position:absolute;top:calc(100% + 2px);left:0;right:0;background:#1e293b;border:1px solid rgba(255,255,255,.15);border-radius:8px;overflow:hidden;z-index:200;max-height:180px;overflow-y:auto;box-shadow:0 8px 24px rgba(0,0,0,.4)';

  function showAC(q) {
    const all = dbLoad(dbKey);
    const filtered = q ? all.filter(s => s.toLowerCase().includes(q.toLowerCase())) : all;
    if (!filtered.length) { dd.style.display='none'; return; }
    dd.innerHTML = '';
    filtered.slice(0,8).forEach(item => {
      const opt = document.createElement('div');
      opt.style.cssText = 'padding:9px 12px;cursor:pointer;font-size:13px;color:#cbd5e1;transition:background .1s';
      opt.textContent = item;
      opt.addEventListener('mouseenter', () => opt.style.background='rgba(99,102,241,.2)');
      opt.addEventListener('mouseleave', () => opt.style.background='');
      opt.addEventListener('mousedown', e => {
        e.preventDefault();
        el.value = item;
        setField(f, item);
        dd.style.display = 'none';
      });
      dd.appendChild(opt);
    });
    dd.style.display = 'block';
  }

  if (!ro) {
    el.addEventListener('focus', () => showAC(el.value));
    el.addEventListener('input', e => { setField(f, e.target.value); showAC(e.target.value); });
    el.addEventListener('blur',  () => setTimeout(() => dd.style.display='none', 150));
  }
  wrap.appendChild(el);
  wrap.appendChild(dd);
  return wrap;
}
function canEdit() { return currentUser && (currentUser.role === 'admin' || currentUser.role === 'user'); }
function isAdmin() { return currentUser && currentUser.role === 'admin'; }

// ===== API =====
async function apiGet(params) {
  const url = API_URL + '?' + new URLSearchParams(params);
  const res = await fetch(url);
  return res.json();
}
async function apiPost(body) {
  const res = await fetch(API_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify(body)
  });
  return res.json();
}

async function fetchUserNames() {
  try {
    const data = await apiPost({ action: 'getUserNames' });
    if (data.names) userNames = data.names;
  } catch(e) {}
}

async function apiLogin(username, password) {
  return apiPost({ action: 'login', username, password });
}

// ===== JOBS STATE =====
let jobs = [];
let isLoading = false;
let isSaving = false;
let mobileMenuOpen = false;

let ui = {
  view: 'dashboard', // dashboard | form | history | users | settings
  modal: null,
  toast: null,
  toastTimer: null,
  search: '',
  sortBy: 'date',
  editingJob: null,
  formTab: 'info', // info | costB | costA | costC | costD | pricing
};

// ===== JOBS API =====
async function fetchJobs() {
  isLoading = true;
  // โหลด local ก่อนเสมอ
  try {
    const local = JSON.parse(localStorage.getItem('cc_jobs') || '[]');
    if (local.length) { jobs = local.map(j => ({...j,...calcJob(j)})); isLoading = false; render(); }
  } catch(e) {}
  // ดึงจาก Sheets ถ้ามี
  try {
    const data = await apiPost({ action: 'getJobs', userId: currentUser.id, role: currentUser.role });
    if (data.jobs && data.jobs.length) {
      jobs = data.jobs.map(j => ({ ...j, ...calcJob(j) }));
      try { localStorage.setItem('cc_jobs', JSON.stringify(jobs)); } catch(e) {}
    }
  } catch(e) {
    if (!jobs.length) showToast('ไม่สามารถโหลดจาก Sheets ใช้ข้อมูล local แทน', 'warn');
  }
  isLoading = false; render();
}

async function saveJob(job) {
  isSaving = true;
  const calc = calcJob(job);
  const full = { ...job, ...calc,
    updatedBy: currentUser.id,
    updatedByName: currentUser.name,
    updatedAt: new Date().toISOString()
  };
  // บันทึก local ก่อนเสมอ
  const idx = jobs.findIndex(j => j.id === full.id);
  if (idx >= 0) jobs[idx] = full; else jobs.unshift(full);
  try { localStorage.setItem('cc_jobs', JSON.stringify(jobs)); } catch(e) {}
  dbAddFromJob(full);
  // ไปหน้า dashboard แล้วค่อยแสดง toast
  isSaving = false;
  ui.view = 'dashboard'; ui.editingJob = null;
  render();
  showToast('บันทึกสำเร็จ ✓');
  // Sync ขึ้น Sheets (background)
  try {
    await apiPost({ action: 'saveJob', job: full, userId: currentUser.id, role: currentUser.role });
  } catch(e) { /* silent — data already saved locally */ }
}

async function deleteJob(id) {
  // ลบ local ก่อน
  jobs = jobs.filter(j => j.id !== id);
  try { localStorage.setItem('cc_jobs', JSON.stringify(jobs)); } catch(e) {}
  showToast('ลบงานแล้ว');
  render();
  // Sync ขึ้น Sheets
  try { await apiPost({ action: 'deleteJob', jobId: id, userId: currentUser.id, role: currentUser.role }); }
  catch(e) {}
}

// ===== CALCULATIONS =====
function calcJob(j) {
  const r = { ...j };
  const n = f => parseFloat(r[f]) || 0;
  // A
  r.costA_thb = n('qtyA') * n('priceA_usd') * n('rateUSD');
  r.packA_thb = n('packA_usd') * n('rateUSD');
  // B
  r.priceB_thb = n('priceB_cny') * n('rateCNY');
  r.costB_thb = n('qtyB') * n('priceB_cny') * n('rateCNY');
  r.packB_thb = n('packB_cny') * n('rateCNY');
  r.originB_thb = n('originShipB_cny') * n('rateCNY');
  // C
  r.truckCBM_thb = n('truckPerCBM') * n('volume');
  r.truckKG_thb = n('truckPerKG') * n('volume');
  r.seaUnder_thb = n('seaUnderground') * n('volume');
  r.seaUSD_thb = n('seaUSD') * n('rateUSD');
  r.airUSD_thb = n('airUSD') * n('rateUSD');
  // D
  r.importTax_thb = (r.costA_thb + r.packA_thb) * (n('taxRate') / 100);
  r.totalCost = r.costA_thb + r.packA_thb + r.costB_thb + r.packB_thb + r.originB_thb +
    r.truckCBM_thb + r.truckKG_thb + r.seaUnder_thb + r.seaUSD_thb + r.airUSD_thb +
    r.importTax_thb + n('vatAmount') + n('warehouse') + n('domShip') + n('misc');
  // E
  // ค่าดำเนินการรวมอยู่ในต้นทุน ไม่นับเป็นกำไร
  r.opexAmt = r.totalCost * n('opexRate');
  r.totalCostWithOpex = r.totalCost + r.opexAmt;
  r.profitAmt = r.totalCostWithOpex * n('profitRate');
  r.grandTotal = r.totalCostWithOpex + r.profitAmt;
  r.totalQty = n('qtyA') + n('qtyB');
  r.costPerSqm = r.totalQty > 0 ? r.grandTotal / r.totalQty : 0;
  r.costWithOpexPerSqm = r.totalQty > 0 ? r.totalCostWithOpex / r.totalQty : 0;
  r.proposeRevenue = n('proposePrice') * r.totalQty;
  r.proposeProfit = r.proposeRevenue - r.totalCostWithOpex;
  r.proposePct = r.proposeRevenue > 0 ? r.proposeProfit / r.proposeRevenue : 0;
  r.actualRevenue = n('actualPrice') * r.totalQty;
  r.actualProfit = r.actualRevenue - r.totalCostWithOpex;
  r.actualPct = r.actualRevenue > 0 ? r.actualProfit / r.actualRevenue : 0;
  r.vatPrice = n('actualPrice') * 1.07;
  r.vatRevenue = r.vatPrice * r.totalQty;
  r.vatProfit = r.vatRevenue - r.totalCostWithOpex;
  r.vatPct = r.vatRevenue > 0 ? r.vatProfit / r.vatRevenue : 0;
  r.statusLabel = !r.actualRevenue ? 'draft' : n('actualPrice') < r.costPerSqm ? 'loss' : r.actualPct < 0.15 ? 'low' : 'ok';
  return r;
}

const STATUS = {
  draft: { label:'🔲 ยังไม่กรอก', bg:'#f1f5f9', txt:'#64748b' },
  loss:  { label:'⛔ ขาดทุน',    bg:'#fee2e2', txt:'#dc2626' },

// ===== HELPERS =====
function uid() { return 'J' + Date.now().toString(36).toUpperCase(); }
function td() { return new Date().toLocaleDateString('th-TH', {year:'numeric',month:'2-digit',day:'2-digit'}); }
function fmtB(n) { return !n ? '—' : '฿' + Number(n).toLocaleString('th-TH', {maximumFractionDigits:0}); }
function fmtN(n, d=2) { return Number(n||0).toLocaleString('th-TH', {maximumFractionDigits:d}); }
function fmtPct(n) { return (n==null||isNaN(n)) ? '—' : (n*100).toFixed(1) + '%'; }

function showToast(msg, type='ok') {
  if (ui.toastTimer) clearTimeout(ui.toastTimer);
  ui.toast = { msg, type };
  const el = document.getElementById('toast');
  const bg = type==='err'?'#dc2626':type==='warn'?'#d97706':'#0f172a';
  if (el) { el.textContent = msg; el.style.background = bg; el.style.display='flex'; }
  ui.toastTimer = setTimeout(() => {
    ui.toast = null;
    const el = document.getElementById('toast');
    if (el) el.style.display = 'none';
  }, 3500);
}

// ===== DOM HELPERS =====
function h(tag, attrs, ...ch) {
  const el = document.createElement(tag);
  if (attrs) Object.entries(attrs).forEach(([k,v]) => {
    if (k === 'className') el.className = v;
    else if (k.startsWith('on')) el.addEventListener(k.slice(2).toLowerCase(), v);
    else if (k === 'style' && typeof v === 'object') Object.assign(el.style, v);
    else if (k === 'disabled') { if(v) el.disabled = true; }
    else if (v != null) el.setAttribute(k, v);
  });
  ch.flat(Infinity).forEach(c => {
    if (c == null || c === false) return;
    el.appendChild(typeof c === 'string' || typeof c === 'number' ? document.createTextNode(String(c)) : c);
  });
  return el;
}
function div(cls, ...ch) { return h('div', { className: cls }, ...ch); }
function span(cls, txt) { return h('span', { className: cls }, txt); }
function inp(cls, val, onInput, extra={}) {
  const el = h('input', { className: cls, value: val||'', ...extra });
  el.addEventListener('input', e => onInput(e.target.value));
  return el;
}
function numInp(val, onChange, extra={}) {
  const el = h('input', { type:'number', className:'input', value: val||0, min:0, step:'any', ...extra });
  el.addEventListener('input', e => onChange(parseFloat(e.target.value)||0));
  return el;
}
function field(label, inputEl, hint='') {
  const wrap = div('field-wrap');
  wrap.appendChild(h('label', { className:'field-label' }, label));
  wrap.appendChild(inputEl);
  if (hint) wrap.appendChild(h('small', { style:{color:'#94a3b8',fontSize:'11px',marginTop:'2px'} }, hint));
  return wrap;
}
function rowFields(...fields) {
  const row = div('row-field');
  fields.forEach(f => row.appendChild(h('div',{className:'field-wrap',style:{flex:1,minWidth:'140px'}}, f)));
  return row;
}
function calcRowEl(label, value, big=false, calcKey='') {
  const row = div('calc-row' + (big?' big':''));
  row.appendChild(h('span', {className:'calc-label'}, label));
  const valEl = h('span', {className:'calc-val'}, value);
  if (calcKey) valEl.setAttribute('data-calc', calcKey);
  row.appendChild(valEl);
  return row;
}
function divider() { return h('div',{style:{borderTop:'1px solid #f1f5f9',margin:'12px 0'}}); }
function sectionBar(icon, title) { return h('div',{className:'section-bar'},icon,' ',title); }

    });
    thead.appendChild(hrow);
    table.appendChild(thead);
    const tbody = h('tbody');
    jobs.forEach(j => {
      const sm = STATUS[j.statusLabel||'draft'];
      const editable = canEditJob(j);
      const tr = h('tr');
      [
        h('td',{style:{fontWeight:700,color:'#6366f1'}},j.jobNo||'—'),
        h('td',{style:{color:'var(--light)',fontSize:'12px'}},j.date||'—'),
        h('td',{style:{fontWeight:500}},j.customer||'—'),
        h('td',{},j.project||'—'),
        h('td',{style:{color:'var(--light)',fontSize:'12px'}},j.productCode||'—'),
        h('td',{style:{fontWeight:700,color:'#ea580c',textAlign:'right'}},fmtB(j.costPerSqm)),
        h('td',{style:{fontWeight:600,textAlign:'right'}},fmtB(j.actualPrice)),
        h('td',{style:{textAlign:'right'}},h('span',{style:{color:sm.txt,fontWeight:700}},fmtPct(j.actualPct))),
        h('td',{},h('span',{className:'badge',style:{background:sm.bg,color:sm.txt}},sm.label)),
        h('td',{style:{color:'var(--light)',fontSize:'12px'}},j.createdByName||'—'),
        (() => {
          const td_ = h('td');
          const btn = h('button',{className:'btn btn-outline',style:{fontSize:'12px',padding:'5px 10px'}}, editable?'✏ แก้ไข':'👁 ดู');
          btn.addEventListener('click',()=>{ ui.editingJob={...j}; ui.view='form'; ui.formTab='info'; render(); });
          td_.appendChild(btn);
          return td_;
        })(),
      ].forEach(td_ => tr.appendChild(td_));
      tbody.appendChild(tr);
    });
    table.appendChild(tbody);
    tWrap.appendChild(table);
    tableCard.appendChild(tWrap);
  }
  content.appendChild(tableCard);
  page.appendChild(content);
  return page;
}

// ===== FORM PAGE =====
function FormPage() {
  const job = ui.editingJob;
  if (!job) return div('');
  const calc = calcJob(job);
  const editable = canEditJob(job);

  function setField(f, v) {
    ui.editingJob[f] = v;
    const c = calcJob(ui.editingJob);
    updateCalcDisplays(c);
  }

  // ── Autocomplete helper ─────────────────────────────────────────
  function makeAutoInput(f, label, hint='', hl=false) {
    const suggestions = [...new Set(jobs.map(j=>j[f]).filter(Boolean))].slice(0, 30);
    const listId = 'ac-' + f;

    const wrap = document.createElement('div');
    wrap.className = 'field-wrap';
    const lbl = document.createElement('label');
    lbl.className = 'field-label';
    lbl.textContent = label;
    wrap.appendChild(lbl);

    const el = document.createElement('input');
    el.type = 'text';
    el.className = 'input' + (hl ? ' input-highlight' : '');
    el.value = ui.editingJob[f] || '';
    el.disabled = ro;
    el.placeholder = label;
    el.setAttribute('list', listId);
    el.addEventListener('input', e => setField(f, e.target.value));

    const dl = document.createElement('datalist');
    dl.id = listId;
    suggestions.forEach(s => {
      const opt = document.createElement('option');
      opt.value = s;
      dl.appendChild(opt);
    });

    wrap.appendChild(el);
    wrap.appendChild(dl);
    if (hint) {
      const sm = document.createElement('small');
      sm.style.cssText = 'color:#94a3b8;font-size:11px;margin-top:2px;display:block';
      sm.textContent = hint;
      wrap.appendChild(sm);
    }
    return wrap;
  }

  const page = h('div',{style:{flex:1,minWidth:0,display:'flex',flexDirection:'column'}});

  // Topbar with actions
  const tb = h('div',{className:'topbar'});
  const tLeft = h('div',{style:{display:'flex',alignItems:'center',gap:12}});
  const menuBtn = h('button',{className:'mobile-menu-btn'},'☰');
  menuBtn.addEventListener('click',()=>{mobileMenuOpen=!mobileMenuOpen;render();});
  tLeft.appendChild(menuBtn);
  tLeft.appendChild(h('div',{style:{fontSize:'16px',fontWeight:700}}, job.id && jobs.find(j=>j.id===job.id) ? 'แก้ไขงาน' : 'งานใหม่'));
  tb.appendChild(tLeft);
  const tRight = h('div',{style:{display:'flex',gap:'8px'}});
  const cancelBtn = h('button',{className:'btn btn-ghost'},'ยกเลิก');
  cancelBtn.addEventListener('click',()=>{ ui.view='dashboard'; ui.editingJob=null; render(); });
  tRight.appendChild(cancelBtn);
  if (editable) {
    if (jobs.find(j=>j.id===job.id) && isAdmin()) {
      const delBtn = h('button',{className:'btn btn-danger',style:{fontSize:'12px'}},'🗑 ลบ');
      delBtn.addEventListener('click',async()=>{ if(confirm('ลบงานนี้?')){ await deleteJob(job.id); } });
      tRight.appendChild(delBtn);
    }
    const saveBtn = h('button',{className:'btn btn-primary',disabled:isSaving}, isSaving?'⟳ กำลังบันทึก...':'💾 บันทึก');
    saveBtn.addEventListener('click', async()=>{ await saveJob(ui.editingJob); });
    tRight.appendChild(saveBtn);
  }
  tb.appendChild(tRight);
  page.appendChild(tb);

  // Cost summary bar — use IDs for live update
  const bar = h('div',{style:{background:'white',borderBottom:'1px solid var(--border)',padding:'12px 16px',display:'flex',alignItems:'center',gap:'16px',flexWrap:'wrap',overflowX:'auto'}});
  [
    {id:'cb-cost',  l:'รวมทุน+ดำเนินการ', v:fmtB(calc.totalCostWithOpex), c:'#f59e0b'},
    {id:'cb-profit',l:'+ กำไร',            v:fmtB(calc.profitAmt),         c:'#10b981'},
    {sep:true},
    {id:'cb-grand', l:'ราคาทุนรวม',        v:fmtB(calc.grandTotal),        c:'#ea580c'},
  ].forEach(x => {
    if (x.sep) { bar.appendChild(h('span',{style:{color:'#cbd5e1',fontSize:'20px',fontWeight:700}},'=')); return; }
    const b = h('div',{style:{textAlign:'center',flexShrink:0}});
    b.appendChild(h('div',{style:{fontSize:'10px',color:'var(--light)',marginBottom:'2px'}},x.l));
    const vEl = h('div',{id:x.id, style:{fontWeight:700,color:x.c,fontSize:'14px'}},x.v);
    b.appendChild(vEl);
    bar.appendChild(b);
  });
  const costBox = h('div',{className:'cost-box',style:{marginLeft:'auto',flexShrink:0,padding:'10px 16px',minWidth:'160px'}});
  costBox.appendChild(h('div',{className:'cost-box-label'},'📐 ต้นทุน/ตร.ม.'));
  costBox.appendChild(h('div',{id:'cb-sqm',className:'cost-box-value',style:{fontSize:'24px'}},fmtB(calc.costPerSqm)));
  costBox.appendChild(h('div',{id:'cb-qty',className:'cost-box-sub'},fmtN(calc.totalQty,2)+' ตร.ม.'));
  bar.appendChild(costBox);
  page.appendChild(bar);

  // Tab bar
  const tabs = [
    {k:'info',l:'📋 ข้อมูล'},{k:'costB',l:'🇨🇳 ส่วน B'},{k:'costA',l:'💵 ส่วน A'},
    {k:'costC',l:'🚢 การขนส่ง'},{k:'costD',l:'🏭 ค่าใช้จ่ายใน'},{k:'pricing',l:'💲 ตั้งราคา'},
  ];
  const tabBar = h('div',{className:'tab-bar'});
  tabs.forEach(t => {
    const btn = h('button',{className:'tab-btn'+(ui.formTab===t.k?' active':'')},t.l);
    btn.addEventListener('click',()=>{ ui.formTab=t.k; refreshForm(); });
    tabBar.appendChild(btn);
  });
  page.appendChild(tabBar);

  // Panel container
  const panel = h('div',{id:'form-panel',style:{flex:1,overflowY:'auto',padding:'0 0 80px'}});
  page.appendChild(panel);

  function updateCalcDisplays(c) {
    // Update cost bar by ID
    const upd = (id, val) => { const el = document.getElementById(id); if(el) el.textContent = val; };
    upd('cb-cost',   fmtB(c.totalCostWithOpex));
    upd('cb-profit', fmtB(c.profitAmt));
    upd('cb-grand',  fmtB(c.grandTotal));
    upd('cb-sqm',         fmtB(c.costPerSqm));
    upd('alert-sqm',      fmtB(c.costPerSqm));
    upd('alert-opex-sqm', fmtB(c.costWithOpexPerSqm));
    upd('cb-qty',    fmtN(c.totalQty,2)+' ตร.ม.');
    // Update all [data-calc] display elements in panel
    panel.querySelectorAll('[data-calc]').forEach(el => {
      const key = el.getAttribute('data-calc');
      const val = c[key];
      if (val !== undefined) el.textContent = fmtB(val);
    });
    // Update price table rows in pricing tab
    panel.querySelectorAll('[data-price-row]').forEach(el => {
      const row = el.getAttribute('data-price-row');
      const col = el.getAttribute('data-price-col');
      const rows = {
        propose: { price:ui.editingJob.proposePrice, pct:c.proposePct, rev:c.proposeRevenue, profit:c.proposeProfit },
        actual:  { price:ui.editingJob.actualPrice,  pct:c.actualPct,  rev:c.actualRevenue,  profit:c.actualProfit  },
        vat:     { price:c.vatPrice, pct:'—', rev:c.vatRevenue, profit:'—' },
      };
      const r = rows[row];
      if (!r) return;
      if (col==='price')  el.textContent = fmtB(r.price);
      if (col==='rev')    el.textContent = r.rev ? fmtB(r.rev) : '—';
      if (col==='pct')    { el.textContent = r.pct!=null ? fmtPct(r.pct) : '—'; el.style.color = r.pct>=0.15?'#16a34a':r.pct>0?'#d97706':'#dc2626'; }
      if (col==='profit') { el.textContent = r.profit!=null ? fmtB(r.profit) : '—'; el.style.color = r.profit>0?'#16a34a':r.profit<0?'#dc2626':'var(--light)'; }
    });
    // Update transport result boxes
    panel.querySelectorAll('[data-transport]').forEach(el => {
      const key = el.getAttribute('data-transport');
      if (c[key] !== undefined) el.textContent = fmtB(c[key]);
    });
    // Update total box in costD
    panel.querySelectorAll('[data-total]').forEach(el => {
      const key = el.getAttribute('data-total');
      if (c[key] !== undefined) el.textContent = fmtB(c[key]);
    });
  }

  function refreshForm() {
    // Full re-render (only called on tab switch, not on field input)
    const c = calcJob(ui.editingJob);
    panel.innerHTML = '';
    panel.appendChild(renderFormTab(ui.editingJob, c, editable, setField));
    tabBar.querySelectorAll('.tab-btn').forEach((b,i) => {
      b.className = 'tab-btn' + (tabs[i].k===ui.formTab?' active':'');
    });
    updateCalcDisplays(c);
  }

  panel.appendChild(renderFormTab(job, calc, editable, setField));
  return page;
}

function renderFormTab(job, calc, editable, setField) {
  const ro = !editable;
  const wrap = h('div',{style:{maxWidth:'800px',margin:'0 auto'}});

  function textInp(f, label, hint='', hl=false) {
    const el = document.createElement('input');
    el.type = 'text';
    el.className = 'input' + (hl ? ' input-highlight' : '');
    el.value = job[f] || '';
    el.disabled = ro;
    el.placeholder = label;
    if (!ro) {
      el.addEventListener('input', e => setField(f, e.target.value));
      el.addEventListener('change', e => setField(f, e.target.value));
    }
    return field(label, el, hint);
  }
  function numField(f, label, hint='', hl=false) {
    const val = (job[f] !== undefined && job[f] !== null && job[f] !== 0) ? job[f] : '';
    const el = document.createElement('input');
    el.type = 'number';
    el.className = 'input' + (hl ? ' input-highlight' : '');
    el.value = val;
    el.placeholder = '0';
    el.min = 0;
    el.step = 'any';
    el.disabled = ro;
    if (!ro) {
      el.addEventListener('focus', () => { if(el.value==='0') el.value=''; });
      el.addEventListener('blur',  () => { if(el.value===''||isNaN(el.value)) el.value=''; });
      el.addEventListener('input', e => setField(f, parseFloat(e.target.value) || 0));
    }
    return field(label, el, hint);
  }

  if (ui.formTab === 'info') {
    wrap.appendChild(sectionBar('📋','ข้อมูลงาน'));
    const p = h('div',{style:{padding:'16px'}});
    const r1 = h('div',{style:{display:'flex',gap:'12px',flexWrap:'wrap',marginBottom:'12px'}});
    r1.appendChild(makeAutoInput('productCode','รหัสสินค้า','',true));

    r3.appendChild(textInp('importVia','นำเข้าทาง'));

    profRow.appendChild(h('span',{'data-total':'profitAmt',style:{color:'#10b981',fontWeight:600}},fmtB(calc.profitAmt)));
    tb_.appendChild(profRow);

    // ราคาทุนรวม
    const grandRow = h('div',{className:'total-row',style:{borderTop:'2px solid var(--border)',marginTop:'4px'}});
    grandRow.appendChild(h('span',{style:{fontWeight:700,fontSize:'15px'}},'ราคาทุนรวม'));
    grandRow.appendChild(h('span',{'data-total':'grandTotal',style:{fontWeight:800,fontSize:'22px',color:'#ea580c'}},fmtB(calc.grandTotal)));
    tb_.appendChild(grandRow);
    p.appendChild(tb_);
    wrap.appendChild(p);
  }

  else if (ui.formTab === 'pricing') {
    wrap.appendChild(sectionBar('💲','ตั้งราคาเสนอ'));
    const p = h('div',{style:{padding:'16px'}});

    // ต้นทุน/ตร.ม. alert box
    const alertBox = h('div',{style:{
      background:'#fff7ed',border:'2px solid #fed7aa',borderRadius:'12px',
      padding:'16px 20px',display:'flex',alignItems:'center',
      gap:'20px',marginBottom:'20px',flexWrap:'wrap'
    }});
    alertBox.appendChild(h('span',{style:{fontSize:'28px',flexShrink:0}},'📐'));

    // ราคาทุนรวม/ตร.ม. (ใหญ่)
    const alertMain = h('div',{style:{flex:1,minWidth:'160px'}});
    alertMain.appendChild(h('div',{style:{fontSize:'11px',color:'#9a3412',fontWeight:700,textTransform:'uppercase',letterSpacing:'0.05em',marginBottom:'2px'}},'ราคาทุนรวม / ตร.ม.'));
    alertMain.appendChild(h('div',{
      id:'alert-sqm',
      style:{fontSize:'30px',fontWeight:800,color:'#ea580c',fontVariantNumeric:'tabular-nums',lineHeight:1}
    },fmtB(calc.costPerSqm)));
    alertMain.appendChild(h('div',{style:{fontSize:'11px',color:'#c2410c',marginTop:'3px'}},fmtN(calc.totalQty,2)+' ตร.ม. รวม'));
    alertBox.appendChild(alertMain);

    // เส้นแบ่ง
    alertBox.appendChild(h('div',{style:{width:'1px',height:'48px',background:'#fed7aa',flexShrink:0}}));

    // ต้นทุน+ดำเนินการ/ตร.ม. (เล็ก)
    const alertSub = h('div',{style:{flex:1,minWidth:'140px'}});
    alertSub.appendChild(h('div',{style:{fontSize:'11px',color:'#9a3412',fontWeight:700,textTransform:'uppercase',letterSpacing:'0.05em',marginBottom:'2px'}},'ต้นทุน+ดำเนินการ / ตร.ม.'));
    alertSub.appendChild(h('div',{
      id:'alert-opex-sqm',
      style:{fontSize:'18px',fontWeight:700,color:'#c2410c',fontVariantNumeric:'tabular-nums'}
    },fmtB(calc.costWithOpexPerSqm)));
    alertSub.appendChild(h('div',{style:{fontSize:'11px',color:'#c2410c',marginTop:'3px'}},'ก่อนบวกกำไร'));
    alertBox.appendChild(alertSub);

    p.appendChild(alertBox);

    // ─── ราคาเสนอ + ส่วนลด + หลังส่วนลด ───────────────────────────
    const warnPropose = (parseFloat(job.proposePrice)||0) > 0 && (parseFloat(job.proposePrice)||0) < calc.costPerSqm;
    const proposeBox = h('div',{style:{background:'#f8fafc',borderRadius:'12px',padding:'16px',marginBottom:'16px',border:'1px solid var(--border)'}});
    proposeBox.appendChild(h('div',{style:{fontSize:'12px',fontWeight:700,color:'var(--mid)',marginBottom:'12px',textTransform:'uppercase',letterSpacing:'0.05em'}},'ราคาเสนอลูกค้า'));

    // Row: ราคาเสนอ + ส่วนลด% + ราคาหลังส่วนลด
    const proposeRow = h('div',{style:{display:'flex',gap:'12px',flexWrap:'wrap',alignItems:'flex-end',marginBottom:'8px'}});

    // ราคาเสนอ input
    const propWrap = h('div',{style:{flex:1,minWidth:'130px'}});
    propWrap.appendChild(h('label',{className:'field-label'},'ราคาเสนอ (บาท/ตร.ม.)'));
    const propEl = h('input',{type:'number',className:'input'+(warnPropose?' input-warn':' input-highlight'),
      value:job.proposePrice||'',placeholder:'0',min:0,step:'any',disabled:ro});
    propEl.addEventListener('focus',()=>{ if(propEl.value==='0'||propEl.value==='') propEl.value=''; propEl.select(); });
    if (!ro) propEl.addEventListener('input',e=>{ setField('proposePrice',parseFloat(e.target.value)||0); updateDiscount(); });
    propWrap.appendChild(propEl);
    if (warnPropose) propWrap.appendChild(h('small',{style:{color:'#ef4444',fontSize:'11px'}},'⚠ ต่ำกว่าต้นทุน!'));
    proposeRow.appendChild(propWrap);

    // ส่วนลด%
    let discPct = 0;
    const discWrap = h('div',{style:{flex:'0 0 80px'}});
    discWrap.appendChild(h('label',{className:'field-label'},'ส่วนลด %'));
    const discInp = h('input',{type:'number',className:'input',value:0,min:0,max:100,step:'any'});
    discInp.addEventListener('focus',()=>discInp.select());
    discInp.addEventListener('input',e=>{ discPct=parseFloat(e.target.value)||0; updateDiscount(); });
    discWrap.appendChild(discInp);
    proposeRow.appendChild(discWrap);

    // ราคาหลังส่วนลด (readonly)
    const afterDiscWrap = h('div',{style:{flex:1,minWidth:'130px'}});
    afterDiscWrap.appendChild(h('label',{className:'field-label'},'ราคาหลังส่วนลด (บาท/ตร.ม.)'));
    const afterDiscEl = h('div',{style:{background:'#e8f5e9',border:'1px solid #a5d6a7',borderRadius:'7px',padding:'9px 13px',fontWeight:700,color:'#16a34a',fontSize:'15px'}},
      fmtB((job.proposePrice||0)*(1-0)));
    afterDiscWrap.appendChild(afterDiscEl);
    proposeRow.appendChild(afterDiscWrap);

    // ราคาเสนอจริง (editable)
    const actualWrap = h('div',{style:{flex:1,minWidth:'130px'}});
    actualWrap.appendChild(h('label',{className:'field-label'},'ราคาเสนอจริง (บาท/ตร.ม.)'));
    const actualEl = h('input',{type:'number',className:'input input-highlight',
      value:job.actualPrice||'',placeholder:'0',min:0,step:'any',disabled:ro});
    actualEl.addEventListener('focus',()=>{ if(actualEl.value==='0'||actualEl.value==='') actualEl.value=''; actualEl.select(); });
    if (!ro) actualEl.addEventListener('input',e=>setField('actualPrice',parseFloat(e.target.value)||0));
    actualWrap.appendChild(actualEl);
    proposeRow.appendChild(actualWrap);

    proposeBox.appendChild(proposeRow);

    function updateDiscount() {
      const base = parseFloat(propEl.value)||0;
      const after = base * (1 - discPct/100);
      afterDiscEl.textContent = fmtB(after);
    }

    p.appendChild(proposeBox);

    // ─── ตารางสรุปราคา ─────────────────────────────────────────────
    const pt = h('div',{className:'price-table',style:{marginBottom:'16px'}});
    const ph = h('div',{className:'price-row header'});
    ['ราคา','บาท/ตร.ม.','ราคางาน','กำไร%','กำไร (บาท)'].forEach(t => ph.appendChild(h('span',{},t)));
    pt.appendChild(ph);
    [
      {key:'propose', l:'ราคาเสนอ',    price:job.proposePrice, pct:calc.proposePct, rev:calc.proposeRevenue, profit:calc.proposeProfit},
      {key:'actual',  l:'ราคาเสนอจริง',price:job.actualPrice,  pct:calc.actualPct,  rev:calc.actualRevenue,  profit:calc.actualProfit, hi:true},
      {key:'vat',     l:'หลัง VAT 7%', price:calc.vatPrice,    pct:'—',             rev:calc.vatRevenue,     profit:'—'},
    ].forEach(row => {
      const c_ = row.pct>=0.15?'#16a34a':row.pct>0?'#d97706':row.pct<0&&row.price>0?'#dc2626':'#94a3b8';
      const pr = h('div',{className:'price-row'+(row.hi?' highlight':'')});
      pr.appendChild(h('span',{style:{fontWeight:row.hi?700:400,color:row.hi?'var(--dark)':'var(--mid)'}},row.l));
      pr.appendChild(h('span',{'data-price-row':row.key,'data-price-col':'price',style:{fontWeight:700,color:row.hi?'#6366f1':'var(--dark)'}},fmtB(row.price)));
      pr.appendChild(h('span',{'data-price-row':row.key,'data-price-col':'rev',style:{color:'var(--mid)'}},row.rev?fmtB(row.rev):'—'));
      pr.appendChild(h('span',{'data-price-row':row.key,'data-price-col':'pct',style:{fontWeight:700,color:c_}},typeof row.pct==='number'?fmtPct(row.pct):'—'));
      pr.appendChild(h('span',{'data-price-row':row.key,'data-price-col':'profit',style:{color:typeof row.profit==='number'&&row.profit>0?'#16a34a':typeof row.profit==='number'&&row.profit<0?'#dc2626':'var(--light)'}},typeof row.profit==='number'?fmtB(row.profit):'—'));
      pt.appendChild(pr);
    });
    p.appendChild(pt);

    // Notes
    const notesEl = h('textarea',{className:'input',rows:3,disabled:ro,placeholder:'หมายเหตุ...',style:{resize:'vertical'}},job.notes||'');
    if (!ro) notesEl.addEventListener('input',e=>setField('notes',e.target.value));
    p.appendChild(field('หมายเหตุ',notesEl));
    wrap.appendChild(p);
  }

  return wrap;
}

// ===== HISTORY PAGE =====
function HistoryPage() {
  const page = h('div',{style:{flex:1,minWidth:0,display:'flex',flexDirection:'column'}});
  page.appendChild(Topbar('ประวัติงาน', jobs.length+' งานทั้งหมด'));

  const content = h('div',{style:{padding:'16px',flex:1}});

  // Search + sort
  const filterBar_ = h('div',{style:{display:'flex',gap:'8px',marginBottom:'16px',flexWrap:'wrap'}});
  const searchEl = h('input',{type:'search',className:'input',style:{flex:1,minWidth:'200px'},placeholder:'🔍 ค้นหา ลูกค้า / โปรเจค / รหัสสินค้า...',value:ui.search||''});
  searchEl.addEventListener('input',e=>{ ui.search=e.target.value; refreshHistory(); });
  const sortEl = h('select',{className:'input',style:{width:'auto'}});
  [['date','เรียงวันที่'],['revenue','เรียงมูลค่า']].forEach(([v,l])=>{
    const o = h('option',{value:v},l);
    if (ui.sortBy===v) o.selected=true;
    sortEl.appendChild(o);
  });
  sortEl.addEventListener('change',e=>{ ui.sortBy=e.target.value; refreshHistory(); });
  filterBar_.appendChild(searchEl);
  filterBar_.appendChild(sortEl);
  content.appendChild(filterBar_);

  const listEl = h('div',{id:'history-list',style:{display:'flex',flexDirection:'column',gap:'8px'}});
  content.appendChild(listEl);
  page.appendChild(content);

  function refreshHistory() {
    let list = [...jobs];
    if (ui.search) {
      const q = ui.search.toLowerCase();
      list = list.filter(j => [j.jobNo,j.customer,j.project,j.productCode,j.productName].some(f=>String(f||'').toLowerCase().includes(q)));
    }
    list.sort((a,b) => ui.sortBy==='date' ? (String(b.date)>String(a.date)?1:-1) : (b.actualRevenue||0)-(a.actualRevenue||0));
    listEl.innerHTML = '';
    if (!list.length) {
      const empty = div('empty-state');
      empty.appendChild(h('div',{className:'empty-icon'},'🔍'));
      empty.appendChild(h('p',{},'ไม่พบงานที่ค้นหา'));
      listEl.appendChild(empty);
      return;
    }
    list.forEach(j => {
      const sm = STATUS[j.statusLabel||'draft'];
      const editable = canEditJob(j);
      const card = h('div',{className:'card',style:{padding:'16px 20px',display:'flex',gap:'16px',alignItems:'center',flexWrap:'wrap'}});

      const left_ = h('div',{style:{flex:2,minWidth:'180px'}});
      const topRow_ = h('div',{style:{display:'flex',alignItems:'center',gap:'8px',marginBottom:'4px'}});
      topRow_.appendChild(h('span',{className:'badge',style:{background:'#ede9fe',color:'#7c3aed',fontWeight:700}},j.jobNo||'—'));
      topRow_.appendChild(h('span',{style:{color:'var(--light)',fontSize:'12px'}},j.date||''));
      if (j.createdByName) topRow_.appendChild(h('span',{style:{color:'#94a3b8',fontSize:'11px'}},'by '+j.createdByName));
      left_.appendChild(topRow_);
      left_.appendChild(h('div',{style:{fontWeight:700,fontSize:'15px'}},j.customer||'—',j.project?' · '+j.project:''));
      left_.appendChild(h('div',{style:{fontSize:'12px',color:'var(--light)',marginTop:'2px'}},
        j.productCode?h('span',{style:{color:'#6366f1',marginRight:'6px'}},'['+j.productCode+']'):null,
        j.productName||''
      ));
      card.appendChild(left_);

      const mid_ = h('div',{style:{display:'flex',gap:'20px',flex:2,justifyContent:'center',flexWrap:'wrap'}});
      [{l:'จำนวน',v:fmtN(j.totalQty,2)+' ตร.ม.'},{l:'ต้นทุน/ตร.ม.',v:fmtB(j.costPerSqm),c:'#ea580c'},{l:'ราคาขาย',v:fmtB(j.actualPrice),c:'#6366f1'},{l:'ราคางาน',v:fmtB(j.actualRevenue),c:'#10b981'}].forEach(x=>{
        const stat = h('div',{style:{textAlign:'center'}});
        stat.appendChild(h('div',{style:{fontSize:'11px',color:'var(--light)',marginBottom:'2px'}},x.l));
        stat.appendChild(h('div',{style:{fontWeight:600,color:x.c||'var(--dark)',fontSize:'13px'}},x.v));
        mid_.appendChild(stat);
      });
      card.appendChild(mid_);

      const right_ = h('div',{style:{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:'6px',flexShrink:0}});
      right_.appendChild(h('span',{className:'badge',style:{background:sm.bg,color:sm.txt,fontSize:'12px'}},sm.label));
      right_.appendChild(h('span',{style:{fontSize:'20px',fontWeight:800,color:sm.txt}},fmtPct(j.actualPct)));
      const actionRow = h('div',{style:{display:'flex',gap:'6px'}});
      const editBtn = h('button',{className:'btn btn-outline',style:{fontSize:'12px',padding:'5px 12px'}},editable?'✏ แก้ไข':'👁 ดู');
      editBtn.addEventListener('click',()=>{ ui.editingJob={...j}; ui.view='form'; ui.formTab='info'; render(); });
      actionRow.appendChild(editBtn);
      if (isAdmin()) {
        const delBtn = h('button',{className:'btn btn-ghost',style:{fontSize:'12px',padding:'5px 10px',color:'#ef4444'}},'✕');
        delBtn.addEventListener('click',async()=>{ if(confirm('ลบ?')) await deleteJob(j.id); });
        actionRow.appendChild(delBtn);
      }
      right_.appendChild(actionRow);
      card.appendChild(right_);
      listEl.appendChild(card);
    });
  }

  refreshHistory();
  return page;
}

// ===== SETTINGS PAGE =====
function SettingsPage() {
  const page = h('div',{style:{flex:1,minWidth:0,display:'flex',flexDirection:'column'}});
  page.appendChild(Topbar('⚙️ ตั้งค่า'));
  const content = h('div',{style:{padding:'16px',maxWidth:'700px'}});

  const card_ = h('div',{className:'card',style:{marginBottom:'16px'}});
  card_.appendChild(sectionBar('☁️','Google Sheets API URL'));
  const inner = h('div',{style:{padding:'16px'}});
  inner.appendChild(h('p',{style:{fontSize:'13px',color:'var(--mid)',marginBottom:'12px',lineHeight:1.7}},
    'Apps Script URL ที่ใช้อยู่ปัจจุบัน (แก้ได้ที่นี่ถ้าต้องการเปลี่ยน)'));
  const urlInput = h('input',{className:'input',value:API_URL,style:{fontFamily:'monospace',fontSize:'12px'}});
  inner.appendChild(urlInput);
  const saveUrlBtn = h('button',{className:'btn btn-primary',style:{marginTop:'10px'}},'💾 บันทึก URL');
  saveUrlBtn.addEventListener('click',()=>{ showToast('บันทึก URL แล้ว (ต้อง hardcode ใน code จริงๆ)'); });
  inner.appendChild(h('br'));
  inner.appendChild(saveUrlBtn);
  card_.appendChild(inner);
  content.appendChild(card_);

  // Apps Script code
  const code_ = h('div',{className:'card'});
  code_.appendChild(sectionBar('📋','Apps Script Code (copy ไปใส่ใน Google Apps Script)'));
  const codeInner = h('div',{style:{padding:'16px'}});
  const pre = h('pre',{style:{background:'#0f172a',color:'#94a3b8',borderRadius:'8px',padding:'16px',fontSize:'11px',overflowX:'auto',lineHeight:1.6,maxHeight:'300px',overflowY:'auto',whiteSpace:'pre-wrap'}});
  pre.textContent = `// วาง code นี้ใน Google Apps Script แทนที่ของเดิมทั้งหมด
// เพิ่ม getUserNames action สำหรับ dropdown login
// หากมี code เดิมให้แทนที่ด้วย code ล่าสุดจาก Claude`;
  codeInner.appendChild(pre);
  code_.appendChild(codeInner);
  content.appendChild(code_);

  page.appendChild(content);
  return page;
}

// ===== MAIN RENDER =====
function render() {
  const app = document.getElementById('app');
  app.innerHTML = '';

  if (!currentUser) {
    app.appendChild(LoginPage());
    return;
  }

  if (mobileMenuOpen) {
    const overlay = h('div',{className:'mobile-overlay active'});
    overlay.addEventListener('click',()=>{ mobileMenuOpen=false; render(); });
    app.appendChild(overlay);
  }

  const layout = h('div',{style:{display:'flex',minHeight:'100vh'}});
  layout.appendChild(Sidebar());

  const main = h('div',{id:'main-content',style:{flex:1,minWidth:0,display:'flex',flexDirection:'column',minHeight:'100vh'}});

  if (isLoading && !jobs.length) {
    const loader = h('div',{style:{position:'fixed',inset:0,background:'rgba(241,245,249,.9)',zIndex:300,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:'14px'}});
    loader.appendChild(h('div',{className:'spinner'}));
    loader.appendChild(h('div',{style:{color:'var(--dark)',fontWeight:600,fontSize:'13px'}},'กำลังดึงข้อมูลจาก Google Sheets...'));
    app.appendChild(loader);
  }

  if      (ui.view==='dashboard') main.appendChild(Dashboard());
  else if (ui.view==='form')      main.appendChild(FormPage());
  else if (ui.view==='history')   main.appendChild(HistoryPage());
  else if (ui.view==='settings')  main.appendChild(SettingsPage());
  else main.appendChild(Dashboard());

  layout.appendChild(main);
  app.appendChild(layout);

  // Bottom nav (mobile)
  const bnav = h('div',{className:'bottom-nav'});
  [{k:'dashboard',i:'📊',l:'หน้าหลัก'},{k:'history',i:'📋',l:'ประวัติ'},{k:'settings',i:'⚙️',l:'ตั้งค่า'}].forEach(it=>{
    const btn = h('button',{className:'bottom-nav-item'+(ui.view===it.k?' active':'')});
    btn.appendChild(h('span',{},it.i));
    btn.appendChild(h('span',{},it.l));
    btn.addEventListener('click',()=>{ ui.view=it.k; ui.editingJob=null; mobileMenuOpen=false; render(); });
    bnav.appendChild(btn);
  });
  if (canEdit()) {
    const fabBtn = h('div',{className:'fab'});
    const fMain = h('button',{className:'fab-btn'},'＋');
    fMain.addEventListener('click',()=>{ ui.editingJob=emptyJob(); ui.view='form'; ui.formTab='info'; render(); });
    fabBtn.appendChild(fMain);
    app.appendChild(fabBtn);
  }
  app.appendChild(bnav);

  // Toast
  const toast = h('div',{id:'toast',className:'toast',style:{display:ui.toast?'flex':'none',background:ui.toast?.type==='err'?'#dc2626':'#0f172a'}},ui.toast?.msg||'');
  app.appendChild(toast);
}

// ===== INIT =====
currentUser = loadSession();
render();

// โหลด usernames สำหรับ login dropdown
fetchUserNames().then(()=>{ if(!currentUser) render(); });

// ถ้า login อยู่แล้ว โหลดข้อมูลเลย
if (currentUser) fetchJobs();
</script>
</body>
