  function makeSuggestion(id, values) {
    const dl = h('datalist',{id});
    values.forEach(v=>{ const o=document.createElement('option'); o.value=v; dl.appendChild(o); });
    modal.appendChild(dl);
    return dl;
  }
  makeSuggestion('sug-p', usedP);
  makeSuggestion('sug-q', usedQ);
  makeSuggestion('sug-r', usedR);
  makeSuggestion('sug-s', usedS);
  inpP.setAttribute('list','sug-p');
  inpQ.setAttribute('list','sug-q');
  inpR.setAttribute('list','sug-r');
  inpS.setAttribute('list','sug-s');

  // preview รหัสที่จะได้
  const codePreview = h('div',{style:{
    background:'#0f172a',color:'white',padding:'10px 14px',borderRadius:'8px',
    fontFamily:'monospace',fontSize:'15px',fontWeight:700,letterSpacing:'.04em',
    textAlign:'center',marginTop:'8px'
  }},'DM-????');
  const codeWarn = h('div',{style:{fontSize:'11px',marginTop:'4px',display:'none',fontWeight:500}});

  function updateCode() {
    const p=inpP.value.trim().toUpperCase();
    const q=inpQ.value.trim().toUpperCase();
    const r=inpR.value.trim().toUpperCase();
    const s=inpS.value.trim().toUpperCase();
    const code = 'DM-'+p+q+r+s;
    if(p||q||r||s) {
      codePreview.textContent = code;
      codePreview.style.background = '#0f172a';
    } else {
      codePreview.textContent = 'DM-????';
    }
    if(p && q && r && s) {
      const exists = products.find(x=>x.id===code||x.code===code);
      if(exists){
        codeWarn.innerHTML='⚠ รหัสนี้มีอยู่แล้ว: <b>'+exists.name+'</b>';
        codeWarn.style.color='#dc2626';
        codeWarn.style.display='block';
        codePreview.style.background='#dc2626';
      } else {
        codeWarn.innerHTML='✓ รหัสนี้ยังไม่มีในระบบ';
        codeWarn.style.color='#059669';
        codeWarn.style.display='block';
      }
    } else {
      codeWarn.style.display='none';
    }
  }
  [inpP,inpQ,inpR,inpS].forEach(inp=>inp.addEventListener('input',updateCode));

  const inpName = h('input',{className:'input',placeholder:'เช่น 15 Long Finger: 2-Row Blue (Glossy)'});
  const inpType = h('input',{className:'input',placeholder:'เช่น Subway Tiles, Squares, Art Tiles',list:'type-list'});

  // สร้าง datalist ประเภทจากสินค้าเดิม
  const typeList = h('datalist',{id:'type-list'});
  Array.from(new Set(products.map(p=>p.type).filter(Boolean))).sort().forEach(t=>{
    const opt=document.createElement('option'); opt.value=t; typeList.appendChild(opt);
  });
  modal.appendChild(typeList);

  const inpPcsPerBox = h('input',{type:'number',className:'input',placeholder:'เช่น 15',min:'0',step:'1'});
  const inpSqmPerPc = h('input',{type:'number',className:'input',placeholder:'เช่น 0.0879',min:'0',step:'0.0001'});
  const inpSize = h('input',{className:'input',placeholder:'เช่น 296*297'});
  const inpChipSize = h('input',{className:'input',placeholder:'เช่น 15*297'});
  const inpMinQty = h('input',{type:'number',className:'input',placeholder:'เช่น 5 (ค่าเริ่มต้น 5 ตร.ม)',min:'0',step:'0.1'});
  const inpRefCode = h('input',{className:'input',placeholder:'เช่น SA152 (ถ้ามี)'});

  // preview คำนวณ ตร.ม/กล่อง
  const preview = h('div',{style:{fontSize:'12px',color:'#64748b',background:'#f8fafc',padding:'8px 12px',borderRadius:'6px',marginTop:'6px',display:'none'}});

  function updatePreview() {
    const pcs = parseFloat(inpPcsPerBox.value)||0;
    const sqm = parseFloat(inpSqmPerPc.value)||0;
    if (pcs>0 && sqm>0) {
      preview.style.display='block';
      preview.textContent = '1 กล่อง = '+pcs+' แผ่น × '+sqm+' ตร.ม = '+(pcs*sqm).toFixed(4)+' ตร.ม/กล่อง';
    } else preview.style.display='none';
  }
  inpPcsPerBox.addEventListener('input',updatePreview);
  inpSqmPerPc.addEventListener('input',updatePreview);

  const form = h('div',{style:{display:'flex',flexDirection:'column',gap:'12px'}});

  // Section: รหัสสินค้า
  form.appendChild(h('div',{style:{fontSize:'11px',fontWeight:700,color:'#64748b',textTransform:'uppercase',letterSpacing:'.04em',paddingBottom:'4px',borderBottom:'1px solid #f1f5f9'}},'🔑 รหัสสินค้า (DM- + P + Q + R + S)'));

  form.appendChild(h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'8px'}},
    h('div',{},h('label',{className:'field-label'},'P — วัสดุ ★'),inpP),
    h('div',{},h('label',{className:'field-label'},'Q — ชื่อเรียก ★'),inpQ)
  ));
  form.appendChild(h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'8px'}},
    h('div',{},h('label',{className:'field-label'},'R — ผิว ★'),inpR),
    h('div',{},h('label',{className:'field-label'},'S — ตัวท้าย ★'),inpS)
  ));
  form.appendChild(h('div',{},
    h('div',{style:{fontSize:'11px',color:'#94a3b8',marginBottom:'4px'}},'รหัสที่จะได้:'),
    codePreview,
    codeWarn
  ));

  // Section: จำเป็น
  form.appendChild(h('div',{style:{fontSize:'11px',fontWeight:700,color:'#64748b',textTransform:'uppercase',letterSpacing:'.04em',paddingBottom:'4px',borderBottom:'1px solid #f1f5f9',marginTop:'4px'}},'ข้อมูลจำเป็น ★'));
  form.appendChild(h('div',{},h('label',{className:'field-label'},'ชื่อ/รายละเอียด ★'),inpName));
  form.appendChild(h('div',{},h('label',{className:'field-label'},'ประเภท ★'),inpType));

  form.appendChild(h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'10px'}},
    h('div',{},h('label',{className:'field-label'},'แผ่น/กล่อง ★'),inpPcsPerBox),
    h('div',{},h('label',{className:'field-label'},'ตร.ม/แผ่น ★'),inpSqmPerPc)
  ));
  form.appendChild(preview);

  // Section: ไม่บังคับ
  form.appendChild(h('div',{style:{fontSize:'11px',fontWeight:700,color:'#64748b',textTransform:'uppercase',letterSpacing:'.04em',paddingBottom:'4px',borderBottom:'1px solid #f1f5f9',marginTop:'4px'}},'ข้อมูลเพิ่มเติม (ไม่บังคับ)'));

  form.appendChild(h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'10px'}},
    h('div',{},h('label',{className:'field-label'},'Sheet size'),inpSize),
    h('div',{},h('label',{className:'field-label'},'Chip size'),inpChipSize)
  ));
  form.appendChild(h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'10px'}},
    h('div',{},h('label',{className:'field-label'},'สต็อกขั้นต่ำ (ตร.ม)'),inpMinQty),
    h('div',{},h('label',{className:'field-label'},'รหัสอ้างอิง'),inpRefCode)
  ));

  // Section: สต็อกเริ่มต้น
  const inpInitQty = h('input',{type:'number',className:'input',placeholder:'เช่น 50.5 (ถ้ามีของอยู่แล้ว)',min:'0',step:'0.001'});
  const inpInitLot = h('input',{className:'input',placeholder:'เช่น Lot A, 2025-01 (ถ้าไม่ระบุจะใช้ "เดิม")'});
  const inpInitLocation = h('input',{className:'input',placeholder:'เช่น P14, หน้าบ้าน'});

  const initPreview = h('div',{style:{fontSize:'12px',color:'#64748b',background:'#f0fdf4',padding:'8px 12px',borderRadius:'6px',marginTop:'6px',display:'none'}});
  inpInitQty.addEventListener('input',()=>{
    const q = parseFloat(inpInitQty.value)||0;
    if(q>0){initPreview.style.display='block';initPreview.textContent='จะบันทึกรับเข้า '+fmtNum(q,3)+' ตร.ม อัตโนมัติ';}
    else initPreview.style.display='none';
  });

  form.appendChild(h('div',{style:{fontSize:'11px',fontWeight:700,color:'#059669',textTransform:'uppercase',letterSpacing:'.04em',paddingBottom:'4px',borderBottom:'1px solid #dcfce7',marginTop:'4px'}},'📦 สต็อกเริ่มต้น (ถ้ามีของอยู่แล้ว)'));
  form.appendChild(h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'10px'}},
    h('div',{},h('label',{className:'field-label'},'จำนวน (ตร.ม)'),inpInitQty),
    h('div',{},h('label',{className:'field-label'},'Lot'),inpInitLot)
  ));
  form.appendChild(h('div',{},h('label',{className:'field-label'},'ที่เก็บ'),inpInitLocation));
  form.appendChild(initPreview);

  const saveBtn = h('button',{className:'btn btn-primary',style:{flex:2,justifyContent:'center',padding:'10px',fontSize:'14px'}},'✓ เพิ่มสินค้าใหม่ → Sheet');

  saveBtn.addEventListener('click', async()=>{
    const code = 'DM-'+inpP.value.trim().toUpperCase()+inpQ.value.trim().toUpperCase()+inpR.value.trim().toUpperCase()+inpS.value.trim().toUpperCase();
    const name = inpName.value.trim();
    const type = inpType.value.trim();
    const pcsPerBox = inpPcsPerBox.value.trim();
    const sqmPerPc = inpSqmPerPc.value.trim();

    // Validate
    if (!inpP.value.trim()||!inpQ.value.trim()||!inpR.value.trim()||!inpS.value.trim()) { errDiv.textContent='กรุณากรอก P, Q, R, S ให้ครบเพื่อสร้างรหัส'; errDiv.style.display='block'; return; }
    if (!name) { errDiv.textContent='กรุณากรอกชื่อสินค้า'; errDiv.style.display='block'; inpName.focus(); return; }
    if (!type) { errDiv.textContent='กรุณากรอกประเภท'; errDiv.style.display='block'; inpType.focus(); return; }
    if (!pcsPerBox||parseFloat(pcsPerBox)<=0) { errDiv.textContent='กรุณากรอกจำนวนแผ่น/กล่อง'; errDiv.style.display='block'; inpPcsPerBox.focus(); return; }
    if (!sqmPerPc||parseFloat(sqmPerPc)<=0) { errDiv.textContent='กรุณากรอก ตร.ม/แผ่น'; errDiv.style.display='block'; inpSqmPerPc.focus(); return; }

    // เช็คซ้ำใน local ก่อน
    const exists = products.find(p=>p.id===code||p.code===code);
    if (exists) { errDiv.textContent='รหัส "'+code+'" มีอยู่แล้ว: '+exists.name; errDiv.style.display='block'; return; }

    errDiv.style.display='none';
    saveBtn.disabled=true; isSaving=true;
    saveBtn.textContent='⏳ กำลังบันทึก...';

    try {
      // 1. เพิ่มสินค้าใหม่
      const url = API_URL + "?" + new URLSearchParams({
        action: 'addProduct',
        code, name, type,
        pcsPerBox, sqmPerPc,
        size: inpSize.value.trim(),
        chipSize: inpChipSize.value.trim(),
        minQty: inpMinQty.value.trim() || '5',
        refCode: inpRefCode.value.trim(),
        partP: inpP.value.trim().toUpperCase(),
        partQ: inpQ.value.trim().toUpperCase(),
        partR: inpR.value.trim().toUpperCase(),
        partS: inpS.value.trim().toUpperCase(),
        addedBy: currentUser ? currentUser.name : '',
      });
      const res = await fetch(url);
      const data = await res.json();

      if (data.success) {
        // 2. ถ้ามีสต็อกเริ่มต้น → บันทึกรับเข้าอัตโนมัติ
        const initQty = parseFloat(inpInitQty.value)||0;
        if (initQty > 0) {
          await fetchProducts(); // โหลดสินค้าใหม่ก่อน
          const newProduct = products.find(p=>p.id===code||p.code===code);
          if (newProduct) {
            const initUrl = API_URL + "?" + new URLSearchParams({
              action: 'addIn',
              id: code, code: code, name: name,
              sqm: initQty,
              date: td(),
              lot: inpInitLot.value.trim() || 'เดิม',
              location: inpInitLocation.value.trim(),
              pcsPerBox: pcsPerBox,
              sqmPerPc: sqmPerPc,
              note: 'สต็อกเริ่มต้น',
              addedBy: currentUser ? currentUser.name : '',
            });
            await fetch(initUrl);
          }
        }

        isSaving=false; ui.modal=null;
        showToast('✓ เพิ่มสินค้า "'+code+'"'+(initQty>0?' พร้อมสต็อก '+fmtNum(initQty,2)+' ตร.ม':'')+' สำเร็จ 🎉');
        await fetchProducts();
        fetchLots();
        render();
      } else {
        errDiv.textContent = data.error || 'เกิดข้อผิดพลาด';
        errDiv.style.display='block';
        saveBtn.disabled=false; isSaving=false;
        saveBtn.textContent='✓ เพิ่มสินค้าใหม่ → Sheet';
      }
    } catch(e) {
      errDiv.textContent='❌ '+e.message;
      errDiv.style.display='block';
      saveBtn.disabled=false; isSaving=false;
      saveBtn.textContent='✓ เพิ่มสินค้าใหม่ → Sheet';
    }
  });

  form.appendChild(h('div',{style:{display:'flex',gap:'8px',marginTop:'4px'}},
    h('button',{className:'btn btn-outline',style:{flex:1,justifyContent:'center',padding:'10px'},onClick:()=>{ui.modal=null;render();}},'ยกเลิก'),
    saveBtn
  ));

  modal.appendChild(form);
  overlay.appendChild(modal);
  return overlay;
}

                        fetchLots();
                        render();
                      } else showToast('❌ '+data.error,'err');
                    }},'✓ จ่ายแล้ว'),
                  h('button',{className:'btn btn-outline',style:{fontSize:'11px',padding:'3px 8px'},
                    onClick:async()=>{
                      if(!confirm('ยกเลิกการจอง "'+r.id+'"?')) return;
                      const res = await fetch(API_URL+'?'+new URLSearchParams({action:'cancelReservation',resId:r.id}));
                      const data = await res.json();
                      if(data.success){showToast('✓ ยกเลิกการจองแล้ว');await fetchReservations();render();}
                      else showToast('❌ '+data.error,'err');
                    }},'ยกเลิก')
                )
              )
            );
          }))
        )
      )
    ) : h('div',{className:'card empty-state'},
      h('div',{className:'empty-icon'},'🔖'),
      h('div',{style:{fontWeight:600}},'ไม่มีการจอง'),
      h('div',{style:{fontSize:'12px',color:'#94a3b8',marginTop:'4px'}},'กดปุ่ม + จองสินค้า เพื่อเพิ่มการจอง')
    ),

    // ประวัติการจอง
    done.length > 0 ? h('div',{className:'card'},
      h('div',{style:{padding:'12px 16px',borderBottom:'1px solid #e2e8f0',fontWeight:700,fontSize:'13px',color:'#64748b'}},'📋 ประวัติการจอง ('+done.length+')'),
      h('div',{style:{overflowX:'auto',maxHeight:'300px',overflowY:'auto'}},
        h('table',{},
          h('thead',{},h('tr',{},
            h('th',{},'เลขจอง'),
            h('th',{},'สินค้า'),
            h('th',{style:{textAlign:'right'}},'จำนวน'),
            h('th',{},'ลูกค้า'),
            h('th',{},'สถานะ'),
            h('th',{className:'desktop-only'},'วันจอง'),
            h('th',{style:{width:'40px'}},'')
          )),
          h('tbody',{},...done.slice(0,50).map(r=>{
            const p = products.find(x=>x.id===r.productId||x.code===r.productId);
            return h('tr',{style:{opacity:.6}},
              h('td',{style:{fontFamily:'monospace',fontSize:'12px'}},r.id),
              h('td',{className:'product-cell'},h('div',{className:'product-name',style:{fontSize:'12px'}},p?p.name:r.productName)),
              h('td',{style:{textAlign:'right',fontSize:'12px'}},fmtNum(r.sqm,3)),
              h('td',{style:{fontSize:'12px'}},r.customer),
              h('td',{},h('span',{className:'badge',style:{
                background:r.status==='จ่ายแล้ว'?'#dcfce7':'#f1f5f9',
                color:r.status==='จ่ายแล้ว'?'#166534':'#64748b'
              }},r.status)),
              h('td',{className:'desktop-only',style:{fontSize:'12px',color:'#64748b'}},fmtDate(r.date)),
              isAdmin()&&r.status==='ยกเลิก'?h('td',{},
                h('button',{className:'btn btn-danger',style:{fontSize:'10px',padding:'2px 7px'},
                  onClick:async()=>{
                    if(!confirm('ลบ "'+r.id+'" ถาวรเลยไหมครับ?')) return;
                    const res = await fetch(API_URL+'?'+new URLSearchParams({action:'deleteReservation',resId:r.id}));
                    const d = await res.json();
                    if(d.success){showToast('✓ ลบแล้ว');await fetchReservations();render();}
                    else showToast('❌ '+d.error,'err');
                  }},'🗑')
              ):h('td',{})
            );
          }))
        )
      )
    ) : null
  );
}

// ===== ADD RESERVATION MODAL =====
function AddReservationModal() {
  const overlay = h('div',{className:'modal-overlay',onClick:e=>{if(e.target===overlay){ui.modal=null;render();}}});
  const modal = h('div',{className:'modal',style:{padding:'24px',maxWidth:'480px'}});

  modal.appendChild(h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'18px'}},
    h('div',{style:{fontWeight:700,fontSize:'16px'}},'🔖 จองสินค้า'),
    h('button',{className:'btn btn-ghost',style:{padding:'5px 9px'},onClick:()=>{ui.modal=null;render();}},'✕')
  ));

  // ค้นหาสินค้า
  const searchInp = h('input',{className:'input',placeholder:'ค้นหาชื่อหรือรหัสสินค้า...',style:{marginBottom:'8px'}});
  const productList = h('div',{style:{maxHeight:'200px',overflowY:'auto',border:'1px solid #e2e8f0',borderRadius:'8px',marginBottom:'12px'}});
  let selectedProduct = null;
  const selectedDiv = h('div',{style:{display:'none',background:'#f0fdf4',border:'1px solid #bbf7d0',borderRadius:'8px',padding:'10px 12px',marginBottom:'12px'}});

  function renderProductList(q='') {
    productList.innerHTML='';
    const filtered = products.filter(p=>p.stock>0&&!p.discontinued&&
      (p.name.toLowerCase().includes(q.toLowerCase())||
       (p.code||'').toLowerCase().includes(q.toLowerCase())||
       (p.id||'').toLowerCase().includes(q.toLowerCase()))
    ).slice(0,20);
    if(filtered.length===0){
      productList.appendChild(h('div',{style:{padding:'12px',textAlign:'center',color:'#94a3b8',fontSize:'12px'}},'ไม่พบสินค้า'));
      return;
    }
    filtered.forEach(p=>{
      const reserved = getReservedQty(p.id);
      const available = Math.max(0, p.stock - reserved);
      const item = h('div',{style:{padding:'10px 12px',cursor:'pointer',borderBottom:'1px solid #f1f5f9',display:'flex',justifyContent:'space-between',alignItems:'center'}},
        h('div',{},
          h('div',{style:{fontWeight:500,fontSize:'13px'}},p.name),
          h('div',{style:{fontSize:'11px',color:'#64748b',fontFamily:'monospace'}},p.id)
        ),
        h('div',{style:{textAlign:'right'}},
          h('div',{style:{fontSize:'12px',fontWeight:700,color:available>0?'#059669':'#dc2626'}},fmtNum(available,2)+' ตร.ม'),
          reserved>0?h('div',{style:{fontSize:'10px',color:'#f59e0b'}},'จอง '+fmtNum(reserved,2)):null
        )
      );
      item.addEventListener('mouseenter',()=>item.style.background='#f8fafc');
      item.addEventListener('mouseleave',()=>item.style.background='');
      item.addEventListener('click',()=>{
        selectedProduct=p;
        productList.style.display='none';
        searchInp.style.display='none';
        selectedDiv.style.display='block';
        const reserved2 = getReservedQty(p.id);
        const available2 = Math.max(0,p.stock-reserved2);
        selectedDiv.innerHTML='';
        selectedDiv.appendChild(h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center'}},
          h('div',{},
            h('div',{style:{fontWeight:600,fontSize:'13px'}},p.name),
            h('div',{style:{fontSize:'11px',color:'#64748b',fontFamily:'monospace'}},p.id)
          ),
          h('div',{style:{textAlign:'right'}},
            h('div',{style:{fontSize:'12px',fontWeight:700,color:'#059669'}},'ว่าง '+fmtNum(available2,2)+' ตร.ม'),
            reserved2>0?h('div',{style:{fontSize:'10px',color:'#f59e0b'}},'จอง '+fmtNum(reserved2,2)+' ตร.ม'):null
          )
        ));
        selectedDiv.appendChild(h('button',{className:'btn btn-ghost',style:{fontSize:'11px',marginTop:'6px',padding:'2px 8px'},
          onClick:()=>{
            selectedProduct=null;
            productList.style.display='block';
            searchInp.style.display='block';
            selectedDiv.style.display='none';
            searchInp.value='';
            renderProductList('');
          }},'เปลี่ยนสินค้า'));
        // อัปเดต lot dropdown
        updateLotOptions(p.id);
        // build unit buttons
        buildUnitBtns(p);
        unitBtns.style.display='flex';
      });
      productList.appendChild(item);
    });
  }
  searchInp.addEventListener('input',()=>renderProductList(searchInp.value));
  renderProductList('');

  // Lot selector
  const inpLot = h('select',{className:'input'});
  function updateLotOptions(productId) {
    inpLot.innerHTML='<option value="">-- ทุก Lot --</option>';
    const productLots = lots.filter(l=>String(l.productId).trim()===String(productId).trim()&&l.stock>0);
    productLots.forEach(l=>{
      const reserved = getReservedQty(productId, l.lot);
      const available = Math.max(0,l.stock-reserved);
      const opt = document.createElement('option');
      opt.value = l.lot;
      opt.textContent = l.lot+' (ว่าง '+fmtNum(available,2)+' ตร.ม)';
      inpLot.appendChild(opt);
    });
  }

  const inpSqm = h('input',{type:'number',className:'input',placeholder:'เช่น 50.5',min:'0.001',step:'0.001'});
  let resUnit = 'sqm';
  const unitBtns = h('div',{style:{display:'flex',gap:'6px',marginTop:'6px',display:'none'}});

  function makeUnitBtn(key, label, sub) {
    const btn = h('button',{style:{
      flex:1, padding:'8px 4px', border:'2px solid #e2e8f0', borderRadius:'8px',
      cursor:'pointer', background:'white', fontFamily:'inherit', transition:'all .15s',
      textAlign:'center'
    }});
    btn.appendChild(h('div',{style:{fontWeight:700,fontSize:'13px'}},label));
    btn.appendChild(h('div',{style:{fontSize:'10px',color:'#94a3b8',marginTop:'2px'}},sub));
    btn.addEventListener('click',()=>{
      resUnit=key;
      unitBtns.querySelectorAll('button').forEach(b=>{
        b.style.border='2px solid #e2e8f0';
        b.style.background='white';
        b.querySelector('div').style.color='#0f172a';
      });
      btn.style.border='2px solid #059669';
      btn.style.background='#f0fdf4';
      btn.querySelector('div').style.color='#059669';
      updateResPreview();
    });
    if(key==='sqm'){
      btn.style.border='2px solid #059669';
      btn.style.background='#f0fdf4';
      btn.querySelector('div').style.color='#059669';
    }
    return btn;
  }

  const sqmPerBox = (parseFloat(selectedProduct?.pcsPerBox)||1)*(parseFloat(selectedProduct?.sqmPerPc)||1);
  const pcsPerBox = parseFloat(selectedProduct?.pcsPerBox)||1;
  const sqmPerPc = parseFloat(selectedProduct?.sqmPerPc)||1;

  const calcPreview = h('div',{style:{fontSize:'12px',color:'#64748b',background:'#f8fafc',padding:'8px 12px',borderRadius:'6px',marginTop:'6px',display:'none'}});

  function updateResPreview() {
    if(!selectedProduct) return;
    const raw = parseFloat(inpSqm.value)||0;
    if(raw<=0){ calcPreview.style.display='none'; availPreview.style.display='none'; return; }

    const p = selectedProduct;
    const pcsB = parseFloat(p.pcsPerBox)||1;
    const sqmP = parseFloat(p.sqmPerPc)||1;
    let totalSqm = 0;
    if(resUnit==='sqm') totalSqm = raw;
    else if(resUnit==='box') totalSqm = raw * pcsB * sqmP;
    else if(resUnit==='pcs') totalSqm = raw * sqmP;

    calcPreview.style.display='block';
    calcPreview.textContent = 'รวม '+fmtNum(totalSqm,4)+' ตร.ม';

    const lot = inpLot.value;
    const available = getAvailableQty(p.id, lot);
    availPreview.style.display='block';
    if(totalSqm > available){
      availPreview.textContent='⚠ จำนวนเกินที่ว่าง (ว่างจริง '+fmtNum(available,3)+' ตร.ม)';
      availPreview.style.color='#dc2626';
    } else {
      availPreview.textContent='✓ จองได้ (ว่างหลังจอง '+fmtNum(available-totalSqm,3)+' ตร.ม)';
      availPreview.style.color='#059669';
    }
  }

  inpSqm.addEventListener('input', updateResPreview);

  // สร้าง unit buttons หลังจากเลือกสินค้าแล้ว
  function buildUnitBtns(p) {
    unitBtns.innerHTML='';
    const pcsB = parseFloat(p.pcsPerBox)||1;
    const sqmP = parseFloat(p.sqmPerPc)||1;
    unitBtns.appendChild(makeUnitBtn('sqm','ตร.ม','1 = 1 ตร.ม'));
    unitBtns.appendChild(makeUnitBtn('box','กล่อง',pcsB+' แผ่น'));
    unitBtns.appendChild(makeUnitBtn('pcs','แผ่น',fmtNum(sqmP,4)+' ตร.ม'));
  }

  const availPreview = h('div',{style:{fontSize:'12px',color:'#64748b',marginTop:'4px',display:'none'}});
  const inpCustomer = h('input',{className:'input',placeholder:'ชื่อลูกค้าหรือโปรเจค',list:'res-cust-list'});
  const custList = h('datalist',{id:'res-cust-list'});
  projects.forEach(c=>{const o=document.createElement('option');o.value=c;custList.appendChild(o);});
  modal.appendChild(custList);

  const errDiv = h('div',{style:{background:'#fee2e2',color:'#991b1b',borderRadius:'8px',padding:'8px 12px',fontSize:'12px',marginBottom:'8px',display:'none'}});
  const saveBtn = h('button',{className:'btn btn-primary',style:{flex:1,justifyContent:'center',padding:'10px'}},'✓ ยืนยันการจอง');

  saveBtn.addEventListener('click',async()=>{
    if(!selectedProduct){errDiv.textContent='กรุณาเลือกสินค้า';errDiv.style.display='block';return;}
    const raw = parseFloat(inpSqm.value)||0;
    const p2 = selectedProduct;
    const pcsB2 = parseFloat(p2.pcsPerBox)||1;
    const sqmP2 = parseFloat(p2.sqmPerPc)||1;
    let sqm = 0;
    if(resUnit==='sqm') sqm = raw;
    else if(resUnit==='box') sqm = raw * pcsB2 * sqmP2;
    else if(resUnit==='pcs') sqm = raw * sqmP2;
    const customer = inpCustomer.value.trim();
    if(raw<=0){errDiv.textContent='กรุณากรอกจำนวน';errDiv.style.display='block';return;}
    if(!customer){errDiv.textContent='กรุณากรอกชื่อลูกค้า';errDiv.style.display='block';return;}
    errDiv.style.display='none';
    saveBtn.disabled=true; saveBtn.textContent='⏳ กำลังจอง...';
    const unitLabel = resUnit==='sqm'?'ตร.ม':resUnit==='box'?'กล่อง':'แผ่น';
    const url = API_URL+'?'+new URLSearchParams({
      action:'addReservation',
      productId:selectedProduct.id,
      productName:selectedProduct.name,
      lot:inpLot.value,
      sqm, customer,
      unit: unitLabel,
      qtyRaw: raw,
      addedBy:currentUser?currentUser.name:''
    });
    const res = await fetch(url);
    const data = await res.json();
    if(data.success){
      showToast('✓ จองสำเร็จ เลขจอง: '+data.id);
      await fetchReservations();
      ui.modal=null;
      render(); // ← ปิด modal
    } else {
      errDiv.textContent='❌ '+data.error;
      errDiv.style.display='block';
      saveBtn.disabled=false;
      saveBtn.textContent='✓ ยืนยันการจอง';
    }
  });

  modal.appendChild(searchInp);
  modal.appendChild(productList);
  modal.appendChild(selectedDiv);
  modal.appendChild(h('div',{style:{display:'flex',flexDirection:'column',gap:'10px'}},
    h('div',{},h('label',{className:'field-label'},'Lot'),inpLot),
    h('div',{},
      h('label',{className:'field-label'},'จำนวน ★'),
      inpSqm,
      unitBtns,
      calcPreview,
      availPreview
    ),
    h('div',{},h('label',{className:'field-label'},'ลูกค้า / โปรเจค ★'),inpCustomer)
  ));
  modal.appendChild(errDiv);
  modal.appendChild(h('div',{style:{display:'flex',gap:'8px',marginTop:'12px'}},
    h('button',{className:'btn btn-outline',style:{flex:1,justifyContent:'center',padding:'10px'},onClick:()=>{ui.modal=null;render();}},'ยกเลิก'),
    saveBtn
  ));
  overlay.appendChild(modal);
  return overlay;
}

function reprintDO(o) {
  const items = Array.isArray(o.items) ? o.items : [];
  const now = new Date(o.date||td());
  const dateStr = now.toLocaleDateString('th-TH',{day:'2-digit',month:'2-digit',year:'numeric'});
  const rows = items.map((item,idx)=>{
    const p = products.find(x=>x.id===item.productId||x.code===item.productId);
    const pcsB = parseFloat(p?.pcsPerBox||item.pcsPerBox)||1;
    const sqmP = parseFloat(p?.sqmPerPc||item.sqmPerPc)||1;
    const boxes = Math.round(item.sqm/(pcsB*sqmP));
    const desc = [item.productId, p?p.name:item.productName, item.size?'Size: '+item.size:''].filter(Boolean).join('<br>');
    return '<tr><td style="text-align:center;border:1px solid #b0c4de;padding:8px 6px;height:48px">'+(idx+1)+'</td><td style="border:1px solid #b0c4de;padding:8px;height:48px">'+desc+'</td><td style="text-align:center;border:1px solid #b0c4de;padding:8px 6px;height:48px">'+fmtNum(item.sqm,3)+'</td><td style="text-align:center;border:1px solid #b0c4de;padding:8px 6px;height:48px">Sqm</td><td style="border:1px solid #b0c4de;padding:8px;height:48px">('+boxes+' กล่อง)</td></tr>';
  });
  while(rows.length<10) rows.push('<tr><td style="border:1px solid #b0c4de;padding:8px;height:48px">&nbsp;</td><td style="border:1px solid #b0c4de;padding:8px;height:48px"></td><td style="border:1px solid #b0c4de;padding:8px;height:48px"></td><td style="border:1px solid #b0c4de;padding:8px;height:48px"></td><td style="border:1px solid #b0c4de;padding:8px;height:48px"></td></tr>');

    '<div class="no-print" style="text-align:right;margin-bottom:12px"><button onclick="window.print()" style="background:#0ea5e9;color:white;border:none;padding:8px 20px;border-radius:6px;font-size:14px;cursor:pointer;font-family:inherit">🖨 พิมพ์</button> <button onclick="window.close()" style="background:#64748b;color:white;border:none;padding:8px 16px;border-radius:6px;font-size:14px;cursor:pointer;font-family:inherit">✕ ปิด</button></div>'+

async function editTransactionProject(tx) {
  const newProject = prompt('แก้ไขชื่อลูกค้า/โปรเจค:', tx.project||'');
  if (newProject === null) return;
  const url = API_URL+'?'+new URLSearchParams({
    action:'updateTransactionProject',
    rowIndex: tx.rowIndex,
    txType: tx.type,
    newProject: newProject.trim()
  });
  const res = await fetch(url);
  const data = await res.json();
  if(data.success){
    showToast('✓ แก้ไขชื่อลูกค้าแล้ว');
    await fetchTransactions();
    render();
  } else {
    showToast('❌ '+(data.error||'เกิดข้อผิดพลาด'),'err');
  }
}

function generateDONumber() {
  const now = new Date();
  const buddhistYear = now.getFullYear() - 1957; // พ.ศ. - 543 + 500 = ค.ศ. + 43 -> แต่โจทย์บอกปี 2605 = 26, เดือน 05
  // format: YYMM + seq
  const yy = String(buddhistYear).slice(-2); // เช่น 2568 -> 68
  const mm = String(now.getMonth()+1).padStart(2,'0');
  const existing = (JSON.parse(localStorage.getItem('dm_do_seq')||'{}'));
  const key = yy+mm;
  const seq = (existing[key]||0)+1;
  existing[key]=seq;
  localStorage.setItem('dm_do_seq', JSON.stringify(existing));
  return yy+mm+String(seq).padStart(3,'0');
}

    o.items.forEach((it,idx)=>{
      const p = products.find(x=>x.id===it.productId||x.code===it.productId);
      const sqm = parseFloat(it.sqm)||0;
      totalSqm += sqm;
      const pcsPerBox = p?parseFloat(p.pcsPerBox)||1:1;
      const sqmPerPc = p?parseFloat(p.sqmPerPc)||1:1;
      const pcs = sqmPerPc>0?sqm/sqmPerPc:0;
      const boxes = pcsPerBox>0?pcs/pcsPerBox:0;

      const row = h('div',{style:{padding:'10px 12px',borderBottom:idx<o.items.length-1?'1px solid #f1f5f9':'none',display:'flex',justifyContent:'space-between',alignItems:'center',gap:'10px'}});
      row.appendChild(h('div',{style:{flex:1,minWidth:0}},
        h('div',{style:{fontWeight:600,fontSize:'13px',color:'#0f172a'}},it.productName||(p?p.name:it.productId)),
        h('div',{style:{fontSize:'11px',color:'#64748b',marginTop:'2px'}},
          (it.size||(p?p.size:'')||'')+(it.lot?' · Lot '+it.lot:'')
        )
      ));
      row.appendChild(h('div',{style:{textAlign:'right',whiteSpace:'nowrap'}},
        h('div',{style:{fontWeight:700,color:'#0ea5e9',fontSize:'13px'}},fmtNum(sqm,2)+' ตร.ม'),
        h('div',{style:{fontSize:'11px',color:'#94a3b8',marginTop:'2px'}},fmtNum(pcs,2)+' แผ่น · '+fmtNum(boxes,2)+' กล่อง')
      ));
      itemsBox.appendChild(row);
    });
    body.appendChild(itemsBox);

    // Total
    body.appendChild(h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'12px',marginTop:'8px',background:'#f0f9ff',border:'1px solid #bae6fd',borderRadius:'8px'}},
      h('div',{style:{fontSize:'12px',fontWeight:600,color:'#0c4a6e'}},'รวมทั้งหมด'),
      h('div',{style:{fontSize:'15px',fontWeight:800,color:'#0ea5e9'}},fmtNum(totalSqm,2)+' ตร.ม')
    ));
  } else {
    body.appendChild(h('div',{style:{padding:'20px',textAlign:'center',color:'#94a3b8',fontSize:'12px',border:'1px dashed #e2e8f0',borderRadius:'8px'}},'ไม่มีรายการ'));
  }

  modal.appendChild(body);

  // Footer actions
  const footer = h('div',{style:{padding:'12px 20px',borderTop:'1px solid #e2e8f0',background:'#f8fafc',display:'flex',gap:'8px',flexShrink:0,flexWrap:'wrap'}});
  footer.appendChild(h('button',{className:'btn btn-ghost',style:{flex:'1 1 auto',justifyContent:'center'},
    onClick:()=>{ui.modal=null;ui.viewDO=null;render();}},'ปิด'));
  if(!isCancelled) {
    footer.appendChild(h('button',{className:'btn btn-outline',style:{flex:'1 1 auto',justifyContent:'center'},
      onClick:()=>reprintDO(o)},'🖨 พิมพ์ซ้ำ'));
  }
  if(canCancel) {
    footer.appendChild(h('button',{className:'btn btn-outline',style:{flex:'1 1 auto',justifyContent:'center',color:'#dc2626',borderColor:'#fecaca'},
      onClick:async ()=>{await cancelDeliveryOrder(o);ui.modal=null;ui.viewDO=null;render();}},'ยกเลิก'));
  }
  if(canDelete) {
    footer.appendChild(h('button',{className:'btn btn-danger',style:{flex:'1 1 auto',justifyContent:'center'},
      onClick:async ()=>{await deleteDeliveryOrder(o);ui.modal=null;ui.viewDO=null;render();}},'🗑 ลบ'));
  }
  modal.appendChild(footer);

  overlay.appendChild(modal);
  return overlay;
}

async function cancelDeliveryOrder(o) {
  if(!o || !o.doNo) return;
  if(!confirm('ยืนยันการยกเลิกใบส่งของ '+o.doNo+'?\n\nรายการจอง/จ่ายออกที่ผูกไว้จะกลับมาออกใบใหม่ได้')) return;
  try {
    const res = await fetch(API_URL+'?'+new URLSearchParams({
      action:'cancelDeliveryOrder',
      doNo:o.doNo,
      cancelBy:currentUser?currentUser.name:''
    }));
    const data = await res.json();
    if(data.success){
      showToast('✓ ยกเลิกใบส่งของ '+o.doNo+' แล้ว');
      await fetchDeliveryOrders();
      await fetchReservations();
      await fetchTransactions();
      render();
    } else {
      showToast('❌ '+(data.error||'ยกเลิกไม่สำเร็จ'),'err');
    }
  } catch(e) {
    console.error('Cancel DO error:',e);
    showToast('❌ เกิดข้อผิดพลาด','err');
  }
}

async function deleteDeliveryOrder(o) {
  if(!o || !o.doNo) return;
  if(!isAdmin()) { showToast('❌ เฉพาะ Admin เท่านั้น','err'); return; }
  if(String(o.status||'').trim()!=='ยกเลิก') {
    showToast('❌ ต้องยกเลิกใบส่งของก่อนถึงจะลบได้','err');
    return;
  }
  if(!confirm('ลบใบส่งของ '+o.doNo+' ออกถาวร?\n\nการดำเนินการนี้ไม่สามารถย้อนกลับได้')) return;
  try {
    const res = await fetch(API_URL+'?'+new URLSearchParams({
      action:'deleteDeliveryOrder',
      doNo:o.doNo
    }));
    const data = await res.json();
    if(data.success){
      showToast('✓ ลบใบส่งของ '+o.doNo+' แล้ว');
      await fetchDeliveryOrders();
      render();
    } else {
      showToast('❌ '+(data.error||'ลบไม่สำเร็จ'),'err');
    }
  } catch(e) {
    console.error('Delete DO error:',e);
    showToast('❌ เกิดข้อผิดพลาด','err');
  }
}

function AddDOItemModal() {
  const overlay = h('div',{className:'modal-overlay',onClick:e=>{if(e.target===overlay){ui.modal='createDO';render();}}});
  const modal = h('div',{className:'modal',style:{padding:'20px',maxWidth:'520px'}});

  modal.appendChild(h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'14px'}},
    h('div',{style:{fontWeight:700,fontSize:'15px'}},'+ เพิ่มรายการ'),
    h('button',{className:'btn btn-ghost',style:{padding:'5px 9px'},onClick:()=>{ui.modal='createDO';render();}},'✕')
  ));

  // Tab: จาก การจอง / จ่ายออก / ค้นหาสินค้า
  let doItemTab = 'reservation';
  const tabBar = h('div',{style:{display:'flex',gap:'6px',marginBottom:'12px'}});
  const tabContent = h('div',{});

  function makeTab(key, label) {
    const btn = h('button',{className:'tab-pill'+(doItemTab===key?' active':'')});
    btn.textContent = label;
    btn.addEventListener('click',()=>{ doItemTab=key; renderTab(); });
    return btn;
  }

  // สินค้าที่จอง/จ่าย ที่ยังไม่ออกใบส่งของ
  const reservedItems = reservations.filter(r=>r.status==='จอง' && !String(r.doNo||'').trim());
  // จ่ายออก: ต้องเป็นรายการหลังวันที่ 20/5/2026 และยังไม่ออกใบส่งของ
  const DO_CUTOFF_DATE = new Date('2026-05-20T00:00:00');
  const recentOut = transactions.filter(t=>t.type==='out'&&!t.cancelled&&!String(t.doNo||'').trim()&&new Date(t.date)>DO_CUTOFF_DATE);

  let selProduct2 = null;
  let selSource = '';
  let selSourceMeta = null;
  let doItemUnit = 'sqm';
  const lotSel2 = h('select',{className:'input'});
  const inpQty2 = h('input',{type:'number',className:'input',placeholder:'จำนวน',min:'0.001',step:'0.001'});
  const unitBtns2 = h('div',{style:{display:'flex',gap:'6px',marginTop:'6px'}});
  const calcPrev2 = h('div',{style:{fontSize:'11px',color:'#059669',marginTop:'4px',display:'none'}});
  const formDiv = h('div',{style:{display:'none',flexDirection:'column',gap:'8px',marginTop:'10px'}});
  const selDiv2 = h('div',{style:{background:'#f0fdf4',border:'1px solid #bbf7d0',borderRadius:'8px',padding:'8px 12px',fontSize:'13px',marginBottom:'8px'}});

  function makeUBtn2(key,label,sub){
    const btn=h('button',{style:{flex:1,padding:'6px 4px',border:'2px solid #e2e8f0',borderRadius:'7px',cursor:'pointer',background:'white',fontFamily:'inherit',textAlign:'center'}});
    btn.appendChild(h('div',{style:{fontWeight:700,fontSize:'12px'}},label));
    btn.appendChild(h('div',{style:{fontSize:'10px',color:'#94a3b8'}},sub));
    btn.addEventListener('click',()=>{
      doItemUnit=key;
      unitBtns2.querySelectorAll('button').forEach(b=>{b.style.border='2px solid #e2e8f0';b.style.background='white';});
      btn.style.border='2px solid #0ea5e9'; btn.style.background='#f0f9ff';
      updateCalc2();
    });
    if(key==='sqm'){btn.style.border='2px solid #0ea5e9';btn.style.background='#f0f9ff';}
    return btn;
  }

  function updateCalc2(){
    if(!selProduct2){calcPrev2.style.display='none';return;}
    const raw=parseFloat(inpQty2.value)||0;
    if(!raw){calcPrev2.style.display='none';return;}
    const pcsB=parseFloat(selProduct2.pcsPerBox)||1;
    const sqmP=parseFloat(selProduct2.sqmPerPc)||1;
    let total=raw;
    if(doItemUnit==='box') total=raw*pcsB*sqmP;
    else if(doItemUnit==='pcs') total=raw*sqmP;
    calcPrev2.style.display='block';
    calcPrev2.textContent='รวม '+fmtNum(total,4)+' ตร.ม';
  }
  inpQty2.addEventListener('input', updateCalc2);

  function selectProduct2(p, lot='', sqm=0, source='', sourceMeta=null) {
    selProduct2 = p;
    selSource = source;
    selSourceMeta = sourceMeta || null;
    selDiv2.innerHTML='';
    selDiv2.appendChild(h('div',{style:{fontWeight:600,fontSize:'13px'}},p.name));
    selDiv2.appendChild(h('div',{style:{fontSize:'11px',color:'#64748b',fontFamily:'monospace'}},p.id+(source?' · จาก'+source:'')));
    lotSel2.innerHTML='<option value="">-- ไม่ระบุ Lot --</option>';
    lots.filter(l=>String(l.productId).trim()===p.id&&l.stock>0).forEach(l=>{
      const o=document.createElement('option');
      o.value=l.lot; o.textContent=l.lot+' ('+fmtNum(l.stock,2)+' ตร.ม)';
      lotSel2.appendChild(o);
    });
    if(lot) lotSel2.value=lot;
    unitBtns2.innerHTML='';
    const pcsB=parseFloat(p.pcsPerBox)||1;
    const sqmP2=parseFloat(p.sqmPerPc)||1;
    unitBtns2.appendChild(makeUBtn2('sqm','ตร.ม','1 = 1 ตร.ม'));
    unitBtns2.appendChild(makeUBtn2('box','กล่อง',pcsB+' แผ่น'));
    unitBtns2.appendChild(makeUBtn2('pcs','แผ่น',fmtNum(sqmP2,4)+' ตร.ม'));
    if(sqm>0) inpQty2.value=fmtNum(sqm,3);
    formDiv.style.display='flex';
    tabContent.style.display='none';
    tabBar.style.display='none';
  }

  function renderTab() {
    // อัปเดต tab active
    tabBar.innerHTML='';
    tabBar.appendChild(makeTab('reservation','🔖 จากการจอง ('+reservedItems.length+')'));
    tabBar.appendChild(makeTab('out','⬆ จ่ายแล้วรอออกใบ ('+recentOut.length+')'));

    tabContent.innerHTML='';
    if(doItemTab==='reservation'){
      if(reservedItems.length===0){
        tabContent.appendChild(h('div',{style:{padding:'20px',textAlign:'center',color:'#94a3b8',fontSize:'12px'}},'ไม่มีการจองที่ค้างอยู่'));
      } else {
        reservedItems.forEach(r=>{
          const p=products.find(x=>x.id===r.productId||x.code===r.productId);
          if(!p) return;
          const row=h('div',{style:{padding:'10px 12px',cursor:'pointer',borderBottom:'1px solid #f1f5f9',display:'flex',justifyContent:'space-between',alignItems:'center'}});
          row.appendChild(h('div',{},
            h('div',{style:{fontWeight:500,fontSize:'13px'}},p.name),
            h('div',{style:{fontSize:'11px',color:'#64748b'}},r.id+' · '+r.customer+(r.lot?' · Lot '+r.lot:''))
          ));
          row.appendChild(h('div',{style:{textAlign:'right'}},
            h('div',{style:{fontWeight:700,color:'#f59e0b'}},fmtNum(r.sqm,2)+' ตร.ม'),
            h('div',{style:{fontSize:'10px',color:'#64748b'}},fmtDate(r.date))
          ));
          row.addEventListener('mouseenter',()=>row.style.background='#f8fafc');
          row.addEventListener('mouseleave',()=>row.style.background='');
          row.addEventListener('click',()=>selectProduct2(p,r.lot,r.sqm,'การจอง '+r.id,{resId:r.id}));
          tabContent.appendChild(row);
        });
      }
    } else if(doItemTab==='out'){
      if(recentOut.length===0){
        tabContent.appendChild(h('div',{style:{padding:'20px',textAlign:'center',color:'#94a3b8',fontSize:'12px'}},'ไม่มีรายการจ่ายออกที่รอออกใบส่งของ'));
      } else {
        recentOut.forEach(tx=>{
          const p=products.find(x=>x.id===tx.productId||x.code===tx.productCode);
          if(!p) return;
          const row=h('div',{style:{padding:'10px 12px',cursor:'pointer',borderBottom:'1px solid #f1f5f9',display:'flex',justifyContent:'space-between',alignItems:'center'}});
          row.appendChild(h('div',{},
            h('div',{style:{fontWeight:500,fontSize:'13px'}},p.name),
            h('div',{style:{fontSize:'11px',color:'#64748b'}},fmtDate(tx.date)+(tx.lot?' · Lot '+tx.lot:'')+(tx.project?' · '+tx.project:''))
          ));
          row.appendChild(h('div',{style:{textAlign:'right'}},
            h('div',{style:{fontWeight:700,color:'#dc2626'}},fmtNum(tx.sqm,2)+' ตร.ม')
          ));
          row.addEventListener('mouseenter',()=>row.style.background='#f8fafc');
          row.addEventListener('mouseleave',()=>row.style.background='');
          row.addEventListener('click',()=>selectProduct2(p,tx.lot,tx.sqm,'จ่ายออก '+fmtDate(tx.date),{rowIndex:tx.rowIndex}));
          tabContent.appendChild(row);
        });
      }
    }
  }

  renderTab();

  formDiv.appendChild(selDiv2);
  formDiv.appendChild(h('div',{},h('label',{className:'field-label'},'Lot'),lotSel2));
  formDiv.appendChild(h('div',{},h('label',{className:'field-label'},'จำนวน ★'),inpQty2,unitBtns2,calcPrev2));
  formDiv.appendChild(h('button',{className:'btn btn-ghost',style:{fontSize:'11px',alignSelf:'flex-start'},
    onClick:()=>{
      selProduct2=null; formDiv.style.display='none';
      tabContent.style.display='block'; tabBar.style.display='flex';
      inpQty2.value=''; calcPrev2.style.display='none';
    }},'← เลือกใหม่'));

  modal.appendChild(tabBar);
  modal.appendChild(h('div',{style:{border:'1px solid #e2e8f0',borderRadius:'8px',maxHeight:'240px',overflowY:'auto'}},tabContent));
  modal.appendChild(formDiv);
  modal.appendChild(h('div',{style:{display:'flex',gap:'8px',marginTop:'12px'}},
    h('button',{className:'btn btn-outline',style:{flex:1,justifyContent:'center'},onClick:()=>{ui.modal='createDO';render();}},'← กลับ'),
    h('button',{className:'btn btn-primary',style:{flex:2,justifyContent:'center'},
      onClick:()=>{
        if(!selProduct2){return;}
        const raw=parseFloat(inpQty2.value)||0;
        if(!raw) return;
        const pcsB=parseFloat(selProduct2.pcsPerBox)||1;
        const sqmP=parseFloat(selProduct2.sqmPerPc)||1;
        let totalSqm=raw;
        if(doItemUnit==='box') totalSqm=raw*pcsB*sqmP;
        else if(doItemUnit==='pcs') totalSqm=raw*sqmP;
        doItems.push({
          productId:selProduct2.id,
          productName:selProduct2.name,
          size:selProduct2.size||'',
          pcsPerBox:selProduct2.pcsPerBox||1,
          sqmPerPc:selProduct2.sqmPerPc||1,
          lot:lotSel2.value,
          sqm:totalSqm,
          rawQty:raw,
          unit:doItemUnit,
          source:selSource,
          resId:selSourceMeta&&selSourceMeta.resId?selSourceMeta.resId:'',
          rowIndex:selSourceMeta&&selSourceMeta.rowIndex!==undefined?selSourceMeta.rowIndex:'',
          cancelled:false
        });
        ui.modal='createDO';
        render();
      }},'+ เพิ่ม')
  ));

  overlay.appendChild(modal);
  return overlay;
}

async function printDO() {

// ===== CUSTOMERS / LOT / PRODUCT VIEW =====
function getCustomerTxs() {
  // เฉพาะรายการจ่ายออก ที่มี project ระบุ
  return transactions.filter(t => t.type === 'out' && t.project);
}

function getCustomerSummary() {
  const map = {};
  getCustomerTxs().forEach(tx => {
    const key = String(tx.project).trim();
    if (!map[key]) map[key] = { name: key, count: 0, sqm: 0, products: new Set(), lots: new Set(), lastDate: tx.date };
    map[key].count++;
    map[key].sqm += tx.sqm;
    map[key].products.add(tx.productCode || tx.productId);
    if (tx.lot) map[key].lots.add(tx.lot);
    if (new Date(tx.date) > new Date(map[key].lastDate)) map[key].lastDate = tx.date;
  });
  return Object.values(map).map(c => ({
    ...c,
    productCount: c.products.size,
    lotCount: c.lots.size,
    products: Array.from(c.products),
    lots: Array.from(c.lots)
  })).sort((a,b) => b.sqm - a.sqm);
}

function getLotSummary() {
  const map = {};
  transactions.forEach(tx => {
    if (!tx.lot) return;
    const key = (tx.productCode||tx.productId) + '||' + tx.lot;
    if (!map[key]) map[key] = {
      productId: tx.productId, productCode: tx.productCode, lot: tx.lot,
      inSqm: 0, outSqm: 0, customers: new Set(), lastDate: tx.date,
      txCount: 0
    };
    if (tx.type === 'in') map[key].inSqm += tx.sqm;
    else { 
      map[key].outSqm += tx.sqm;
      if (tx.project) map[key].customers.add(tx.project);
    }
    map[key].txCount++;
    if (new Date(tx.date) > new Date(map[key].lastDate)) map[key].lastDate = tx.date;
  });
  return Object.values(map).map(l => ({
    ...l,
    remaining: l.inSqm - l.outSqm,
    customerCount: l.customers.size,
    customers: Array.from(l.customers)
  })).sort((a,b) => new Date(b.lastDate) - new Date(a.lastDate));
}

function getProductSummary() {
  const map = {};
  transactions.forEach(tx => {
    const key = tx.productCode || tx.productId;
    if (!key) return;
    if (!map[key]) map[key] = {
      productId: tx.productId, productCode: tx.productCode,
      inSqm: 0, outSqm: 0, lots: new Set(), customers: new Set(),
      lastDate: tx.date, txCount: 0
    };
    if (tx.type === 'in') map[key].inSqm += tx.sqm;
    else {
      map[key].outSqm += tx.sqm;
      if (tx.project) map[key].customers.add(tx.project);
    }
    if (tx.lot) map[key].lots.add(tx.lot);
    map[key].txCount++;
    if (new Date(tx.date) > new Date(map[key].lastDate)) map[key].lastDate = tx.date;
  });
  return Object.values(map).map(p => ({
    ...p,
    lotCount: p.lots.size,
    customerCount: p.customers.size,
    lots: Array.from(p.lots),
    customers: Array.from(p.customers)
  })).sort((a,b) => b.outSqm - a.outSqm);
}

    c.lots.some(l => String(l).toLowerCase().includes(q))
  ) : all;
  
  tbody.innerHTML = '';

function ProductView() {
  if (ui.custSelected) {
    return ProductDetail(ui.custSelected);
  }

  const all = getProductSummary();
  if (all.length === 0) {
    return h('div',{className:'card empty-state'},
      h('div',{className:'empty-icon'},'🏷'),
      h('div',{},'ยังไม่มีข้อมูลสินค้า')
    );
  }

  const card = h('div',{className:'card',style:{overflow:'hidden'}});
  const countLabel = h('span',{});

  card.appendChild(h('div',{style:{padding:'12px 16px',borderBottom:'1px solid #e2e8f0',display:'flex',gap:'10px',alignItems:'center',flexWrap:'wrap'}},

      inp.value = ui.search;

  card.appendChild(h('div',{style:{overflowX:'auto',maxHeight:'calc(100vh - 280px)',overflowY:'auto'}},

  ));
  return card;
}

function renderProductTbody(tbody, all) {
  const q = (ui.search||'').toLowerCase();
  const prodSummary = q ? all.filter(p => {
    const prod = products.find(x=>x.code===p.productCode || x.id===p.productId);
    return String(p.productCode||p.productId).toLowerCase().includes(q) ||
      (prod && String(prod.name).toLowerCase().includes(q)) ||
      p.lots.some(l => String(l).toLowerCase().includes(q)) ||
      p.customers.some(c => String(c).toLowerCase().includes(q));
  }) : all;

  tbody.innerHTML = '';

    return;
  }
  prodSummary.forEach(p => {
    const prod = products.find(x=>x.code===p.productCode || x.id===p.productId);
    tbody.appendChild(h('tr',{style:{cursor:'pointer'},onClick:()=>{ui.custSelected=p.productCode||p.productId;render();}},
      h('td',{className:'desktop-only',style:{fontFamily:'monospace',fontWeight:600,fontSize:'12px'}},p.productCode||p.productId),

      ),
      h('td',{style:{textAlign:'right',color:'#059669',fontWeight:600,fontSize:'12px'}},'+'+fmtNum(p.inSqm,2)),
      h('td',{style:{textAlign:'right',color:'#dc2626',fontWeight:600,fontSize:'12px'}},'-'+fmtNum(p.outSqm,2)),

      h('td',{className:'desktop-only',style:{textAlign:'right',fontSize:'12px',color:'#64748b'}},p.customerCount+' ราย'),

  const lots = Array.from(new Set(prodTxs.map(t=>t.lot).filter(Boolean)));

      h('div',{style:{padding:'10px 16px',display:'flex',flexWrap:'wrap',gap:'6px'}},

// ===== MAIN RENDER =====
function render() {
  const app=document.getElementById('app');
  app.innerHTML='';

  // ถ้ายังไม่ล็อกอิน → หน้า Login
  if (!currentUser) {
    app.appendChild(LoginPage());
    if(ui.toast) app.appendChild(h('div',{className:'toast',style:{background:ui.toast.type==='err'?'#dc2626':'#0f172a'}},ui.toast.msg));
    return;
  }

  const layout=h('div',{style:{display:'flex',minHeight:'100vh'}});

  if(mobileMenuOpen){
    const overlay=h('div',{className:'mobile-overlay active',onClick:()=>{mobileMenuOpen=false;render();}});
    layout.appendChild(overlay);
  }

  layout.appendChild(Sidebar());

  const main=h('div',{style:{flex:1,minWidth:0,display:'flex',flexDirection:'column'}});
  main.appendChild(Topbar());

  const isMobile = window.innerWidth <= 480;
  const content=h('div',{style:{padding:isMobile?'8px':'16px',flex:1}});
  if(ui.view==='dashboard') content.appendChild(Dashboard());
  else if(ui.view==='stock') content.appendChild(StockList());
  else if(ui.view==='in'||ui.view==='out') { ui.view='stock'; content.appendChild(StockList()); }
  else if(ui.view==='history') content.appendChild(History());
  else if(ui.view==='customers') content.appendChild(Customers());
  else if(ui.view==='alerts') content.appendChild(Alerts());
  else if(ui.view==='discontinued') content.appendChild(DiscontinuedPage());
  else if(ui.view==='reservations') content.appendChild(ReservationsPage());
  else if(ui.view==='delivery') content.appendChild(DeliveryOrderPage());
  else if(ui.view==='admin') content.appendChild(AdminPage());
  else if(ui.view==='addproduct') { ui.modal='addProduct'; ui.view='stock'; content.appendChild(StockList()); }

  main.appendChild(content);
  layout.appendChild(main);
  app.appendChild(layout);

  // ===== BOTTOM NAV (mobile) =====
  if (currentUser) {
    const bottomNavItems = [
      {k:'dashboard', i:'📊', l:'หน้าหลัก'},
      {k:'stock', i:'📦', l:'สต็อก'},
      {k:'history', i:'🕐', l:'ประวัติ', badge: unreadCount},
      {k:'customers', i:'👥', l:'ลูกค้า'},
    ];
    const bnav = h('div',{className:'bottom-nav'});
    bottomNavItems.forEach(it => {
      const btn = h('button',{className:'bottom-nav-item'+(ui.view===it.k?' active':'')});
      btn.appendChild(h('span',{},it.i));
      if (it.badge) {
        const badge = h('span',{className:'bottom-nav-badge'},it.badge > 99?'99+':it.badge);
        btn.appendChild(badge);
      }
      btn.appendChild(h('span',{},it.l));
      btn.addEventListener('click',()=>{
        if(ui.view==='history' && it.k!=='history') markAsRead();
        ui.view=it.k; ui.search=''; mobileMenuOpen=false;
        if(it.k==='history') fetchTransactions();
        render();
      });
      bnav.appendChild(btn);
    });
    app.appendChild(bnav);

    // ===== FAB (Quick Action) =====
    if (canEdit()) {
      let fabOpen = false;
      const fab = h('div',{className:'fab'});
      const fabMain = h('button',{className:'fab-main'},'＋');
      const fabMenu = h('div',{className:'fab-menu'});

      [{k:'in', i:'⬇', l:'รับสินค้าเข้า', color:'#10b981'},
       {k:'out', i:'⬆', l:'จ่ายสินค้าออก', color:'#ef4444'}
      ].forEach(({k,i,l,color}) => {
        const item = h('div',{className:'fab-item'});
        const lbl = h('span',{className:'fab-item-label'},l);
        const btn = h('button',{className:'fab-item-btn',style:{background:color,color:'white'}},i);
        btn.addEventListener('click',()=>{
          fabOpen=false; fabMain.classList.remove('open'); fabMenu.classList.remove('open');
          // ถ้าอยู่หน้าสต็อกและมีสินค้าถูก select อยู่ → เปิด modal ได้เลย
          // ถ้าไม่มี → ไปหน้าสต็อกก่อน
          if(ui.view==='stock' && ui.selectedId) {
            ui.txForm={date:td(),qty:'',unit:'sqm',note:'',location:'',lot:'',project:''};
            ui.modal=k;
          } else {
            ui.view='stock';
            ui.modal=null;
            showToast('เลือกสินค้าที่ต้องการ'+(k==='in'?'รับเข้า':'จ่ายออก')+'ครับ');
          }
          render();
        });
        item.appendChild(lbl);
        item.appendChild(btn);
        fabMenu.appendChild(item);
      });

      fabMain.addEventListener('click',()=>{
        fabOpen=!fabOpen;
        fabMain.classList.toggle('open',fabOpen);
        fabMenu.classList.toggle('open',fabOpen);
      });

      fab.appendChild(fabMenu);
      fab.appendChild(fabMain);
      app.appendChild(fab);
    }
  }

  if(ui.modal==='in'||ui.modal==='out'){const m=TxModal(ui.modal);if(m)app.appendChild(m);}
  if(ui.modal==='addReservation'){const m=AddReservationModal();if(m)app.appendChild(m);}
  if(ui.modal==='createDO'){const m=CreateDOModal();if(m)app.appendChild(m);}
  else if(ui.modal==='addDOItem'){const m=AddDOItemModal();if(m)app.appendChild(m);}
  else if(ui.modal==='viewDO'){const m=DOViewModal();if(m)app.appendChild(m);}
  else if(ui.modal==='detail'){const m=DetailModal();if(m)app.appendChild(m);}
  else if(ui.modal==='uploadImage'){const m=UploadImageModal();if(m)app.appendChild(m);}
  else if(ui.modal==='editProduct'){const m=EditProductModal();if(m)app.appendChild(m);}
  else if(ui.modal==='cancelTx'){const m=CancelTxModal();if(m)app.appendChild(m);}
  else if(ui.modal==='editTx'){const m=EditTxModal();if(m)app.appendChild(m);}
  else if(ui.modal==='addProduct'){const m=AddProductModal();if(m)app.appendChild(m);}
  else if(ui.modal==='addUser'){const m=AddUserModal();if(m)app.appendChild(m);}
  else if(ui.modal==='editUser'){const m=EditUserModal();if(m)app.appendChild(m);}

  if(isLoading && products.length===0) {
    app.appendChild(h('div',{style:{position:'fixed',inset:0,background:'rgba(241,245,249,.9)',zIndex:300,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:'14px'}},
      h('div',{className:'spinner'}),
      h('div',{style:{color:'#0f172a',fontWeight:600,fontSize:'13px'}},'กำลังดึงข้อมูลจาก Google Sheets...')
    ));
  }

  if(ui.toast) app.appendChild(h('div',{className:'toast',style:{background:ui.toast.type==='err'?'#dc2626':'#0f172a'}},ui.toast.msg));
}

// ===== INIT =====
currentUser = loadSession();
if (currentUser) ui.view = 'dashboard'; // เริ่มที่ dashboard เสมอ
render();

// โหลด usernames สำหรับ login dropdown
fetchUserNames().then(() => {
  if (!currentUser) render(); // re-render หน้า login ให้มีชื่อ
});

// ถ้าล็อกอินอยู่แล้ว โหลดข้อมูลเลย
if (currentUser) {
  fetchProducts().then(() => fetchTransactions());
  fetchLots(); fetchProjects(); fetchReservations(); fetchDeliveryOrders();
  fetchLastRead();
}
</script>
</body>
